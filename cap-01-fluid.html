<!-- Chapter 01 — FOCUS (Chesed) -->
<!-- Wrapper injected into index.html via hash routing (#capitulo-01). -->
<!-- The fluid/optical-diffusion simulation lives in cap-01-fluid.html and
     runs inside the iframe below. This wrapper only adds the shared frame +
     margin type and CLIPS the sim to the inner stage; it never touches the
     simulation itself. Injected into the parent document, so it reads the
     same theme tokens (--bg / --fg / --line …) and .dark class as index.html. -->

<style>
  #cap-01-focus {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: var(--bg);
    transition: background 0.45s ease;
  }

  /* Inner-stage clip window. Positioned/sized by JS to track the SVG frame's
     inner rectangle (80→1840, 80→1000 in the 1920×1080 artboard) under the
     same "xMidYMid meet" scaling. The margins around it show --bg. */
  #cap-01-focus .focus-stage {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  /* The simulation document. Fills the stage window; its own JS runs because
     it is an isolated iframe. Constrained to the inner stage, not the viewport. */
  #cap-01-focus .focus-sim {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    margin: 0;
    padding: 0;
    display: block;
  }

  /* === SVG board — frame lines + margin type ============================= */
  /* Same coordinate contract as index.html: viewBox 0 0 1920 1080 with
     "meet" scaling. Only the 4 frame lines here. Sits ON TOP so the hairlines
     stay crisp; pointer events pass through except on the .ctrl groups. */
  #cap-01-focus .focus-board {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
    z-index: 10;
    pointer-events: none;
  }
  #cap-01-focus .focus-board .frame {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    vector-effect: non-scaling-stroke;
    transition: stroke 0.45s ease;
  }
  #cap-01-focus .focus-board text {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    user-select: none;
  }
  #cap-01-focus .label-num  { fill: var(--fg-dim); transition: fill 0.45s ease; }
  #cap-01-focus .label-name { fill: var(--fg);     transition: fill 0.45s ease; }
  #cap-01-focus .ctrl {
    cursor: pointer;
    pointer-events: all;
    fill: var(--fg-dim);
    transition: fill 0.3s ease;
  }
  #cap-01-focus .ctrl:hover,
  #cap-01-focus .ctrl:focus-visible { fill: var(--fg); }
  #cap-01-focus .ctrl:focus { outline: none; }
  #cap-01-focus .ctrl .hit { fill: transparent; stroke: none; }
</style>

<section id="cap-01-focus">
  <!-- Clipped simulation: constrained to the inner stage, margins show --bg. -->
  <div class="focus-stage" id="focusStage">
    <iframe
      class="focus-sim"
      src="cap-01-fluid.html"
      title="FOCUS — simulación de luz / difusión óptica"
      scrolling="no"
    ></iframe>
  </div>

  <!-- Frame + margin type: homepage coordinate system, frame lines only. -->
  <svg class="focus-board" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
    <!-- 4 "infinite" frame lines, overshooting the artboard on every side -->
    <line class="frame" x1="-1000" y1="80"   x2="3000" y2="80"/>
    <line class="frame" x1="-1000" y1="1000" x2="3000" y2="1000"/>
    <line class="frame" x1="80"    y1="-1000" x2="80"   y2="2080"/>
    <line class="frame" x1="1840"  y1="-1000" x2="1840" y2="2080"/>

    <!-- Chapter label, top-left margin -->
    <text class="label-num"  x="120" y="45" font-size="11">01</text>
    <text class="label-name" x="162" y="45" font-size="11">FOCUS</text>

    <!-- Theme toggle, top-right margin (left of the back control). Shares
         index.html's contract: '.dark' on <html> + 'beLight.theme' key. -->
    <g class="ctrl" id="focusThemeToggle" role="button" tabindex="0" aria-label="Cambiar tema">
      <rect class="hit" x="1586" y="30" width="76" height="24"/>
      <text id="focusThemeText" x="1655" y="46" font-size="11" text-anchor="end">○ LUZ</text>
    </g>

    <!-- Back to index, top-right margin -->
    <g class="ctrl" id="focusBackIndex" role="link" tabindex="0" aria-label="Volver al índice">
      <rect class="hit" x="1670" y="30" width="140" height="24"/>
      <text x="1800" y="46" font-size="11" text-anchor="end">← Índice</text>
    </g>
  </svg>
</section>

<script>
  (function () {
    const root  = document.documentElement;
    const stage = document.getElementById('focusStage');
    if (!stage) return;

    // --- Clip the sim to the inner stage ------------------------------------
    // Reproduce the SVG's "xMidYMid meet" scaling so the iframe's visible
    // rectangle lines up exactly with the drawn frame (inner stage:
    // x 80→1840, y 80→1000 within the 1920×1080 artboard).
    const AR_W = 1920, AR_H = 1080;
    const STAGE_X = 80, STAGE_Y = 80, STAGE_W = 1760, STAGE_H = 920;
    function layout() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const s = Math.min(vw / AR_W, vh / AR_H);
      const offX = (vw - AR_W * s) / 2;
      const offY = (vh - AR_H * s) / 2;
      stage.style.left   = (offX + STAGE_X * s) + 'px';
      stage.style.top    = (offY + STAGE_Y * s) + 'px';
      stage.style.width  = (STAGE_W * s) + 'px';
      stage.style.height = (STAGE_H * s) + 'px';
    }
    layout();
    window.addEventListener('resize', layout);

    // --- Theme toggle -------------------------------------------------------
    // Same document as index.html, so toggling the root class flips the whole
    // view instantly; localStorage keeps the choice across the site.
    const themeText = document.getElementById('focusThemeText');
    function syncTheme() {
      themeText.textContent = root.classList.contains('dark') ? '● OSC' : '○ LUZ';
    }
    function flipTheme() {
      root.classList.toggle('dark');
      try {
        localStorage.setItem('beLight.theme',
          root.classList.contains('dark') ? 'dark' : 'light');
      } catch (e) { /* storage unavailable — theme still flips for this view */ }
      syncTheme();
    }
    const themeToggle = document.getElementById('focusThemeToggle');
    themeToggle.addEventListener('click', flipTheme);
    themeToggle.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipTheme(); }
    });
    syncTheme();
    window.addEventListener('storage', function (e) {
      if (e.key === 'beLight.theme') {
        root.classList.toggle('dark', e.newValue === 'dark');
        syncTheme();
      }
    });

    // --- Back to index — hash change only, never a reload -------------------
    const back = document.getElementById('focusBackIndex');
    function goHome() { window.location.hash = '#home'; }
    back.addEventListener('click', goHome);
    back.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goHome(); }
    });
  })();
</script>
