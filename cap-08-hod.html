<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>08 — TEMPERATURA</title>

<!-- Theme before first paint: same key + class contract as index.html. -->
<script>
  try {
    if (localStorage.getItem('beLight.theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  } catch (e) { /* storage unavailable (sandboxed) — stay light */ }
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  /* Theme tokens — same names/values as index.html so both documents flip
     together. Composition tokens (--op-*, --color-*, --cols/--rows) are
     injected from CONFIG at boot; the values here are matching fallbacks. */
  :root {
    --bg: #FFFFFF;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.45);
    --fg-faint: rgba(26, 26, 26, 0.22);
    --line: #5E5E5E;
    --line-w: 0.9px;
    --cell-base: #F1F1F1;   /* placeholder checker, tone A */
    --cell-alt:  #E9E9E9;   /* placeholder checker, tone B */
    --panel-bg: rgba(255, 255, 255, 0.9);
    --cols: 24;
    --rows: 16;
    --op-img: 1;
    --op-a: 0.85;
    --op-b: 0.85;
    --color-a: #00338A;
    --color-b: #FF00FF;
  }
  :root.dark {
    --bg: #000000;
    --fg: #ffffff;
    --fg-dim: rgba(245, 245, 240, 0.5);
    --fg-faint: rgba(245, 245, 240, 0.25);
    --line: #2E2E2E;
    --cell-base: #141414;
    --cell-alt:  #1B1B1B;
    --panel-bg: rgba(0, 0, 0, 0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100vh;   /* fallback for older browsers */
    height: 100dvh;  /* modern: excludes mobile browser chrome */
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.45s ease, color 0.45s ease;
  }

  /* === SVG board — frame lines + margin type ============================= */
  /* Same coordinate contract as index.html: viewBox 0 0 1920 1080 with
     "meet" scaling. Only the 4 frame lines here (no circles, no guides,
     no nodes). The board sits ON TOP of the composition so the hairlines
     stay crisp over the grid; pointer events pass through except on the
     interactive .ctrl groups. */
  #board {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: block;
    overflow: visible;   /* frame lines overshoot the artboard to the viewport edges */
    z-index: 10;
    pointer-events: none;
  }
  #board .frame {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    vector-effect: non-scaling-stroke;
    transition: stroke 0.45s ease;
  }
  #board text {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    user-select: none;
  }
  .label-num  { fill: var(--fg-dim); transition: fill 0.45s ease; }
  .label-name { fill: var(--fg);     transition: fill 0.45s ease; }
  .ctrl {
    cursor: pointer;
    pointer-events: all;
    fill: var(--fg-dim);
    transition: fill 0.3s ease;
  }
  .ctrl:hover, .ctrl:focus-visible { fill: var(--fg); }
  .ctrl:focus { outline: none; }
  .ctrl .hit { fill: transparent; stroke: none; }

  /* === Artboard — HTML twin of the SVG coordinate system ================= */
  /* A fixed 1920×1080 div, centred and scaled by JS with the same
     min(vw/1920, vh/1080) math as the SVG's "xMidYMid meet". Everything
     inside uses raw artboard pixels, so the grid can never drift from
     the frame drawn in the SVG. */
  #artboard {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(1);
    z-index: 1;
  }

  /* Inner stage: the frame rectangle. Clips the tools panel slide. */
  #stage {
    position: absolute;
    left: 80px;
    top: 80px;
    width: 1760px;
    height: 920px;
    overflow: hidden;
    background: var(--bg);
    transition: background 0.45s ease, opacity 0.3s ease-in;
  }

  /* === The three stacked grids ========================================== */
  .layer {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(var(--cols), 1fr);
    grid-template-rows: repeat(var(--rows), 1fr);
  }
  #layerImg { opacity: var(--op-img); }

  /* Layer 1 — image fragments. Before upload the cells form a subtle
     neutral checker; after upload each cell shows its crop of the image. */
  #layerImg .cell {
    background-color: var(--cell-base);
    background-repeat: no-repeat;
    transition: background-color 0.45s ease;
  }
  #layerImg .cell.alt { background-color: var(--cell-alt); }

  /* Layers 2 & 3 — colour plates. Cells are transparent unless .on.
     Opacity lives on the CELL (not the layer) so the brush can drive
     individual cells. Two modes:
       • default (hover OFF): each plate's opacity = its slider value.
       • hover ON (.hover-on on #stage): plates go FULLY opaque, and the
         brush weight --w carves a transparent window at the cursor —
         opacity 0 at the centre → 1 at the radius edge — revealing the
         image beneath. Non-brushed cells stay opaque (--w defaults 0).
     The short opacity transition keeps the reveal liquid. */
  #layerA .cell, #layerB .cell {
    background-color: transparent;
    transition: background-color 0.25s ease, opacity 0.12s linear;
  }
  #layerA .cell.on { background-color: var(--color-a); opacity: var(--op-a); }
  #layerB .cell.on { background-color: var(--color-b); opacity: var(--op-b); }
  #stage.hover-on #layerA .cell.on,
  #stage.hover-on #layerB .cell.on { opacity: calc(1 - var(--w, 0)); }

  /* === Placeholder =========================================== */
  #placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #placeholder button {
    pointer-events: auto;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--fg-dim);
    background: var(--bg);
    border: none;
    padding: 20px 34px;
    cursor: pointer;
    transition: color 0.3s ease, background 0.45s ease;
  }
  #placeholder button:hover,
  #placeholder button:focus-visible { color: var(--fg); }

  /* === Tools panel — slides up from the frame's bottom line ============= */
  #panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: var(--panel-h, 216px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    row-gap: 24px;
    padding: 0 56px;
    background: var(--panel-bg);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.45s ease, border-color 0.45s ease;
  }
  #panel.open { transform: translateY(0); }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    white-space: nowrap;
    color: var(--fg-dim);
    background: none;
    border: 1px solid var(--fg-dim);
    padding: 14px 26px;
    cursor: pointer;
    transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
  }
  .btn:hover, .btn:focus-visible { color: var(--fg); border-color: var(--fg); }
  /* Active toggle (hover mode ON) — inverted fill so the engaged state
     reads clearly, distinct from the transient :hover feedback. */
  .btn.active,
  .btn.active:hover,
  .btn.active:focus-visible {
    color: var(--bg);
    background: var(--fg);
    border-color: var(--fg);
  }

  /* Rows share identical group widths, so the three slider columns of
     the A and B rows align, and row 1's IMG slider closes the same
     right edge. */
  .panel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .row-actions { display: flex; gap: 20px; }
  .slider-group { display: flex; align-items: center; gap: 18px; }
  .slider-group label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-dim);
    width: 90px;   /* fits "COLOR A" */
    text-align: right;
    transition: color 0.45s ease;
  }

  /* Extracted-palette swatches — read the same CSS vars as the grid, so
     they recolour automatically when a new image sets the palette. */
  .swatch {
    flex: none;
    width: 16px;
    height: 16px;
    border: 1px solid var(--fg-faint);
    transition: background-color 0.3s ease, border-color 0.45s ease;
  }
  #swatchA { background-color: var(--color-a); }
  #swatchB { background-color: var(--color-b); }

  /* Hover-radius control — only meaningful while the brush is live, so it
     rides the .hover-on class (#stage) that also drives the plates. Its
     label needs no fixed alignment width (it isn't in a colour row), and a
     compact track suits the small whole-number range. */
  #radiusGroup { display: none; }
  .hover-on #radiusGroup { display: flex; }
  #radiusGroup label { width: auto; }
  #radiusGroup input[type="range"] { width: 130px; }

  /* Custom range inputs: hairline track + small round thumb. */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 280px;
    height: 24px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 1px;
    background: var(--fg-dim);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    margin-top: -6px;   /* centre the thumb on the 1px track */
    border-radius: 50%;
    background: var(--fg);
    transition: background 0.45s ease;
  }
  input[type="range"]::-moz-range-track {
    height: 1px;
    background: var(--fg-dim);
  }
  input[type="range"]::-moz-range-thumb {
    width: 13px;
    height: 13px;
    border: none;
    border-radius: 50%;
    background: var(--fg);
  }

  @media (prefers-reduced-motion: reduce) {
    #panel { transition: background 0.45s ease, border-color 0.45s ease; }
  }
</style>
</head>
<body>

<!-- Frame + margin type: homepage coordinate system, frame lines only. -->
<svg id="board" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
  <!-- 4 "infinite" frame lines, overshooting the artboard on every side -->
  <line class="frame" x1="-1000" y1="80"    x2="3000" y2="80"/>
  <line class="frame" x1="-1000" y1="1000"  x2="3000" y2="1000"/>
  <line class="frame" x1="80"    y1="-1000" x2="80"   y2="2080"/>
  <line class="frame" x1="1840"  y1="-1000" x2="1840" y2="2080"/>

  <!-- Chapter label, top-left margin (same spot/type as the homepage title) -->
  <text class="label-num"  x="120" y="45" font-size="11">08</text>
  <text class="label-name" x="162" y="45" font-size="11">TEMPERATURA</text>

  <!-- Theme toggle, top-right margin (left of the back control). Same
       typographic treatment + localStorage contract as the homepage. -->
  <g class="ctrl" id="themeToggle" role="button" tabindex="0" aria-label="Cambiar tema">
    <rect class="hit" x="1586" y="30" width="76" height="24"/>
    <text id="themeToggleText" x="1655" y="46" font-size="11" text-anchor="end">○ LUZ</text>
  </g>

  <!-- Back to index, top-right margin -->
  <g class="ctrl" id="backIndex" role="link" tabindex="0" aria-label="Volver al índice">
    <rect class="hit" x="1670" y="30" width="140" height="24"/>
    <text x="1800" y="46" font-size="11" text-anchor="end">← Índice</text>
  </g>

  <!-- Tools toggle, bottom margin, centred -->
  <g class="ctrl" id="toolsToggle" role="button" tabindex="0"
     aria-expanded="false" aria-label="Herramientas">
    <rect class="hit" x="850" y="1022" width="220" height="38"/>
    <text id="toolsToggleText" x="960" y="1045" font-size="11" text-anchor="middle">▲ HERRAMIENTAS</text>
  </g>
</svg>

<!-- Scaled HTML artboard: grid composition + tools panel. -->
<div id="artboard">
  <div id="stage">
    <div class="layer" id="layerImg" aria-hidden="true"></div>
    <div class="layer" id="layerA"   aria-hidden="true"></div>
    <div class="layer" id="layerB"   aria-hidden="true"></div>

    <div id="placeholder">
      <button id="placeholderBtn" type="button">Subí una imagen para empezar</button>
    </div>

    <div id="panel">
      <!-- Row 1 — actions + image opacity -->
      <div class="panel-row">
        <div class="row-actions">
          <button class="btn" id="uploadBtn"  type="button">Subir imagen</button>
          <button class="btn" id="shuffleBtn" type="button">Mezclar</button>
          <button class="btn" id="hoverBtn"   type="button" aria-pressed="false">Pincel: Inactivo</button>
          <!-- Hover radius — shown only while hover mode is ON (.hover-on on #stage) -->
          <div class="slider-group" id="radiusGroup">
            <label for="radius">RADIO</label>
            <input type="range" id="radius" step="1" aria-label="Radio del pincel">
          </div>
        </div>
        <div class="slider-group">
          <label for="opImg">IMG</label>
          <input type="range" id="opImg" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
      <!-- Row 2 — colour A: swatch / opacity / coverage / clustering -->
      <div class="panel-row">
        <div class="slider-group">
          <span class="swatch" id="swatchA" aria-hidden="true"></span>
          <label for="opA" id="labelA">COLOR A</label>
          <input type="range" id="opA" min="0" max="1" step="0.01" value="0.40">
        </div>
        <div class="slider-group">
          <label for="covA">COB.</label>
          <input type="range" id="covA" min="0" max="1" step="0.01" value="0.68"
                 aria-label="Cobertura color A">
        </div>
        <div class="slider-group">
          <label for="cluA">GRUPO</label>
          <input type="range" id="cluA" min="0" max="1" step="0.01" value="1"
                 aria-label="Agrupación color A">
        </div>
      </div>
      <!-- Row 3 — colour B: swatch / opacity / coverage / clustering -->
      <div class="panel-row">
        <div class="slider-group">
          <span class="swatch" id="swatchB" aria-hidden="true"></span>
          <label for="opB" id="labelB">COLOR B</label>
          <input type="range" id="opB" min="0" max="1" step="0.01" value="0.40">
        </div>
        <div class="slider-group">
          <label for="covB">COB.</label>
          <input type="range" id="covB" min="0" max="1" step="0.01" value="0.56"
                 aria-label="Cobertura color B">
        </div>
        <div class="slider-group">
          <label for="cluB">GRUPO</label>
          <input type="range" id="cluB" min="0" max="1" step="0.01" value="1"
                 aria-label="Agrupación color B">
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden>

<script>
(function () {
  'use strict';

  // Hide the stage until the default image is fully composited — the plates,
  // pre-stamps and grid all paint synchronously with the FALLBACK palette
  // (magenta/blue) before cap08.png loads; revealing only on the image's
  // onload avoids that flash of the old state on entry.
  document.getElementById('stage').style.opacity = '0';

  // =====================================================================
  // CONFIG — all tunables. Coordinates are raw pixels on the 1920×1080
  // artboard (same system as index.html); the viewBox / JS scale do all
  // the responsive work.
  // =====================================================================
  const CONFIG = {
    gridCols: 24,
    gridRows: 16,
    defaultImage: 'cap08.png',   // loaded on boot so the chapter never opens on
                                 // the empty placeholder; a real upload overrides it
    colorA: '#00338A',       // layer 2 plate — FALLBACK, used until an image
                             // is uploaded (then replaced by extraction)
    colorB: '#FF00FF',       // layer 3 plate — fallback, same deal
    extract: {               // dominant-colour extraction (k-means, k=2)
      sampleWidth: 100,      // image downsampled to this width before sampling
      iterations: 10,        // k=2 converges fast
      minBrightness: 15,     // ignore near-black pixels (shadows)
      maxBrightness: 240,    // ignore near-white pixels (backgrounds)
    },
    coverageA: 0.68,         // 68% of cells covered by color A
    coverageB: 0.56,         // 56% of cells covered by color B
    defaultOpacityImg: 1.0,
    defaultOpacityA: 0.40,
    defaultOpacityB: 0.40,
    defaultClusterA: 1.0,    // 0 = scattered noise, 1 = continental masses
    defaultClusterB: 1.0,
    hoverRadius: 3,          // colour-brush radius, in grid cells
    hoverFalloff: true,      // true = smooth fade to the radius edge;
                             // false = hard edge; a number = falloff
                             // exponent (higher = tighter core)
    hoverFps: 30,            // hover recalcs per second (throttle)
    hoverDefaultOn: true,    // initial state of the HOVER toggle button
    clusterPeriod: { min: 0.8, max: 12 },  // noise period in cells at
                             // cluster 0 → 1 (sub-cell = pure scatter)
    labelA: 'COLOR A',       // slider label for layer 2
    labelB: 'COLOR B',       // slider label for layer 3
    artboard: { w: 1920, h: 1080 },
    stage: { x: 80, y: 80, w: 1760, h: 920 },   // frame rectangle
    panelHeight: 216,        // tools panel, artboard px
  };

  // =====================================================================
  // Push CONFIG into CSS custom properties (theme tokens stay in CSS).
  // =====================================================================
  const root = document.documentElement;
  root.style.setProperty('--cols', CONFIG.gridCols);
  root.style.setProperty('--rows', CONFIG.gridRows);
  root.style.setProperty('--color-a', CONFIG.colorA);
  root.style.setProperty('--color-b', CONFIG.colorB);
  root.style.setProperty('--op-img', CONFIG.defaultOpacityImg);
  root.style.setProperty('--op-a', CONFIG.defaultOpacityA);
  root.style.setProperty('--op-b', CONFIG.defaultOpacityB);
  root.style.setProperty('--panel-h', CONFIG.panelHeight + 'px');

  // =====================================================================
  // Artboard scale — mirrors the SVG's preserveAspectRatio="xMidYMid meet"
  // so the HTML grid and the SVG frame share one coordinate system.
  // =====================================================================
  const artboard = document.getElementById('artboard');
  function fit() {
    const s = Math.min(
      window.innerWidth / CONFIG.artboard.w,
      window.innerHeight / CONFIG.artboard.h
    );
    if (s <= 0) return;   // viewport not laid out yet — wait for a real size
    artboard.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  // The iframe can be attached before it has a size (no resize event fires
  // for the zero→sized transition) — observe the root element as well.
  if ('ResizeObserver' in window) {
    new ResizeObserver(fit).observe(document.documentElement);
  }
  fit();

  // =====================================================================
  // Build the three grids. One <div> per cell; the image layer's checker
  // alternation is baked in as a class so the placeholder reads as a grid.
  // =====================================================================
  const COLS = CONFIG.gridCols, ROWS = CONFIG.gridRows, N = COLS * ROWS;
  function buildCells(layerEl, checker) {
    const cells = [];
    const frag = document.createDocumentFragment();
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const d = document.createElement('div');
        d.className = 'cell' + (checker && (r + c) % 2 ? ' alt' : '');
        frag.appendChild(d);
        cells.push(d);
      }
    }
    layerEl.appendChild(frag);
    return cells;
  }
  const imgCells = buildCells(document.getElementById('layerImg'), true);
  const aCells   = buildCells(document.getElementById('layerA'), false);
  const bCells   = buildCells(document.getElementById('layerB'), false);

  // =====================================================================
  // Plate distribution — a seeded value-noise field per colour, keeping
  // the k highest cells so coverage is an EXACT count. The clustering
  // value tunes the noise period: sub-cell period reads as uniform
  // scatter, a ~12-cell period as continental masses. Seeds change only
  // on load and on shuffle, so dragging coverage grows/shrinks the same
  // masses and dragging clustering morphs their grain — no re-rolling.
  // =====================================================================
  const state = {
    covA: CONFIG.coverageA,
    covB: CONFIG.coverageB,
    cluA: CONFIG.defaultClusterA,
    cluB: CONFIG.defaultClusterB,
    seedA: 482917635,        // fixed → the same composition on every first load
    seedB: 1739204856,       // (shuffle still re-randomizes both seeds)
  };

  function hash2(ix, iy, seed) {
    let n = Math.imul(ix, 374761393) ^ Math.imul(iy, 668265263)
          ^ Math.imul(seed, 1013904223);
    n = Math.imul(n ^ (n >>> 13), 1274126177);
    n ^= n >>> 16;
    return (n >>> 0) / 4294967296;   // 0..1
  }
  function smooth01(t) { return t * t * (3 - 2 * t); }
  function valueNoise(x, y, seed) {
    const x0 = Math.floor(x), y0 = Math.floor(y);
    const tx = smooth01(x - x0), ty = smooth01(y - y0);
    const v00 = hash2(x0, y0, seed),     v10 = hash2(x0 + 1, y0, seed);
    const v01 = hash2(x0, y0 + 1, seed), v11 = hash2(x0 + 1, y0 + 1, seed);
    const top = v00 + (v10 - v00) * tx;
    const bot = v01 + (v11 - v01) * tx;
    return top + (bot - top) * ty;
  }

  function regen(cells, coverage, cluster, seed) {
    const k = Math.max(0, Math.min(N, Math.round(N * coverage)));
    const p = CONFIG.clusterPeriod;
    const period = p.min * Math.pow(p.max / p.min, cluster);
    const idx = new Array(N);
    const val = new Float64Array(N);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const i = r * COLS + c;
        idx[i] = i;
        // sampled around the grid centre so clustering zooms in place
        val[i] = valueNoise(
          (c + 0.5 - COLS / 2) / period,
          (r + 0.5 - ROWS / 2) / period,
          seed
        );
      }
    }
    idx.sort(function (i, j) { return val[j] - val[i]; });
    const on = new Set(idx.slice(0, k));
    for (let i = 0; i < N; i++) cells[i].classList.toggle('on', on.has(i));
  }
  function regenA() { regen(aCells, state.covA, state.cluA, state.seedA); }
  function regenB() { regen(bCells, state.covB, state.cluB, state.seedB); }
  function shuffle() {
    state.seedA = (Math.random() * 0x7fffffff) | 0;
    state.seedB = (Math.random() * 0x7fffffff) | 0;
    regenA();
    regenB();
  }
  regenA();
  regenB();
  loadDefaultImage();

  // =====================================================================
  // Image upload — the image is cover-cropped to the stage, then each
  // cell shows its slice via background-position (one image, 384 crops).
  // All math in artboard px: the CSS scale keeps it true. On every upload
  // the two plate colours are re-extracted from the image itself.
  // =====================================================================
  const placeholder = document.getElementById('placeholder');
  let currentURL = null;
  let loadSeq = 0;

  // --- Dominant-colour extraction (k-means, k=2) -------------------------
  // The image is drawn once on a tiny offscreen canvas (~100px wide) and
  // clustered in RGB space. Near-black/near-white pixels are excluded so
  // backgrounds and shadows don't dominate. Runs once per upload.
  function rgbToHex(c) {
    return '#' + c.map(function (v) {
      return Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0');
    }).join('');
  }

  // Returns [hexA, hexB] with A the larger cluster, or null if the image
  // yields too few usable pixels (then the current palette is kept).
  function extractColors(img) {
    const cfg = CONFIG.extract;
    const w = cfg.sampleWidth;
    const h = Math.max(1, Math.round(img.naturalHeight * w / img.naturalWidth));
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const ctx = cv.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0, w, h);
    let data;
    try { data = ctx.getImageData(0, 0, w, h).data; }
    catch (e) { return null; }             // tainted canvas — keep palette
    const px = [];
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] < 128) continue;     // transparent
      const r = data[i], g = data[i + 1], b = data[i + 2];
      const bright = (r + g + b) / 3;
      if (bright < cfg.minBrightness || bright > cfg.maxBrightness) continue;
      px.push([r, g, b]);
    }
    if (px.length < 2) return null;
    const pick = function () { return px[(Math.random() * px.length) | 0].slice(); };
    let cA = pick(), cB = pick();
    let nA = 0, nB = 0;
    for (let it = 0; it < cfg.iterations; it++) {
      const sum = [[0, 0, 0], [0, 0, 0]];
      const n = [0, 0];
      for (let p = 0; p < px.length; p++) {
        const q = px[p];
        const dA = (q[0] - cA[0]) * (q[0] - cA[0])
                 + (q[1] - cA[1]) * (q[1] - cA[1])
                 + (q[2] - cA[2]) * (q[2] - cA[2]);
        const dB = (q[0] - cB[0]) * (q[0] - cB[0])
                 + (q[1] - cB[1]) * (q[1] - cB[1])
                 + (q[2] - cB[2]) * (q[2] - cB[2]);
        const k = dA <= dB ? 0 : 1;
        sum[k][0] += q[0]; sum[k][1] += q[1]; sum[k][2] += q[2]; n[k]++;
      }
      if (n[0]) cA = [sum[0][0] / n[0], sum[0][1] / n[0], sum[0][2] / n[0]];
      else cA = pick();                    // empty cluster — reseed
      if (n[1]) cB = [sum[1][0] / n[1], sum[1][1] / n[1], sum[1][2] / n[1]];
      else cB = pick();
      nA = n[0]; nB = n[1];
    }
    if (nB > nA) { const t = cA; cA = cB; cB = t; }   // A = dominant
    return [rgbToHex(cA), rgbToHex(cB)];
  }

  // Push a palette into the CSS vars — grid cells and panel swatches all
  // read --color-a/--color-b, so everything recolours in one move.
  const swatchA = document.getElementById('swatchA');
  const swatchB = document.getElementById('swatchB');
  function applyPalette(hexA, hexB) {
    root.style.setProperty('--color-a', hexA);
    root.style.setProperty('--color-b', hexB);
    swatchA.title = hexA.toUpperCase();
    swatchB.title = hexB.toUpperCase();
  }
  applyPalette(CONFIG.colorA, CONFIG.colorB);   // fallback palette until upload

  function applyImage(url, iw, ih) {
    const SW = CONFIG.stage.w, SH = CONFIG.stage.h;
    const s = Math.max(SW / iw, SH / ih);          // cover
    const w = iw * s, h = ih * s;
    const ox = (w - SW) / 2, oy = (h - SH) / 2;    // centred crop
    const cw = SW / COLS, ch = SH / ROWS;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = imgCells[r * COLS + c];
        cell.style.backgroundImage = 'url("' + url + '")';
        cell.style.backgroundSize = w + 'px ' + h + 'px';
        cell.style.backgroundPosition =
          (-(ox + c * cw)) + 'px ' + (-(oy + r * ch)) + 'px';
      }
    }
  }

  function setImage(file) {
    if (!file || file.type.indexOf('image/') !== 0) return;
    const url = URL.createObjectURL(file);
    const seq = ++loadSeq;
    const probe = new Image();
    probe.onload = function () {
      if (seq !== loadSeq) { URL.revokeObjectURL(url); return; }  // superseded
      const palette = extractColors(probe);
      if (palette) applyPalette(palette[0], palette[1]);
      applyImage(url, probe.naturalWidth, probe.naturalHeight);
      if (currentURL) URL.revokeObjectURL(currentURL);
      currentURL = url;
      placeholder.style.display = 'none';
    };
    probe.onerror = function () { URL.revokeObjectURL(url); };
    probe.src = url;
  }

  // Default image on boot — same path as an upload (extract → palette →
  // image), so the chapter opens on a real composition instead of the empty
  // placeholder. The default is a plain same-origin path, not an object URL,
  // so there's no createObjectURL bookkeeping; stashing it in currentURL just
  // lets the first real upload run its revoke step harmlessly.
  function loadDefaultImage() {
    const img = new Image();
    img.onload = function () {
      const palette = extractColors(img);
      if (palette) applyPalette(palette[0], palette[1]);
      applyImage(CONFIG.defaultImage, img.naturalWidth, img.naturalHeight);
      currentURL = CONFIG.defaultImage;
      placeholder.style.display = 'none';
      // Everything is composited (palette + image + the pre-stamps applied
      // synchronously during boot) — now reveal the stage in one clean fade.
      document.getElementById('stage').style.opacity = '1';
    };
    // Safety net: if the default image can't load, still reveal the stage so
    // the chapter shows its plate composition rather than staying blank.
    img.onerror = function () {
      document.getElementById('stage').style.opacity = '1';
    };
    img.src = CONFIG.defaultImage;
  }

  const fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', function () {
    setImage(fileInput.files[0]);
    fileInput.value = '';   // allow re-selecting the same file
  });

  // Drag & drop anywhere on the page loads the image too.
  window.addEventListener('dragover', function (e) { e.preventDefault(); });
  window.addEventListener('drop', function (e) {
    e.preventDefault();
    if (e.dataTransfer && e.dataTransfer.files.length) {
      setImage(e.dataTransfer.files[0]);
    }
  });

  // =====================================================================
  // Sliders — layer opacities live as CSS custom properties; dragging
  // never touches the 1152 cells.
  // =====================================================================
  function bindSlider(id, prop, initial) {
    const el = document.getElementById(id);
    el.value = initial;
    el.addEventListener('input', function () {
      root.style.setProperty(prop, el.value);
    });
  }
  bindSlider('opImg', '--op-img', CONFIG.defaultOpacityImg);
  bindSlider('opA',   '--op-a',   CONFIG.defaultOpacityA);
  bindSlider('opB',   '--op-b',   CONFIG.defaultOpacityB);
  document.getElementById('labelA').textContent = CONFIG.labelA;
  document.getElementById('labelB').textContent = CONFIG.labelB;

  // Coverage / clustering sliders regenerate ONLY their colour's plate;
  // the other plate keeps its distribution.
  function bindStateSlider(id, initial, apply) {
    const el = document.getElementById(id);
    el.value = initial;
    el.addEventListener('input', function () {
      apply(parseFloat(el.value));
    });
  }
  bindStateSlider('covA', CONFIG.coverageA, function (v) { state.covA = v; regenA(); });
  bindStateSlider('covB', CONFIG.coverageB, function (v) { state.covB = v; regenB(); });
  bindStateSlider('cluA', CONFIG.defaultClusterA, function (v) { state.cluA = v; regenA(); });
  bindStateSlider('cluB', CONFIG.defaultClusterB, function (v) { state.cluB = v; regenB(); });

  // =====================================================================
  // Tools panel — closed by default; the toggle lives in the bottom
  // margin and flips ▲/▼. Escape closes.
  // =====================================================================
  const panel = document.getElementById('panel');
  const toolsToggle = document.getElementById('toolsToggle');
  const toolsToggleText = document.getElementById('toolsToggleText');
  let panelOpen = false;

  function setPanel(open) {
    panelOpen = open;
    panel.classList.toggle('open', open);
    toolsToggleText.textContent = open ? '▼ HERRAMIENTAS' : '▲ HERRAMIENTAS';
    toolsToggle.setAttribute('aria-expanded', String(open));
  }
  toolsToggle.addEventListener('click', function () { setPanel(!panelOpen); });
  toolsToggle.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setPanel(!panelOpen); }
  });
  window.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && panelOpen) setPanel(false);
  });

  document.getElementById('placeholderBtn').addEventListener('click', function () {
    setPanel(true);
  });
  document.getElementById('uploadBtn').addEventListener('click', function () {
    fileInput.click();
  });
  document.getElementById('shuffleBtn').addEventListener('click', shuffle);

  // =====================================================================
  // Hover brush — only live when hover mode is ON (see the toggle below).
  // In that mode the whole grid is opaque colour and a circular window
  // around the cursor REVEALS the image: per cell we write the weight
  // --w, and the .hover-on CSS turns it into opacity 1-w (transparent at
  // the centre, opaque at the radius edge). Throttled to CONFIG.hoverFps.
  //
  // A CLICK is a STAMP: the cells under the radius toggle into a persistent
  // `stamped` set (revealed even after the mouse leaves; click again to
  // erase). A cell's reveal weight is max(stamp, live brush), so stamps and
  // the moving brush combine — the brush never stops.
  // =====================================================================
  const stageEl = document.getElementById('stage');
  const HOVER_MS = 1000 / CONFIG.hoverFps;
  let hoverMode = false;       // OFF by default — sliders rule the grid
  let hoverRadius = CONFIG.hoverRadius;  // live, driven by the RADIO slider
  const stamped = new Set();   // cell indices locked as permanently revealed
  let brushPrev = new Map();   // cell index → live brush weight (this radius)
  let brushTimer = null, brushLast = 0, brushEvt = null;

  function brushWeight(d) {
    const R = hoverRadius;
    if (d > R) return 0;
    const f = CONFIG.hoverFalloff;
    if (!f) return 1;                       // hard edge
    const t = 1 - d / R;
    return typeof f === 'number' ? Math.pow(t, f) : smooth01(t);
  }

  // Cells within the brush radius of (gx,gy) → Map(cellIndex → weight),
  // weight ~1 at the centre falling to 0 at the edge (CONFIG.hoverFalloff).
  function radiusWeights(gx, gy) {
    const R = hoverRadius;
    const m = new Map();
    // Precision mode (radius 1): just the single cell under the cursor,
    // fully transparent, no falloff.
    if (R <= 1) {
      const c = Math.min(COLS - 1, Math.max(0, Math.floor(gx)));
      const r = Math.min(ROWS - 1, Math.max(0, Math.floor(gy)));
      m.set(r * COLS + c, 1);
      return m;
    }
    const c0 = Math.max(0, Math.floor(gx - R)), c1 = Math.min(COLS - 1, Math.ceil(gx + R));
    const r0 = Math.max(0, Math.floor(gy - R)), r1 = Math.min(ROWS - 1, Math.ceil(gy + R));
    for (let r = r0; r <= r1; r++) {
      for (let c = c0; c <= c1; c++) {
        const w = brushWeight(Math.hypot(c + 0.5 - gx, r + 0.5 - gy));
        if (w > 0.001) m.set(r * COLS + c, w);
      }
    }
    return m;
  }

  // Write (or clear) a cell's reveal weight on both colour plates.
  function setCellW(i, w) {
    if (w > 0) {
      const v = w.toFixed(3);
      aCells[i].style.setProperty('--w', v);
      bCells[i].style.setProperty('--w', v);
    } else {
      aCells[i].style.removeProperty('--w');
      bCells[i].style.removeProperty('--w');
    }
  }

  // Move the live radius to (gx,gy). Cells leaving the radius fall back to
  // their stamped state (1 if stamped, else covered); cells inside show
  // max(brush, stamp) — a stamped cell stays fully revealed under the brush.
  function applyBrush(gx, gy) {
    const next = radiusWeights(gx, gy);
    brushPrev.forEach(function (w, i) {
      if (!next.has(i)) setCellW(i, stamped.has(i) ? 1 : 0);
    });
    next.forEach(function (w, i) {
      setCellW(i, stamped.has(i) ? 1 : w);
    });
    brushPrev = next;
  }

  // Clear only the LIVE brush (e.g. on pointerleave). Stamps persist.
  function clearBrush() {
    if (brushTimer) { clearTimeout(brushTimer); brushTimer = null; }
    brushEvt = null;
    brushPrev.forEach(function (w, i) { setCellW(i, stamped.has(i) ? 1 : 0); });
    brushPrev = new Map();
  }

  // Wipe the live brush AND every stamp (when hover mode is turned off,
  // so each session starts clean).
  function resetReveal() {
    if (brushTimer) { clearTimeout(brushTimer); brushTimer = null; }
    brushEvt = null;
    brushPrev.forEach(function (w, i) { setCellW(i, 0); });
    stamped.forEach(function (i) { setCellW(i, 0); });
    brushPrev = new Map();
    stamped.clear();
  }

  // Click stamp — toggle every cell in the radius. Newly stamped cells lock
  // transparent; un-stamped cells revert to the live brush (or cover).
  function stampAt(gx, gy) {
    radiusWeights(gx, gy).forEach(function (w, i) {
      if (stamped.has(i)) stamped.delete(i); else stamped.add(i);
      setCellW(i, stamped.has(i) ? 1 : (brushPrev.get(i) || 0));
    });
  }

  // Pointer position → grid coords (from the live rect).
  function eventToGrid(e) {
    const rect = stageEl.getBoundingClientRect();
    return { gx: (e.clientX - rect.left) / rect.width * COLS,
             gy: (e.clientY - rect.top) / rect.height * ROWS };
  }

  function flushBrush() {
    if (brushTimer) { clearTimeout(brushTimer); brushTimer = null; }
    const e = brushEvt;
    if (!e) return;
    brushLast = performance.now();
    if (panel.contains(e.target)) { clearBrush(); return; }   // over the tools
    const p = eventToGrid(e);
    applyBrush(p.gx, p.gy);
  }

  stageEl.addEventListener('pointermove', function (e) {
    if (!hoverMode) return;             // brush follows the cursor whenever ON
    brushEvt = e;
    const wait = brushLast + HOVER_MS - performance.now();
    if (wait <= 0) flushBrush();
    else if (!brushTimer) brushTimer = setTimeout(flushBrush, wait);
  });
  // Leaving the grid clears the live brush; stamped reveals stay put.
  stageEl.addEventListener('pointerleave', clearBrush);
  stageEl.addEventListener('pointercancel', clearBrush);

  // Click = STAMP. Sync the live radius to the click point, then toggle the
  // stamped state of those cells (click an already-stamped area to erase).
  // The hover brush keeps working the whole time.
  stageEl.addEventListener('click', function (e) {
    if (!hoverMode) return;
    if (panel.contains(e.target) || placeholder.contains(e.target)) return;
    const p = eventToGrid(e);
    applyBrush(p.gx, p.gy);
    stampAt(p.gx, p.gy);
  });

  // Hover toggle — OFF (default): sliders control the whole grid, no brush.
  // ON: the grid fills with opaque colour; the brush reveals the image
  // around the cursor and clicks stamp permanent reveals.
  const hoverBtn = document.getElementById('hoverBtn');
  function updateHoverLabel() {
    hoverBtn.textContent = hoverMode ? 'Pincel: Activo' : 'Pincel: Inactivo';
    hoverBtn.classList.toggle('active', hoverMode);
    hoverBtn.setAttribute('aria-pressed', String(hoverMode));
  }
  function setHover(on) {
    hoverMode = on;
    stageEl.classList.toggle('hover-on', on);
    if (!on) resetReveal();            // turning hover off wipes brush + stamps
    updateHoverLabel();
  }
  hoverBtn.addEventListener('click', function () { setHover(!hoverMode); });
  setHover(CONFIG.hoverDefaultOn);

  // Pre-stamp a deterministic set of cells for the default state — these
  // carve reveal windows into the colour plates so the chapter opens dense,
  // not on a flat field of colour. A seeded value-noise field (same machinery
  // as the plates) groups the windows into coherent blocks spread across the
  // whole grid; STAMP_COVERAGE controls how much image shows through and
  // STAMP_PERIOD the window grain (smaller = more, tighter windows).
  const STAMP_COVERAGE = 0.22;   // fraction of cells revealed on boot
  const STAMP_PERIOD = 2.4;      // noise period in cells
  const STAMP_SEED = 20250705;
  const stampVal = new Float64Array(N);
  const stampOrder = new Array(N);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const i = r * COLS + c;
      stampOrder[i] = i;
      stampVal[i] = valueNoise(c / STAMP_PERIOD, r / STAMP_PERIOD, STAMP_SEED);
    }
  }
  stampOrder.sort(function (a, b) { return stampVal[b] - stampVal[a]; });
  const stampCount = Math.round(N * STAMP_COVERAGE);
  for (let i = 0; i < stampCount; i++) {
    stamped.add(stampOrder[i]);
    setCellW(stampOrder[i], 1);
  }

  // Hover-radius slider (RADIO) — 1 (precision, single cell) up to the
  // CONFIG maximum, whole steps, defaulting to the max. Updates live.
  const radiusInput = document.getElementById('radius');
  radiusInput.min = 1;
  radiusInput.max = CONFIG.hoverRadius;
  radiusInput.value = hoverRadius;
  radiusInput.addEventListener('input', function () {
    hoverRadius = Math.max(1, parseInt(radiusInput.value, 10) || 1);
  });

  // =====================================================================
  // Back to index — hash change on the parent document, never a reload.
  // =====================================================================
  const backIndex = document.getElementById('backIndex');
  function goHome() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.location.hash = '#home';
        return;
      }
    } catch (err) { /* cross-origin parent — fall through */ }
    window.location.href = 'index.html#home';
  }
  backIndex.addEventListener('click', goHome);
  backIndex.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goHome(); }
  });

  // =====================================================================
  // Theme toggle — discreet typographic control in the top margin. Shares
  // index.html's contract: '.dark' class on <html> + 'beLight.theme' in
  // localStorage, so the preference carries across the whole site. The
  // label mirrors the homepage ('○ LUZ' / '● OSC').
  // =====================================================================
  const themeToggle = document.getElementById('themeToggle');
  const themeToggleText = document.getElementById('themeToggleText');
  function syncTheme() {
    themeToggleText.textContent = root.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  function flipTheme() {
    root.classList.toggle('dark');
    try {
      localStorage.setItem('beLight.theme',
        root.classList.contains('dark') ? 'dark' : 'light');
    } catch (e) { /* storage unavailable — theme still flips for this view */ }
    syncTheme();
  }
  themeToggle.addEventListener('click', flipTheme);
  themeToggle.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipTheme(); }
  });
  syncTheme();

  // Theme can change in another tab / the homepage — mirror it live.
  window.addEventListener('storage', function (e) {
    if (e.key === 'beLight.theme') {
      root.classList.toggle('dark', e.newValue === 'dark');
      syncTheme();
    }
  });
})();
</script>

</body>
</html>
