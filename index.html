<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA VIDA EN COLOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  /* Theme variables — --bg / --fg / --fg-dim are read by router.js fallbacks
     and by chapters; keep the names stable. CONFIG-driven values are injected
     after this block and override the light defaults. */
  :root {
    --bg: #F5F5F0;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.45);
    --line: #D9D9D9;
    --line-w: 1px;
    --node-fill: #A0A0A0;
    --node-text: #ffffff;
    --node-size: 4.16vw;
    --veiled-opacity: 0.35;
    --frame-top: 7.41vh;
    --frame-bottom: 92.59vh;
    --tint-fade: 600ms;
  }
  :root.dark {
    --bg: #0D0D0D;
    --fg: #F5F5F0;
    --fg-dim: rgba(245, 245, 240, 0.5);
    --line: #2E2E2E;
    --node-fill: #7A7A7A;
    --node-text: #0D0D0D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    transition: background 0.45s ease, color 0.45s ease;
  }

  #homepage { position: relative; width: 100vw; height: 100vh; }
  #chapter-container {
    display: none;
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  /* === Geometry layer — one full-viewport SVG ============================ */
  /* No viewBox: 1 SVG unit = 1 CSS px, so percentage attributes resolve as
     vw (x-axis) / vh (y-axis) and stroke widths stay in fixed pixels. */
  #board {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }

  #board .guide,
  #board .frame,
  #board .circle {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    pointer-events: none;
    transition: stroke 0.45s ease;
  }

  /* Additive RGB hover tints — isolated group so the circles screen-blend
     with EACH OTHER (overlaps trend toward white) before compositing onto
     the page background. Opacity is driven from CONFIG via JS. */
  #board .tints { isolation: isolate; }
  #board .tint {
    mix-blend-mode: screen;
    pointer-events: none;
    transition: fill-opacity var(--tint-fade) ease;
  }

  /* Invisible hover targets for the three circles. */
  #board .hit {
    fill: transparent;
    stroke: none;
    pointer-events: all;
  }

  /* === Node layer — HTML overlay, same vw/vh coordinate system =========== */
  #nodeLayer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .node {
    position: absolute;
    width: var(--node-size);
    height: var(--node-size);
    transform: translate(-50%, -50%);
    border: none;
    border-radius: 50%;
    background: var(--node-fill);
    color: var(--node-text);
    font-family: 'Space Mono', monospace;
    font-size: max(0.73vw, 8px);
    letter-spacing: 0.08em;
    text-indent: 0.08em; /* re-centre digits: letter-spacing adds a trailing gap */
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    user-select: none;
    transition: transform 0.25s ease, background 0.45s ease, color 0.45s ease;
  }
  .node:hover { transform: translate(-50%, -50%) scale(1.1); }

  /* Node 11 — Da'ath: veiled, inert. */
  .node.veiled { opacity: var(--veiled-opacity); cursor: default; }
  .node.veiled:hover { transform: translate(-50%, -50%); }

  /* === Titles — in the margins, opposite corners ========================= */
  /* They sit OUTSIDE the frame in the margin band and do not overlap the
     frame lines, so no background mask is needed. */
  .title {
    position: absolute;
    left: 6.98vw;
    top: 3.24vh;
    z-index: 1;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: max(0.73vw, 9px);
    letter-spacing: 0.34em;
    text-transform: uppercase;
    white-space: nowrap;
    color: var(--fg-dim);
    user-select: none;
    pointer-events: none;
    transition: color 0.45s ease;
  }
  .title.mirror {
    left: 87.81vw;
    top: 96.11vh;
    transform: rotate(180deg);
    transform-origin: left top;
  }

  /* === Theme toggle — discreet, typographic, top-right corner ============ */
  #themeToggle {
    position: fixed;
    top: calc(var(--frame-top) / 2);
    right: 1vw;
    transform: translateY(-50%);
    z-index: 20;
    border: none;
    background: var(--bg); /* masks the right frame line where they cross */
    color: var(--fg-dim);
    font-family: 'Space Mono', monospace;
    font-size: max(0.57vw, 9px);
    letter-spacing: 0.32em;
    padding: 0.5em 0.4em 0.5em 0.9em;
    cursor: pointer;
    user-select: none;
    transition: color 0.3s ease, background 0.45s ease;
  }
  #themeToggle:hover { color: var(--fg); }
  body.chapter-active #themeToggle { display: none; }
</style>
</head>
<body>

<button id="themeToggle" aria-label="Cambiar tema">○ LUZ</button>

<div id="homepage">
  <svg id="board" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
  <div id="nodeLayer" aria-label="Mapa de capítulos"></div>
  <div class="title">COLOR IN MOTION</div>
  <div class="title mirror" aria-hidden="true">COLOR IN MOTION</div>
</div>

<div id="chapter-container"></div>

<script>
  // =====================================================================
  // CONFIG — single source of truth for the homepage composition.
  // Reference artboard 1920×1080; every value below is vw / vh (except
  // stroke widths, which are fixed CSS pixels and do not scale).
  // =====================================================================
  const CONFIG = {
    // Frame — 4 independent lines reaching the real viewport edges,
    // crossing at the corners.
    frame: {
      top: 7.41,      // vh — top horizontal line
      bottom: 92.59,  // vh — bottom horizontal line
      left: 4.17,     // vw — left vertical line
      right: 95.83,   // vw — right vertical line
    },

    // All geometric lines + circle outlines (light theme; dark in CSS).
    line: {
      color: '#D9D9D9',
      width: 1,       // px, fixed — does not scale with viewport
    },

    // Three overlapping circles — additive RGB light primaries.
    // Perfect circles CONTAINED in the frame: diameter = inner frame height
    // (top frame line to bottom frame line), recomputed in px on resize so
    // they never overflow the frame at any zoom level or aspect ratio.
    circles: {
      radiusFraction: 0.5,  // × inner frame height (0.5 = tangent to both lines)
      cy: 50,               // vh — shared vertical centre (frame midpoint)
      cx: { left: 28.13, center: 50.00, right: 71.88 },  // vw
      // Additive hover hook: each circle tints with its primary on hover;
      // screen blending makes overlap zones trend toward white.
      tint: { left: '#FF0000', center: '#00FF00', right: '#0000FF' },
      tintIntensity: 0.18,  // 0..1 — hover fill opacity (subtle first pass)
      tintFadeMs: 600,
    },

    // Guide lines.
    guides: {
      // 6 horizontals, full viewport width — tangent pairs bracketing
      // the three node rows (top / middle / bottom).
      horizontal: [31.02, 38.43, 46.30, 53.70, 61.67, 69.07],  // vh
      // 3 verticals, frame-top to frame-bottom — tangent to circle edges.
      vertical: [26.04, 52.08, 73.96],  // vw
    },

    // 11 nodes, positioned by centre. Node 11 (Da'ath) is veiled: lighter,
    // translucent, non-routing.
    nodes: {
      radius: 2.08,        // vw
      fill: '#A0A0A0',     // light theme; dark theme in CSS
      veiledOpacity: 0.35,
      items: [
        { num: '01', x: 14.06, y: 50.00 },
        { num: '02', x: 22.24, y: 34.72 },
        { num: '03', x: 22.24, y: 65.37 },
        { num: '04', x: 43.02, y: 34.72 },
        { num: '05', x: 43.02, y: 65.37 },
        { num: '06', x: 50.00, y: 50.00 },
        { num: '07', x: 64.53, y: 34.72 },
        { num: '08', x: 64.53, y: 65.37 },
        { num: '09', x: 78.28, y: 50.00 },
        { num: '10', x: 86.56, y: 50.00 },
        { num: '11', x: 32.55, y: 50.00, veiled: true },
      ],
    },
  };

  // =====================================================================
  // Push CONFIG values into CSS custom properties. Injected as a :root
  // rule (not inline styles) so :root.dark overrides still win.
  // =====================================================================
  const cfgStyle = document.createElement('style');
  cfgStyle.textContent = ':root{'
    + '--line:' + CONFIG.line.color + ';'
    + '--line-w:' + CONFIG.line.width + 'px;'
    + '--node-fill:' + CONFIG.nodes.fill + ';'
    + '--node-size:' + (CONFIG.nodes.radius * 2) + 'vw;'
    + '--veiled-opacity:' + CONFIG.nodes.veiledOpacity + ';'
    + '--frame-top:' + CONFIG.frame.top + 'vh;'
    + '--frame-bottom:' + CONFIG.frame.bottom + 'vh;'
    + '--tint-fade:' + CONFIG.circles.tintFadeMs + 'ms;'
    + '}';
  document.head.appendChild(cfgStyle);

  // =====================================================================
  // Build the geometry once. The SVG has no viewBox, so percentage
  // attributes track the live viewport natively (x% = vw, y% = vh).
  // Only the circle RADIUS needs JS on resize — it derives from the inner
  // frame height so the circles stay contained in the frame (see below).
  // =====================================================================
  const svgNS = 'http://www.w3.org/2000/svg';
  const board = document.getElementById('board');

  function svgEl(name, attrs) {
    const el = document.createElementNS(svgNS, name);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  // All 9 circle elements (tints, outlines, hit targets) share one radius,
  // derived from the inner frame HEIGHT — see updateCircleRadii() below.
  const allCircles = [];
  function circleGeometry(el, cxVw) {
    el.style.cx = cxVw + 'vw';
    el.style.cy = CONFIG.circles.cy + 'vh';
    allCircles.push(el);
  }

  // --- Additive RGB tints (bottom layer, isolated screen-blend group) ---
  const tintGroup = svgEl('g', { class: 'tints' });
  const tintEls = {};
  for (const key of ['left', 'center', 'right']) {
    const tint = svgEl('circle', { class: 'tint' });
    circleGeometry(tint, CONFIG.circles.cx[key]);
    tint.style.fill = CONFIG.circles.tint[key];
    tint.style.fillOpacity = 0;
    tintEls[key] = tint;
    tintGroup.appendChild(tint);
  }
  board.appendChild(tintGroup);

  // --- 6 horizontal guide lines (full viewport width) --------------------
  for (const y of CONFIG.guides.horizontal) {
    board.appendChild(svgEl('line', {
      class: 'guide', x1: '0', y1: y + '%', x2: '100%', y2: y + '%',
    }));
  }

  // --- 3 vertical guide lines (frame top to frame bottom) ----------------
  for (const x of CONFIG.guides.vertical) {
    board.appendChild(svgEl('line', {
      class: 'guide',
      x1: x + '%', y1: CONFIG.frame.top + '%',
      x2: x + '%', y2: CONFIG.frame.bottom + '%',
    }));
  }

  // --- Three circle outlines ---------------------------------------------
  for (const key of ['left', 'center', 'right']) {
    const c = svgEl('circle', { class: 'circle' });
    circleGeometry(c, CONFIG.circles.cx[key]);
    board.appendChild(c);
  }

  // --- Frame: 4 independent lines to the real viewport edges -------------
  board.appendChild(svgEl('line', { class: 'frame', x1: '0', y1: CONFIG.frame.top + '%', x2: '100%', y2: CONFIG.frame.top + '%' }));
  board.appendChild(svgEl('line', { class: 'frame', x1: '0', y1: CONFIG.frame.bottom + '%', x2: '100%', y2: CONFIG.frame.bottom + '%' }));
  board.appendChild(svgEl('line', { class: 'frame', x1: CONFIG.frame.left + '%', y1: '0', x2: CONFIG.frame.left + '%', y2: '100%' }));
  board.appendChild(svgEl('line', { class: 'frame', x1: CONFIG.frame.right + '%', y1: '0', x2: CONFIG.frame.right + '%', y2: '100%' }));

  // --- Hover targets (last in SVG = on top of it; HTML nodes still win) --
  for (const key of ['left', 'center', 'right']) {
    const hit = svgEl('circle', { class: 'hit' });
    circleGeometry(hit, CONFIG.circles.cx[key]);
    hit.addEventListener('mouseenter', () => {
      tintEls[key].style.fillOpacity = CONFIG.circles.tintIntensity;
    });
    hit.addEventListener('mouseleave', () => {
      tintEls[key].style.fillOpacity = 0;
    });
    board.appendChild(hit);
  }

  // --- Circle radius: contained in the frame on ANY aspect ratio ---------
  // Two constraints, take the smaller:
  //   vertical   — r ≤ radiusFraction × inner frame height, so the circles
  //                never cross the top/bottom frame lines;
  //   horizontal — r ≤ distance from the outer circle centres to the side
  //                frame lines, so they never cross the left/right lines.
  // At exactly 16:9 both are equal (tangent all around, the Figma design);
  // off 16:9 the binding constraint shrinks the circles to stay inside.
  // (cx stays in vw, cy in vh — only r needs recomputing on resize.)
  function updateCircleRadii() {
    const innerH = window.innerHeight * (CONFIG.frame.bottom - CONFIG.frame.top) / 100;
    const maxV = innerH * CONFIG.circles.radiusFraction;
    const maxH = window.innerWidth * (CONFIG.circles.cx.left - CONFIG.frame.left) / 100;
    const r = Math.min(maxV, maxH);
    for (const c of allCircles) c.style.r = r + 'px';
  }
  updateCircleRadii();
  // Synchronous on purpose: 9 style writes is cheap, and deferring to rAF
  // can stall in background/hidden pages. ResizeObserver also catches zoom
  // and viewport changes that don't dispatch a window resize event.
  window.addEventListener('resize', updateCircleRadii);
  if (window.ResizeObserver) {
    new ResizeObserver(updateCircleRadii).observe(document.documentElement);
  }

  // --- 11 nodes: HTML buttons in the same vw/vh coordinate system --------
  const nodeLayer = document.getElementById('nodeLayer');
  for (const n of CONFIG.nodes.items) {
    const node = document.createElement('button');
    node.className = 'node' + (n.veiled ? ' veiled' : '');
    node.style.left = n.x + 'vw';
    node.style.top = n.y + 'vh';
    node.textContent = n.num;
    if (n.veiled) {
      node.setAttribute('aria-hidden', 'true');
      node.tabIndex = -1;
    } else {
      node.setAttribute('aria-label', 'Capítulo ' + n.num);
      node.addEventListener('click', () => {
        window.location.hash = '#capitulo-' + n.num;
      });
    }
    nodeLayer.appendChild(node);
  }

  // =====================================================================
  // Theme — light / dark, persisted in localStorage (shared with chapters).
  // =====================================================================
  const rootEl = document.documentElement;
  if (localStorage.getItem('beLight.theme') === 'dark') rootEl.classList.add('dark');

  const toggle = document.getElementById('themeToggle');
  function syncToggle() {
    toggle.textContent = rootEl.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  toggle.addEventListener('click', () => {
    rootEl.classList.toggle('dark');
    localStorage.setItem('beLight.theme', rootEl.classList.contains('dark') ? 'dark' : 'light');
    syncToggle();
  });
  syncToggle();
</script>

<script src="router.js"></script>

</body>
</html>
