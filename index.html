<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLOR IN MOTION</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  /* Theme variables — --bg / --fg / --fg-dim are read by router.js fallbacks
     and by chapters; keep the names stable. CONFIG-driven values are injected
     after this block and override the light defaults. */
  :root {
    --bg: #F5F5F0;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.45);
    --line: #D9D9D9;
    --line-w: 1px;
    --node-fill: #A0A0A0;
    --node-text: #ffffff;
    --veiled-opacity: 0.35;
    --tint-intensity: 0.18;
    --tint-fade: 600ms;
  }
  :root.dark {
    --bg: #0D0D0D;
    --fg: #F5F5F0;
    --fg-dim: rgba(245, 245, 240, 0.5);
    --line: #2E2E2E;
    --node-fill: #7A7A7A;
    --node-text: #0D0D0D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    transition: background 0.45s ease, color 0.45s ease;
  }

  #homepage { position: relative; width: 100vw; height: 100vh; }
  #chapter-container {
    display: none;
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  /* === The whole composition lives in ONE SVG ============================ */
  /* Fixed viewBox 0 0 1920 1080 + preserveAspectRatio="xMidYMid meet":
     the entire artboard scales proportionally to any viewport, centred,
     letterboxed/pillarboxed as needed. Frame, circles, guides, nodes and
     titles share one coordinate system and can NEVER drift apart. */
  #board {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    /* Frame + horizontal guides overshoot the artboard to reach the real
       viewport edges on any aspect ratio — let them render past the viewBox. */
    overflow: visible;
  }

  /* Hairlines: geometry scales with the viewBox, but non-scaling-stroke
     keeps every line crisp at 1px on screen at any zoom or monitor size. */
  #board .guide,
  #board .frame,
  #board .circle {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    vector-effect: non-scaling-stroke;
    pointer-events: none;
    transition: stroke 0.45s ease;
  }

  /* Invisible hover targets for the three circles. Placed FIRST in the SVG
     (visually bottom, and any later pointer-enabled element — the nodes —
     wins hit-testing), so the tints group can follow them as a sibling for
     the pure-CSS :hover rules below. */
  #board .hit {
    fill: transparent;
    stroke: none;
    pointer-events: all;
  }

  /* Additive RGB tints — isolated group so the circles screen-blend with
     EACH OTHER (overlaps trend toward white/secondary colours) before the
     group composites normally onto the page background. */
  #board .tints { isolation: isolate; }
  #board .tint {
    mix-blend-mode: screen;
    fill-opacity: 0;
    pointer-events: none;
    transition: fill-opacity var(--tint-fade) ease;
  }
  #hit-left:hover   ~ .tints .tint-left   { fill-opacity: var(--tint-intensity); }
  #hit-center:hover ~ .tints .tint-center { fill-opacity: var(--tint-intensity); }
  #hit-right:hover  ~ .tints .tint-right  { fill-opacity: var(--tint-intensity); }

  /* === Nodes — SVG groups with direct click handlers ====================== */
  .node { cursor: pointer; pointer-events: all; }
  .node circle {
    fill: var(--node-fill);
    stroke: none;
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.25s ease, fill 0.45s ease;
  }
  .node:hover circle,
  .node:focus-visible circle { transform: scale(1.1); }
  .node:focus { outline: none; }
  .node text {
    fill: var(--node-text);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.08em;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    user-select: none;
    transition: fill 0.45s ease;
  }

  /* Node 11 — Da'ath: veiled, inert. */
  .node.veiled { opacity: var(--veiled-opacity); cursor: default; }
  .node.veiled:hover circle { transform: none; }

  /* === Titles — inside the SVG, in artboard coordinates =================== */
  .title {
    fill: var(--fg-dim);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    user-select: none;
    pointer-events: none;
    transition: fill 0.45s ease;
  }

  /* === Theme toggle — SVG group, top-right margin, scales with the board = */
  /* Same type treatment as .title, but interactive. Lives inside #homepage's
     SVG, so the router hides it automatically when a chapter is active.
     The group pairs the text with an invisible hit rect — spaced-out SVG
     glyphs alone leave click-dead gaps between letters. */
  #themeToggle {
    fill: var(--fg-dim);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: all;
    user-select: none;
    transition: fill 0.3s ease;
  }
  #themeToggle .toggle-hit { fill: transparent; stroke: none; }
  #themeToggle:hover { fill: var(--fg); }
  #themeToggle:focus { outline: none; }
</style>
</head>
<body>

<div id="homepage">
  <svg id="board" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet"
       aria-label="Mapa de capítulos"></svg>
</div>

<div id="chapter-container"></div>

<script>
  // =====================================================================
  // CONFIG — single source of truth for the homepage composition.
  // ALL coordinates are raw pixels on the 1920×1080 Figma artboard; the
  // SVG viewBox scales the whole composition proportionally to any
  // viewport, so nothing here ever needs converting or recomputing.
  // =====================================================================
  const CONFIG = {
    artboard: { w: 1920, h: 1080 },

    // Frame — 4 independent lines spanning the full artboard, crossing at
    // the corners.
    frame: { top: 80, bottom: 1000, left: 80, right: 1840 },

    // All geometric lines + circle outlines (light theme; dark in CSS).
    // Width is in SCREEN px (non-scaling-stroke keeps hairlines crisp).
    // overshoot: how far (artboard units) the frame lines and horizontal
    // guides extend past the artboard on each side, so they always reach
    // the real viewport edges. 5000 covers even extreme aspect ratios
    // (a portrait phone letterboxes ~1540 units; ultrawides ~2300).
    line: { color: '#D9D9D9', width: 1, overshoot: 5000 },

    // Three overlapping circles — additive RGB light primaries. Tangent to
    // the frame: top/bottom lines vertically, left/right lines horizontally.
    circles: {
      r: 460,
      cy: 540,
      cx: { left: 540, center: 960, right: 1380 },
      // Additive hover hook: each circle tints with its primary on hover
      // (pure CSS :hover); screen blending mixes overlap zones additively.
      tint: { left: '#FF0000', center: '#00FF00', right: '#0000FF' },
      tintIntensity: 0.18,  // 0..1 — hover fill opacity (subtle first pass)
      tintFadeMs: 600,
    },

    // Guide lines.
    guides: {
      // 6 horizontals, full artboard width — tangent pairs bracketing the
      // three node rows (top / middle / bottom).
      horizontal: [335, 415, 500, 580, 666, 746],
      // 3 verticals, frame-top to frame-bottom — tangent to circle edges.
      vertical: { x: [500, 1000, 1420], y1: 80, y2: 1000 },
    },

    // 11 nodes, positioned by centre. Node 11 (Da'ath) is veiled: lighter,
    // translucent, non-routing.
    nodes: {
      r: 40,
      fill: '#A0A0A0',     // light theme; dark theme in CSS
      veiledOpacity: 0.35,
      fontSize: 14,
      items: [
        { num: '01', x: 270,  y: 540 },
        { num: '02', x: 427,  y: 375 },
        { num: '03', x: 427,  y: 706 },
        { num: '04', x: 826,  y: 375 },
        { num: '05', x: 826,  y: 706 },
        { num: '06', x: 960,  y: 540 },
        { num: '07', x: 1239, y: 375 },
        { num: '08', x: 1239, y: 706 },
        { num: '09', x: 1503, y: 540 },
        { num: '10', x: 1662, y: 540 },
        { num: '11', x: 625,  y: 540, veiled: true },
      ],
    },

    // Titles — opposite corners of the margin band, in artboard coords.
    titles: {
      text: 'COLOR IN MOTION',
      fontSize: 11,
      top:    { x: 120,  y: 45 },    // reads normally, anchored start
      bottom: { x: 1799, y: 1038 },  // rotated 180° around its anchor
    },

    // Theme toggle — SVG text, top-right margin, anchored end.
    // Keep y equal to titles.top.y so it stays aligned with the title.
    toggle: { x: 1800, y: 46 },
  };

  // =====================================================================
  // Push CONFIG values into CSS custom properties. Injected as a :root
  // rule (not inline styles) so :root.dark overrides still win.
  // =====================================================================
  const cfgStyle = document.createElement('style');
  cfgStyle.textContent = ':root{'
    + '--line:' + CONFIG.line.color + ';'
    + '--line-w:' + CONFIG.line.width + 'px;'
    + '--node-fill:' + CONFIG.nodes.fill + ';'
    + '--veiled-opacity:' + CONFIG.nodes.veiledOpacity + ';'
    + '--tint-intensity:' + CONFIG.circles.tintIntensity + ';'
    + '--tint-fade:' + CONFIG.circles.tintFadeMs + 'ms;'
    + '}';
  document.head.appendChild(cfgStyle);

  // =====================================================================
  // Build the SVG once from CONFIG. One fixed coordinate system — the
  // viewBox does ALL the scaling; no resize listeners, no unit conversion.
  // =====================================================================
  const svgNS = 'http://www.w3.org/2000/svg';
  const board = document.getElementById('board');
  board.setAttribute('viewBox', '0 0 ' + CONFIG.artboard.w + ' ' + CONFIG.artboard.h);

  function svgEl(name, attrs, text) {
    const el = document.createElementNS(svgNS, name);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    if (text != null) el.textContent = text;
    return el;
  }

  // --- Hover targets first: bottom of the paint order, and siblings BEFORE
  //     the tints group so the CSS "#hit-X:hover ~ .tints .tint-X" rules work.
  for (const key of ['left', 'center', 'right']) {
    board.appendChild(svgEl('circle', {
      class: 'hit', id: 'hit-' + key,
      cx: CONFIG.circles.cx[key], cy: CONFIG.circles.cy, r: CONFIG.circles.r,
    }));
  }

  // --- Additive RGB tints (isolated screen-blend group) -------------------
  const tintGroup = svgEl('g', { class: 'tints' });
  for (const key of ['left', 'center', 'right']) {
    tintGroup.appendChild(svgEl('circle', {
      class: 'tint tint-' + key,
      cx: CONFIG.circles.cx[key], cy: CONFIG.circles.cy, r: CONFIG.circles.r,
      fill: CONFIG.circles.tint[key],
    }));
  }
  board.appendChild(tintGroup);

  // --- 6 horizontal guide lines ("infinite": overshoot both sides so they
  //     reach the real viewport edges on any aspect ratio) -----------------
  const OS = CONFIG.line.overshoot;
  for (const y of CONFIG.guides.horizontal) {
    board.appendChild(svgEl('line', {
      class: 'guide', x1: -OS, y1: y, x2: CONFIG.artboard.w + OS, y2: y,
    }));
  }

  // --- 3 vertical guide lines (frame top to frame bottom) -----------------
  for (const x of CONFIG.guides.vertical.x) {
    board.appendChild(svgEl('line', {
      class: 'guide',
      x1: x, y1: CONFIG.guides.vertical.y1,
      x2: x, y2: CONFIG.guides.vertical.y2,
    }));
  }

  // --- Three circle outlines ----------------------------------------------
  for (const key of ['left', 'center', 'right']) {
    board.appendChild(svgEl('circle', {
      class: 'circle',
      cx: CONFIG.circles.cx[key], cy: CONFIG.circles.cy, r: CONFIG.circles.r,
    }));
  }

  // --- Frame: 4 "infinite" lines, cross corners — overshoot past the
  //     artboard so they run edge-to-edge on any screen -------------------
  board.appendChild(svgEl('line', { class: 'frame', x1: -OS, y1: CONFIG.frame.top, x2: CONFIG.artboard.w + OS, y2: CONFIG.frame.top }));
  board.appendChild(svgEl('line', { class: 'frame', x1: -OS, y1: CONFIG.frame.bottom, x2: CONFIG.artboard.w + OS, y2: CONFIG.frame.bottom }));
  board.appendChild(svgEl('line', { class: 'frame', x1: CONFIG.frame.left, y1: -OS, x2: CONFIG.frame.left, y2: CONFIG.artboard.h + OS }));
  board.appendChild(svgEl('line', { class: 'frame', x1: CONFIG.frame.right, y1: -OS, x2: CONFIG.frame.right, y2: CONFIG.artboard.h + OS }));

  // --- 11 nodes: SVG groups, click handlers attached directly -------------
  const nodeGroup = svgEl('g', { class: 'nodes' });
  for (const n of CONFIG.nodes.items) {
    const g = svgEl('g', { class: 'node' + (n.veiled ? ' veiled' : '') });
    g.appendChild(svgEl('circle', { cx: n.x, cy: n.y, r: CONFIG.nodes.r }));
    g.appendChild(svgEl('text', {
      x: n.x, y: n.y, 'font-size': CONFIG.nodes.fontSize,
    }, n.num));
    if (n.veiled) {
      g.setAttribute('aria-hidden', 'true');
    } else {
      g.setAttribute('role', 'link');
      g.setAttribute('tabindex', '0');
      g.setAttribute('aria-label', 'Capítulo ' + n.num);
      const go = () => { window.location.hash = '#capitulo-' + n.num; };
      g.addEventListener('click', go);
      g.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
      });
    }
    nodeGroup.appendChild(g);
  }
  board.appendChild(nodeGroup);

  // --- Titles: opposite corners, bottom one mirrored -----------------------
  board.appendChild(svgEl('text', {
    class: 'title',
    x: CONFIG.titles.top.x, y: CONFIG.titles.top.y,
    'font-size': CONFIG.titles.fontSize,
  }, CONFIG.titles.text));
  board.appendChild(svgEl('text', {
    class: 'title',
    x: CONFIG.titles.bottom.x, y: CONFIG.titles.bottom.y,
    'font-size': CONFIG.titles.fontSize,
    transform: 'rotate(180 ' + CONFIG.titles.bottom.x + ' ' + CONFIG.titles.bottom.y + ')',
    'aria-hidden': 'true',
  }, CONFIG.titles.text));

  // --- Theme toggle: SVG group in the top-right margin, aligned with the
  //     top title and scaling with the composition. The invisible rect is
  //     the real click target (text glyphs alone have hit-test gaps). ------
  const toggle = svgEl('g', {
    id: 'themeToggle',
    role: 'button', tabindex: '0', 'aria-label': 'Cambiar tema',
  });
  toggle.appendChild(svgEl('rect', {
    class: 'toggle-hit',
    x: CONFIG.toggle.x - 130, y: CONFIG.toggle.y - 16,
    width: 140, height: 24,
  }));
  const toggleText = svgEl('text', {
    x: CONFIG.toggle.x, y: CONFIG.toggle.y,
    'font-size': CONFIG.titles.fontSize,
    'text-anchor': 'end',
  });
  toggle.appendChild(toggleText);
  board.appendChild(toggle);

  // =====================================================================
  // Theme — light / dark, persisted in localStorage (shared with chapters).
  // =====================================================================
  const rootEl = document.documentElement;
  if (localStorage.getItem('beLight.theme') === 'dark') rootEl.classList.add('dark');

  function syncToggle() {
    toggleText.textContent = rootEl.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  function flipTheme() {
    rootEl.classList.toggle('dark');
    localStorage.setItem('beLight.theme', rootEl.classList.contains('dark') ? 'dark' : 'light');
    syncToggle();
  }
  toggle.addEventListener('click', flipTheme);
  toggle.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipTheme(); }
  });
  syncToggle();
</script>

<script src="router.js"></script>

</body>
</html>
