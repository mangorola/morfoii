<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA VIDA EN COLOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@200..500&family=Space+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f4f4f1;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.5);
    --guide: #D9D9D9;
    --guide-width: 1.73px;
    --node-fill: #B0B0B0;
    --node-text: #ffffff;
    --node-veiled: #ECECEC;
    --node-veiled-text: #C8C8C8;
  }
  :root.dark {
    --bg: #0a0a0a;
    --fg: #f4f4f1;
    --fg-dim: rgba(244, 244, 241, 0.55);
    --guide: #2a2a2a;
    --node-fill: #6e6e6e;
    --node-text: #f4f4f1;
    --node-veiled: #1f1f1f;
    --node-veiled-text: #3a3a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    transition: background 0.45s ease, color 0.45s ease;
  }

  /* Full-bleed stage: SVG fills the entire viewport. No centring container,
     no fixed canvas — the frame is inset by CONFIG.margin from the REAL
     viewport edges, and the geometry is recomputed on every resize. */
  #homepage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  #chapter-container {
    display: none;
    width: 100vw;
    height: 100vh;
    position: absolute;
    inset: 0;
  }

  .board {
    display: block;
    width: 100vw;
    height: 100vh;
    position: absolute;
    inset: 0;
  }

  /* === Title ============================================================= */
  .title {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.32em;
    fill: var(--fg-dim);
    text-anchor: middle;
    dominant-baseline: middle;
    user-select: none;
    transition: fill 0.45s ease;
  }

  /* === Guide grid (frame + subtle internal verticals/horizontals) ======== */
  .guide-frame {
    fill: none;
    stroke: var(--guide);
    stroke-width: var(--guide-width);
    vector-effect: non-scaling-stroke;
    transition: stroke 0.45s ease;
    pointer-events: none;
  }
  .guide-internal {
    fill: none;
    stroke: var(--guide);
    stroke-width: var(--guide-internal-width);
    vector-effect: non-scaling-stroke;
    transition: stroke 0.45s ease;
    pointer-events: none;
  }

  /* Background mask behind the titles — hides the frame line under the text. */
  .title-bg {
    fill: var(--bg);
    stroke: none;
    pointer-events: none;
    transition: fill 0.45s ease;
  }

  /* === Circles ============================================================ */
  .circle-outline {
    fill: none;
    stroke: var(--guide);
    stroke-width: var(--guide-width);
    vector-effect: non-scaling-stroke;
    pointer-events: none;
    transition: stroke 0.45s ease;
  }

  /* RGB tint fills — additive screen blend; opacity drives the hover hook. */
  .circle-tint {
    mix-blend-mode: screen;
    transition: fill-opacity 0.7s ease;
    pointer-events: none;
  }

  /* Invisible hover targets — sit under the nodes so node clicks win */
  .circle-hit {
    fill: transparent;
    stroke: none;
    pointer-events: all;
    cursor: default;
  }

  /* === Nodes ============================================================= */
  .node { cursor: pointer; }
  .node .node-bg {
    fill: var(--node-fill);
    stroke: none;
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.28s ease, fill 0.45s ease, filter 0.28s ease;
  }
  .node .node-num {
    font-family: 'Space Mono', monospace;
    font-weight: 500;
    fill: var(--node-text);
    text-anchor: middle;
    dominant-baseline: central;
    letter-spacing: 0.05em;
    user-select: none;
    pointer-events: none;
    transition: fill 0.45s ease;
  }
  .node:hover .node-bg {
    transform: scale(1.12);
    filter: drop-shadow(0 0 6px var(--fg-dim));
  }

  /* Node 11 — Da'ath, veiled. Inert. */
  .node.veiled { cursor: default; }
  .node.veiled .node-bg { fill: var(--node-veiled); }
  .node.veiled .node-num { fill: var(--node-veiled-text); }
  .node.veiled:hover .node-bg { transform: none; filter: none; }

  /* === Theme toggle ====================================================== */
  .theme-toggle {
    position: fixed;
    top: 1.25rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: var(--fg-dim);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.32em;
    cursor: pointer;
    padding: 0.4rem 0.2rem;
    z-index: 20;
    user-select: none;
    transition: color 0.3s ease;
  }
  .theme-toggle:hover { color: var(--fg); }
  body.chapter-active .theme-toggle { display: none; }

  @media (max-width: 600px) {
    .theme-toggle { top: 0.8rem; right: 0.8rem; font-size: 0.55rem; }
  }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">○ LUZ</button>

<div id="homepage">
  <!-- The board is built from CONFIG below — see the bootstrap script. -->
  <svg class="board" preserveAspectRatio="xMidYMid meet" aria-label="LA VIDA EN COLOR — mapa de capítulos"></svg>
</div>

<div id="chapter-container"></div>

<script>
  // =====================================================================
  // CONFIG — single source of truth for the Tree homepage composition.
  // Tune values here; the SVG rebuilds on load.
  // =====================================================================
  const CONFIG = {
    // Full-bleed stage: the SVG fills 100vw × 100vh and its viewBox tracks
    // the actual viewport pixels. Everything below is RESPONSIVE — the build
    // function runs on load AND on every resize.

    // Outer frame margin from the REAL viewport edges, in CSS pixels.
    margin: 64,

    // Guide lines — frame (4 outer lines) + subtle internal column/row grid.
    guide: {
      color: '#D9D9D9',         // light-mode colour (dark mode is in CSS)
      frameWidth: 1.73,         // 1.0pt ≈ 1.73px — frame stroke
      internalWidth: 0.6,       // subtle internal guides (thinner)
    },
    showInternalGuides: true,   // set false to keep only the 4-line frame

    // Three large circles — additive RGB primaries.
    //   • LEFT  : cx = frameLeft  + R  (left  edge touches left  frame line)
    //   • MIDDLE: cx = viewportCx       (centred horizontally on the page)
    //   • RIGHT : cx = frameRight − R  (right edge touches right frame line)
    //   All three share circleCy = vertical centre of the inner frame (=
    //   middle node row).
    // R is derived from inner frame WIDTH and clamped so circles fit
    // vertically. R must be > innerWidth/4 for L–R to overlap in the middle.
    circleRadiusFraction: 0.32, // R = max(this·innerW, innerW/4+1) ∧ ≤ innerH/2
    circleColors: {
      r: '#ff0000',  // LEFT
      g: '#00ff00',  // MIDDLE
      b: '#1060ff',  // RIGHT
    },

    // Additive-light hover hook. Hovering a circle fades its tint in; the
    // mix-blend-mode: screen on the tint group makes overlap zones combine
    // toward yellow / cyan / magenta / white (visible in dark mode).
    tint: {
      rest: 0.00,
      hover: 0.55,
      fadeMs: 700,
    },

    // 11 nodes in a 3-row staggered grid. Coordinates are FRACTIONS of the
    // inner frame (0..1). Origin (0,0) is the inner-frame top-left corner.
    //   xFrac : horizontal position within inner frame width
    //   row   : 'top' | 'mid' | 'bot' → looks up rows[row] for yFrac
    //   veiled: node 11 (Da'ath) — undefined / non-routing
    rows: { top: 0.293, mid: 0.500, bot: 0.707 },
    nodeRadius: 26,        // fixed pixel size — clickable target stays constant
    veiledRadius: 24,
    nodes: [
      { num: '01', xFrac: 0.083, row: 'mid' },                 // far left
      { num: '02', xFrac: 0.193, row: 'top' },
      { num: '03', xFrac: 0.193, row: 'bot' },
      { num: '11', xFrac: 0.291, row: 'mid', veiled: true },   // Da'ath
      { num: '04', xFrac: 0.390, row: 'top' },
      { num: '05', xFrac: 0.390, row: 'bot' },
      { num: '06', xFrac: 0.500, row: 'mid' },                 // triple overlap
      { num: '07', xFrac: 0.610, row: 'top' },
      { num: '08', xFrac: 0.610, row: 'bot' },
      { num: '09', xFrac: 0.720, row: 'mid' },
      { num: '10', xFrac: 0.851, row: 'mid' },                 // far right
    ],

    // Titles — "LA VIDA EN COLOR" sits ON the frame lines (top + bottom),
    // mirrored at the bottom. A background mask hides the frame line where
    // it would cut through the letters.
    title: {
      text: 'LA VIDA EN COLOR',
      fontSize: 14,
      bgPaddingX: 18,   // horizontal padding around text in the bg mask
      bgPaddingY: 3,    // vertical padding around text in the bg mask
    },
  };

  // =====================================================================
  // Build the SVG from CONFIG + the live viewport. Runs on load AND on every
  // resize, so the frame, circles and nodes track the real viewport edges.
  // =====================================================================
  const svgNS = 'http://www.w3.org/2000/svg';
  const board = document.querySelector('.board');

  // Push CONFIG-controlled style values into CSS custom properties.
  const rootEl = document.documentElement;
  rootEl.style.setProperty('--guide-width', CONFIG.guide.frameWidth + 'px');
  rootEl.style.setProperty('--guide-internal-width', CONFIG.guide.internalWidth + 'px');
  if (!rootEl.classList.contains('dark')) {
    rootEl.style.setProperty('--guide', CONFIG.guide.color);
  }

  function svgEl(name, attrs, text) {
    const el = document.createElementNS(svgNS, name);
    if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
    if (text != null) el.textContent = text;
    return el;
  }

  // Hover state kept across rebuilds so resizing while hovered doesn't flicker.
  const tintState = { r: CONFIG.tint.rest, g: CONFIG.tint.rest, b: CONFIG.tint.rest };

  function build() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const M = CONFIG.margin;
    const innerW = Math.max(0, W - 2 * M);
    const innerH = Math.max(0, H - 2 * M);
    const frameLeft  = M;
    const frameRight = W - M;
    const frameTop   = M;
    const frameBot   = H - M;
    const cxFrame    = W / 2;
    const cyFrame    = H / 2;  // == frameTop + innerH/2 == middle node row

    // Circle radius: target = CONFIG fraction of inner width, but clamp to fit
    // vertically AND to satisfy R > innerW/4 (so L–R overlap exists).
    const minR = innerW / 4 + 1;
    const maxR = innerH / 2;
    let R = CONFIG.circleRadiusFraction * innerW;
    if (R < minR) R = minR;
    if (R > maxR) R = maxR;

    // Three circle centres derived from the live frame.
    const circles = [
      { id: 'r', cx: frameLeft  + R, color: CONFIG.circleColors.r },  // LEFT
      { id: 'g', cx: cxFrame,        color: CONFIG.circleColors.g },  // MIDDLE
      { id: 'b', cx: frameRight - R, color: CONFIG.circleColors.b },  // RIGHT
    ];

    // SVG viewBox tracks the viewport — 1 SVG unit = 1 CSS pixel.
    board.setAttribute('viewBox', `0 0 ${W} ${H}`);

    // Tear down and rebuild. Cheap at this element count and avoids divergent
    // state between attributes and listeners.
    while (board.firstChild) board.removeChild(board.firstChild);

    // --- Subtle internal guides (behind everything) ----------------------
    if (CONFIG.showInternalGuides) {
      // Verticals: one per unique node column (xFrac → absolute x).
      const colXs = [...new Set(CONFIG.nodes.map(n => frameLeft + n.xFrac * innerW))]
        .sort((a, b) => a - b);
      colXs.forEach(x => {
        board.appendChild(svgEl('line', {
          class: 'guide-internal',
          x1: x, y1: frameTop, x2: x, y2: frameBot,
        }));
      });
      // Horizontals: one per unique node row.
      const rowYs = [...new Set(CONFIG.nodes.map(n => frameTop + CONFIG.rows[n.row] * innerH))]
        .sort((a, b) => a - b);
      rowYs.forEach(y => {
        board.appendChild(svgEl('line', {
          class: 'guide-internal',
          x1: frameLeft, y1: y, x2: frameRight, y2: y,
        }));
      });
    }

    // --- Three circles: tints (additive blend) ---------------------------
    const tintGroup = svgEl('g', { id: 'rgb-tints', style: 'isolation: isolate' });
    const tintEls = {};
    circles.forEach(c => {
      const t = svgEl('circle', {
        class: 'circle-tint',
        cx: c.cx, cy: cyFrame, r: R,
        fill: c.color,
        'fill-opacity': tintState[c.id],
      });
      tintEls[c.id] = t;
      tintGroup.appendChild(t);
    });
    board.appendChild(tintGroup);

    // --- Circle outlines ------------------------------------------------
    circles.forEach(c => {
      board.appendChild(svgEl('circle', {
        class: 'circle-outline',
        cx: c.cx, cy: cyFrame, r: R,
      }));
    });

    // --- Hover targets (under nodes; nodes capture clicks on top) -------
    // Hook: extend to track multi-cursor / touch state.
    circles.forEach(c => {
      const hit = svgEl('circle', {
        class: 'circle-hit',
        cx: c.cx, cy: cyFrame, r: R,
        'data-tint': c.id,
      });
      hit.addEventListener('mouseenter', () => {
        tintState[c.id] = CONFIG.tint.hover;
        tintEls[c.id].setAttribute('fill-opacity', CONFIG.tint.hover);
      });
      hit.addEventListener('mouseleave', () => {
        tintState[c.id] = CONFIG.tint.rest;
        tintEls[c.id].setAttribute('fill-opacity', CONFIG.tint.rest);
      });
      board.appendChild(hit);
    });

    // --- Nodes (drawn last; own pointer events) -------------------------
    CONFIG.nodes.forEach(n => {
      const nx = frameLeft + n.xFrac * innerW;
      const ny = frameTop  + CONFIG.rows[n.row] * innerH;
      const r  = n.veiled ? CONFIG.veiledRadius : CONFIG.nodeRadius;
      const g  = svgEl('g', {
        class: 'node' + (n.veiled ? ' veiled' : ''),
        'data-num': n.num,
      });
      g.appendChild(svgEl('circle', { class: 'node-bg', cx: nx, cy: ny, r }));
      g.appendChild(svgEl('text', {
        class: 'node-num',
        x: nx, y: ny,
        'font-size': r * 0.55,
      }, n.num));
      if (!n.veiled) {
        g.addEventListener('click', () => {
          window.location.hash = '#capitulo-' + n.num;
        });
      }
      board.appendChild(g);
    });

    // --- Frame: 4 outer lines (drawn AFTER circles so they sit on top
    //     where the circles touch the frame) ----------------------------
    board.appendChild(svgEl('line', { class: 'guide-frame', x1: frameLeft,  y1: frameTop, x2: frameRight, y2: frameTop })); // top
    board.appendChild(svgEl('line', { class: 'guide-frame', x1: frameLeft,  y1: frameBot, x2: frameRight, y2: frameBot })); // bottom
    board.appendChild(svgEl('line', { class: 'guide-frame', x1: frameLeft,  y1: frameTop, x2: frameLeft,  y2: frameBot })); // left
    board.appendChild(svgEl('line', { class: 'guide-frame', x1: frameRight, y1: frameTop, x2: frameRight, y2: frameBot })); // right

    // --- Titles ON the frame lines (with bg mask) -----------------------
    function placeTitleOnFrame(yLine, mirrored) {
      const t = svgEl('text', {
        class: 'title',
        x: cxFrame,
        y: yLine,
        'font-size': CONFIG.title.fontSize,
      }, CONFIG.title.text);
      if (mirrored) t.setAttribute('transform', `rotate(180 ${cxFrame} ${yLine})`);
      board.appendChild(t);

      // Mask the frame line behind the text. Rotation is around the text
      // centre, so the unrotated bbox aligns either way.
      const bb = t.getBBox();
      const px = CONFIG.title.bgPaddingX;
      const py = CONFIG.title.bgPaddingY;
      board.insertBefore(svgEl('rect', {
        class: 'title-bg',
        x: bb.x - px, y: bb.y - py,
        width:  bb.width  + 2 * px,
        height: bb.height + 2 * py,
      }), t);
    }
    placeTitleOnFrame(frameTop, false);
    placeTitleOnFrame(frameBot, true);
  }

  // Initial build + rebuild on resize (rAF-throttled).
  let rafPending = false;
  function scheduleBuild() {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => { rafPending = false; build(); });
  }
  build();
  window.addEventListener('resize', scheduleBuild);
  // Rebuild once fonts load — title bg-mask sizing depends on the real metrics.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(build).catch(() => {});
  }

  // =====================================================================
  // Theme — light / dark, persisted in localStorage.
  // =====================================================================
  const stored = localStorage.getItem('beLight.theme');
  if (stored === 'dark') rootEl.classList.add('dark');

  const toggle = document.getElementById('themeToggle');
  function syncToggle() {
    toggle.textContent = rootEl.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  function applyGuideForTheme() {
    if (rootEl.classList.contains('dark')) {
      rootEl.style.removeProperty('--guide');  // let :root.dark { --guide } win
    } else {
      rootEl.style.setProperty('--guide', CONFIG.guide.color);
    }
  }
  toggle.addEventListener('click', () => {
    rootEl.classList.toggle('dark');
    localStorage.setItem('beLight.theme', rootEl.classList.contains('dark') ? 'dark' : 'light');
    syncToggle();
    applyGuideForTheme();
  });
  syncToggle();
  applyGuideForTheme();
</script>

<script src="router.js"></script>

</body>
</html>
