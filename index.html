<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SER LUZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f0f0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Space Grotesk', sans-serif;
        }
        #homepage { width: 100%; height: 100%; position: relative; }
        #chapter-container { display: none; width: 100%; height: 100%; }
        canvas { display: block; }

        .label-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .panel-label {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 9px;
            font-weight: 200;
            letter-spacing: 0.2em;
            color: rgba(0,0,0,0);
            transition: color 0.6s ease, text-shadow 0.6s ease;
            user-select: none;
            transform: translate(-50%, -50%);
            will-change: transform;
        }
        .panel-label.visible {
            color: rgba(80,80,80,0.7);
        }
        .panel-label.active {
            color: rgba(60,60,60,0.85);
        }

        .title-area {
            position: fixed;
            bottom: clamp(20px, 3.5vh, 45px);
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .title-main {
            font-size: clamp(10px, 0.9vw, 14px);
            font-weight: 200;
            letter-spacing: 0.4em;
            color: rgba(0,0,0,0.15);
        }

        .nav-hint {
            position: fixed;
            bottom: clamp(50px, 7vh, 80px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: rgba(0,0,0,0.12);
            z-index: 10;
            pointer-events: none;
            opacity: 1;
            transition: opacity 2s ease;
        }
    </style>
</head>
<body>

<div id="homepage">
    <div class="label-layer" id="labelLayer"></div>
    <div class="title-area"><div class="title-main">SER LUZ</div></div>
    <div class="nav-hint" id="navHint">SCROLL PARA EXPLORAR</div>
</div>

<div id="chapter-container"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const PANEL_COLORS = [
    { name: 'Red',          h: 0,   s: 1.0,  l: 0.50, hex: '#ff0000' },
    { name: 'Red-Orange',   h: 15,  s: 1.0,  l: 0.50, hex: '#ff4400' },
    { name: 'Orange',       h: 28,  s: 1.0,  l: 0.50, hex: '#ff7700' },
    { name: 'Amber',        h: 40,  s: 1.0,  l: 0.50, hex: '#ff9900' },
    { name: 'Yellow',       h: 52,  s: 1.0,  l: 0.50, hex: '#ffd500' },
    { name: 'Yellow-Green', h: 72,  s: 0.95, l: 0.45, hex: '#6ecc00' },
    { name: 'Green-Cyan',   h: 155, s: 0.90, l: 0.42, hex: '#0ad468' },
    { name: 'Cyan',         h: 182, s: 0.95, l: 0.44, hex: '#05c8d8' },
    { name: 'Blue-Cyan',    h: 200, s: 0.95, l: 0.46, hex: '#0590e0' },
    { name: 'Blue',         h: 218, s: 0.92, l: 0.50, hex: '#1060e8' },
];

const N = PANEL_COLORS.length;
const PANEL_SIZE = 2.8;
const PANEL_THICKNESS = 0.12;
const SPACING = 3.2;
const FAN_ANGLE = Math.PI * 0.18;
const FAN_Z = 1.8;

let currentIndex = 0;
let targetIndex = 0;
let scrollAccum = 0;
let hoveredIndex = -1;
let mouseNDC = { x: 0, y: 0 };
let smoothMouse = { x: 0, y: 0 };

// --- performance state ---
const TARGET_FPS = 30;
const FRAME_MS = 1000 / TARGET_FPS;
let lastFrame = 0;
let idle = false;          // true when the scene has fully settled; skips rendering
let pointerDirty = true;   // raycast only when the pointer changed or panels are moving
let prevHovered = -1;
function wake() { idle = false; }

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x00000);
scene.fog = new THREE.Fog(0xf0f0f0, 18, 40);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.8, 10);
camera.lookAt(0, 0.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('homepage').insertBefore(renderer.domElement, document.getElementById('labelLayer'));

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.55, 0.7, 0.5
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 8);
scene.add(dirLight);

const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
backLight.position.set(-3, 5, -5);
scene.add(backLight);

const floorGeo = new THREE.PlaneGeometry(60, 30);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0xf2f2f2,
    roughness: 0.4,
    metalness: 0.0,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -PANEL_SIZE / 2 - 0.3;
scene.add(floor);

const panelGroups = [];
const panelMeshes = [];
const glowLights = [];
const floorLights = [];

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

PANEL_COLORS.forEach((pc, i) => {
    const color = new THREE.Color(pc.hex);

    const group = new THREE.Group();
    scene.add(group);
    panelGroups.push(group);

    const geo = new THREE.BoxGeometry(PANEL_SIZE, PANEL_SIZE, PANEL_THICKNESS, 1, 1, 1);
    const mat = new THREE.MeshPhysicalMaterial({
        color: color,
        transparent: true,
        opacity: 0.82,
        roughness: 0.12,
        metalness: 0.0,
        transmission: 0.5,
        thickness: 2.5,
        ior: 1.45,
        clearcoat: 0.3,
        clearcoatRoughness: 0.2,
        envMapIntensity: 0.5,
        side: THREE.DoubleSide,
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData.index = i;
    group.add(mesh);
    panelMeshes.push(mesh);

    const edgeColor = color.clone().multiplyScalar(0.85);
    const edgeMatRight = new THREE.MeshPhysicalMaterial({
        color: edgeColor,
        transparent: true,
        opacity: 0.85,
        roughness: 0.08,
        metalness: 0.05,
        clearcoat: 0.5,
        side: THREE.DoubleSide,
    });

    const rightEdge = new THREE.Mesh(
        new THREE.PlaneGeometry(PANEL_THICKNESS, PANEL_SIZE),
        edgeMatRight
    );
    rightEdge.position.set(PANEL_SIZE / 2, 0, 0);
    rightEdge.rotation.y = Math.PI / 2;
    group.add(rightEdge);

    const leftEdge = new THREE.Mesh(
        new THREE.PlaneGeometry(PANEL_THICKNESS, PANEL_SIZE),
        edgeMatRight.clone()
    );
    leftEdge.position.set(-PANEL_SIZE / 2, 0, 0);
    leftEdge.rotation.y = -Math.PI / 2;
    group.add(leftEdge);

    const topEdge = new THREE.Mesh(
        new THREE.PlaneGeometry(PANEL_SIZE, PANEL_THICKNESS),
        edgeMatRight.clone()
    );
    topEdge.position.set(0, PANEL_SIZE / 2, 0);
    topEdge.rotation.x = Math.PI / 2;
    group.add(topEdge);

    const bottomEdge = new THREE.Mesh(
        new THREE.PlaneGeometry(PANEL_SIZE, PANEL_THICKNESS),
        edgeMatRight.clone()
    );
    bottomEdge.position.set(0, -PANEL_SIZE / 2, 0);
    bottomEdge.rotation.x = -Math.PI / 2;
    group.add(bottomEdge);

    const glowLight = new THREE.PointLight(color, 2.5, 10, 1.4);
    glowLight.position.set(0, 0, 0.5);
    group.add(glowLight);
    glowLights.push(glowLight);

    const floorLight = new THREE.PointLight(color, 2.0, 8, 1.6);
    floorLight.position.set(0, -PANEL_SIZE / 2 - 0.2, 0.3);
    group.add(floorLight);
    floorLights.push(floorLight);

    const reflGeo = new THREE.PlaneGeometry(PANEL_SIZE * 1.4, PANEL_SIZE * 0.7);
    const reflMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.14,
        side: THREE.DoubleSide,
        depthWrite: false,
    });
    const reflMesh = new THREE.Mesh(reflGeo, reflMat);
    reflMesh.rotation.x = -Math.PI / 2;
    reflMesh.position.y = -PANEL_SIZE / 2 - 0.28;
    reflMesh.position.z = 0.3;
    group.add(reflMesh);
    reflMesh.userData.isReflection = true;
});

const labelLayer = document.getElementById('labelLayer');
const labels = [];
PANEL_COLORS.forEach((pc, i) => {
    const el = document.createElement('div');
    el.className = 'panel-label';
    el.textContent = String(i + 1).padStart(2, '0');
    labelLayer.appendChild(el);
    labels.push(el);
});

function getCarouselTransform(index, active) {
    const offset = index - active;
    const absOff = Math.abs(offset);
    const sign = Math.sign(offset);

    let x, z, rotY;

    if (absOff < 0.01) {
        x = 0;
        z = 0;
        rotY = 0;
    } else {
        x = sign * (SPACING * 0.6 + (absOff - 1) * SPACING * 0.85);
        z = -absOff * FAN_Z;
        rotY = -sign * FAN_ANGLE * Math.min(absOff, 2.5);
    }

    return { x, y: 0.6, z, rotY };
}

function updateCarousel(dt) {
    const lerpSpeed = 4.0;
    const diff = targetIndex - currentIndex;
    currentIndex += diff * lerpSpeed * dt;

    if (Math.abs(diff) < 0.001) currentIndex = targetIndex;

    // accumulates the largest remaining change this frame; used for idle detection
    let motion = Math.abs(diff);

    panelGroups.forEach((group, i) => {
        const t = getCarouselTransform(i, currentIndex);

        const dx = t.x - group.position.x;
        const dy = t.y - group.position.y;
        const dz = t.z - group.position.z;
        group.position.x += dx * lerpSpeed * dt;
        group.position.y += dy * lerpSpeed * dt;
        group.position.z += dz * lerpSpeed * dt;
        motion = Math.max(motion, Math.abs(dx), Math.abs(dy), Math.abs(dz));

        let targetRotY = t.rotY;
        const currRot = group.rotation.y;
        const dRot = targetRotY - currRot;
        group.rotation.y += dRot * lerpSpeed * dt;
        motion = Math.max(motion, Math.abs(dRot));

        const distToActive = Math.abs(i - currentIndex);
        const isHovered = hoveredIndex === i;

        const baseGlow = distToActive < 0.5 ? 4.5 : Math.max(1.5, 3.5 - distToActive * 0.5);
        const hoverBoost = isHovered ? 5.0 : 0;
        const dGlow = (baseGlow + hoverBoost) - glowLights[i].intensity;
        glowLights[i].intensity += dGlow * 7 * dt;

        const baseFloor = distToActive < 0.5 ? 3.5 : Math.max(1.0, 2.8 - distToActive * 0.4);
        const floorBoost = isHovered ? 4.0 : 0;
        const dFloor = (baseFloor + floorBoost) - floorLights[i].intensity;
        floorLights[i].intensity += dFloor * 7 * dt;

        const targetOpacity = isHovered ? 0.88 : (distToActive < 0.5 ? 0.78 : Math.max(0.48, 0.72 - distToActive * 0.05));
        const dOpac = targetOpacity - panelMeshes[i].material.opacity;
        panelMeshes[i].material.opacity += dOpac * 6 * dt;

        const liftTarget = isHovered ? 0.2 : 0;
        const hoverY = group.userData.hoverLift || 0;
        group.userData.hoverLift = hoverY + (liftTarget - hoverY) * 7 * dt;
        group.position.y += group.userData.hoverLift;

        // cache the reflection mesh lookup after the first frame
        const refl = group.userData.refl ||
            (group.userData.refl = group.children.find(c => c.userData && c.userData.isReflection));
        let dRefl = 0;
        if (refl) {
            const reflTarget = distToActive < 0.5 ? 0.25 : Math.max(0.08, 0.18 - distToActive * 0.02);
            const reflHover = isHovered ? 0.2 : 0;
            dRefl = (reflTarget + reflHover) - refl.material.opacity;
            refl.material.opacity += dRefl * 4 * dt;
        }

        // brightness/opacity changes are visible too — weight them into the motion metric
        motion = Math.max(motion, Math.abs(dGlow) * 0.1, Math.abs(dFloor) * 0.1, Math.abs(dOpac), Math.abs(dRefl));
    });

    return motion;
}

function updateLabels() {
    const tempVec = new THREE.Vector3();

    panelGroups.forEach((group, i) => {
        tempVec.set(0, PANEL_SIZE / 2 + 0.4, 0);
        group.localToWorld(tempVec);
        tempVec.project(camera);

        const x = (tempVec.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-tempVec.y * 0.5 + 0.5) * window.innerHeight;

        // transform-only positioning keeps these on the compositor (no layout reflow)
        labels[i].style.transform = `translate(-50%, -50%) translate(${x.toFixed(1)}px, ${y.toFixed(1)}px)`;

        const dist = Math.abs(i - currentIndex);
        const cls = dist < 0.5 ? 'panel-label active'
                  : dist < 2.5 ? 'panel-label visible'
                  : 'panel-label';
        if (labels[i].className !== cls) labels[i].className = cls;
    });
}

function navigate(dir) {
    targetIndex = Math.max(0, Math.min(N - 1, targetIndex + dir));
    const hint = document.getElementById('navHint');
    if (hint) hint.style.opacity = '0';
    wake();
}

window.addEventListener('wheel', (e) => {
    e.preventDefault();
    scrollAccum += e.deltaY;
    if (Math.abs(scrollAccum) > 50) {
        navigate(scrollAccum > 0 ? 1 : -1);
        scrollAccum = 0;
    }
}, { passive: false });

window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
});

let touchStartX = 0;
window.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
window.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) navigate(dx < 0 ? 1 : -1);
});

// throttled to ~33 Hz — the parallax/hover is smoothed in the render loop, so
// sampling the pointer more often than that is wasted work
let lastMove = 0;
window.addEventListener('mousemove', (e) => {
    const now = performance.now();
    if (now - lastMove < 30) return;
    lastMove = now;
    mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
    pointer.set(mouseNDC.x, mouseNDC.y);
    pointerDirty = true;
    wake();
}, { passive: true });

window.addEventListener('click', (e) => {
    if (e.target.tagName === 'A') return;
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(panelMeshes);
    if (hits.length > 0) {
        const idx = hits[0].object.userData.index;
        if (Math.abs(idx - targetIndex) < 0.5) {
            const num = String(idx + 1).padStart(2, '0');
            window.location.hash = '#capitulo-' + num;
        } else {
            targetIndex = idx;
        }
        const hint = document.getElementById('navHint');
        if (hint) hint.style.opacity = '0';
    }
    wake();
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    wake();
});

document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
        lastTime = performance.now();
        lastFrame = 0;
        wake();
    }
});

let lastTime = performance.now();

function animate(time) {
    requestAnimationFrame(animate);

    // Pause entirely when the tab isn't visible.
    if (document.hidden) return;

    // Cap the work to ~30fps. The rAF callback still fires at the display rate,
    // but we only run the simulation/render on frames past the interval.
    if (time - lastFrame < FRAME_MS - 1) return;

    // Fully settled: nothing is moving and the pointer is parked. Skip the
    // expensive render entirely until the next interaction calls wake().
    if (idle) return;

    lastFrame = time;
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;

    smoothMouse.x += (mouseNDC.x - smoothMouse.x) * 2 * dt;
    smoothMouse.y += (mouseNDC.y - smoothMouse.y) * 2 * dt;

    camera.position.x = smoothMouse.x * 0.5;
    camera.position.y = 1.8 + smoothMouse.y * 0.3;
    camera.lookAt(0, 0.6, 0);

    // Raycast only when the pointer moved or panels are still sliding —
    // a stationary cursor over a settled scene can't change what's hovered.
    if (pointerDirty || Math.abs(targetIndex - currentIndex) > 0.001) {
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(panelMeshes);
        hoveredIndex = hits.length > 0 ? hits[0].object.userData.index : -1;
        renderer.domElement.style.cursor = hoveredIndex >= 0 ? 'pointer' : 'default';
        pointerDirty = false;
    }

    const motion = updateCarousel(dt);
    updateLabels();
    composer.render();

    // Decide whether the scene has come to rest this frame.
    const mouseSettled = Math.abs(mouseNDC.x - smoothMouse.x) < 0.0015 &&
                         Math.abs(mouseNDC.y - smoothMouse.y) < 0.0015;
    if (motion < 0.0008 && mouseSettled && currentIndex === targetIndex && hoveredIndex === prevHovered) {
        idle = true;
    }
    prevHovered = hoveredIndex;
}

function handleRoute() {
    const hash = window.location.hash;
    const homepage = document.getElementById('homepage');
    const container = document.getElementById('chapter-container');

    if (!hash || hash === '#' || hash === '#home') {
        homepage.style.display = 'block';
        container.style.display = 'none';
        container.innerHTML = '';
    } else if (hash.startsWith('#capitulo-')) {
        homepage.style.display = 'none';
        container.style.display = 'block';
        const num = hash.replace('#capitulo-', '');
        const chapterMap = {
            '01': 'cap-01-focus.html',
            '02': 'cap-02-path.html',
            '03': 'cap-03-adaptability.html',
            '04': 'cap-04.html',
            '05': 'cap-05.html',
            '06': 'cap-06.html',
            '07': 'cap-07.html',
            '08': 'cap-08.html',
            '09': 'cap-09.html',
            '10': 'cap-10.html',
        };
        const file = chapterMap[num];
        if (file) {
            fetch(file)
                .then(r => {
                    if (!r.ok) throw new Error('Not found');
                    return r.text();
                })
                .then(html => { container.innerHTML = html; })
                .catch(() => {
                    container.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;">
                            <div style="text-align:center;">
                                <p style="font-size:14px;font-weight:200;letter-spacing:0.2em;color:rgba(0,0,0,0.3);margin-bottom:20px;">CHAPTER ${num}</p>
                                <p style="font-size:12px;font-weight:300;color:rgba(0,0,0,0.2);">Coming soon</p>
                                <a href="#home" style="display:inline-block;margin-top:30px;font-size:11px;font-weight:300;letter-spacing:0.15em;color:rgba(0,0,0,0.25);text-decoration:none;border-bottom:1px solid rgba(0,0,0,0.1);padding-bottom:2px;">BACK</a>
                            </div>
                        </div>
                    `;
                });
        }
    }
}

window.addEventListener('hashchange', handleRoute);
handleRoute();
requestAnimationFrame(animate);

</script>

</body>
</html>
