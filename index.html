<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE LIGHT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f2f2;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            cursor: default;
        }

        #homepage {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #chapter-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        .scene {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            perspective: 1400px;
            transform-style: preserve-3d;
        }

        .scene-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
        }

        .color-bleed-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .color-bleed {
            position: absolute;
            border-radius: 40%;
            filter: blur(70px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .panel {
            position: absolute;
            top: 50%;
            border-radius: 3px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        .panel-face-front {
            position: absolute;
            inset: 0;
            border-radius: 3px;
            backface-visibility: hidden;
            overflow: hidden;
        }

        .panel-face-front::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                170deg,
                rgba(255,255,255,0.45) 0%,
                rgba(255,255,255,0.18) 25%,
                rgba(255,255,255,0.04) 55%,
                rgba(255,255,255,0.1) 85%,
                rgba(255,255,255,0.2) 100%
            );
            z-index: 2;
        }

        .panel-face-front::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.25) 0%,
                transparent 100%
            );
            z-index: 3;
            border-radius: 3px 3px 0 0;
        }

        .panel-inner-glow {
            position: absolute;
            inset: 10%;
            border-radius: 50%;
            filter: blur(25px);
            z-index: 1;
            transition: opacity 0.8s ease;
        }

        .panel-edge-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
            transform: translateX(50%) rotateY(90deg);
            transform-origin: center center;
            backface-visibility: hidden;
            border-radius: 0 2px 2px 0;
        }

        .panel-edge-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            transform: translateY(50%) rotateX(-90deg);
            transform-origin: center center;
            backface-visibility: hidden;
            border-radius: 0 0 2px 2px;
        }

        .panel-top-light {
            position: absolute;
            top: -1px;
            left: 5%;
            right: 5%;
            height: 2px;
            z-index: 5;
        }

        .panel-right-light {
            position: absolute;
            top: 5%;
            right: -1px;
            bottom: 5%;
            width: 2px;
            z-index: 5;
        }

        .panel-left-light {
            position: absolute;
            top: 5%;
            left: -1px;
            bottom: 5%;
            width: 2px;
            z-index: 5;
        }

        .panel-halo {
            position: absolute;
            inset: -25px;
            border-radius: 16px;
            filter: blur(30px);
            pointer-events: none;
            z-index: -1;
            transition: opacity 0.8s ease, inset 0.8s ease, filter 0.8s ease;
        }

        .panel-light-cast {
            position: absolute;
            bottom: -25%;
            left: -15%;
            right: -15%;
            height: 60%;
            filter: blur(40px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -2;
            transition: opacity 0.8s ease;
        }

        .panel-number {
            position: absolute;
            top: -32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 200;
            letter-spacing: 0.2em;
            color: rgba(0,0,0,0);
            transition: color 0.7s ease, text-shadow 0.7s ease;
            user-select: none;
            white-space: nowrap;
            z-index: 10;
        }

        .title-area {
            position: fixed;
            bottom: clamp(24px, 4vh, 50px);
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .title-main {
            font-size: clamp(11px, 1vw, 15px);
            font-weight: 200;
            letter-spacing: 0.4em;
            color: rgba(0,0,0,0.18);
        }

        @media (max-width: 768px) {
            .scene {
                width: 90vw;
                height: 350px;
                transform: translate(-50%, -50%) scale(0.75);
            }
            .panel-number {
                font-size: 9px;
                top: -22px;
            }
        }
    </style>
</head>
<body>

<div id="homepage">
    <div class="color-bleed-layer" id="bleedLayer"></div>
    <div class="scene">
        <div class="scene-inner" id="sceneInner"></div>
    </div>
    <div class="title-area">
        <div class="title-main">BE LIGHT</div>
    </div>
</div>

<div id="chapter-container"></div>

<script>
(function() {

    const panels = [
        { h: 0,   s: 85, l: 52, h2: 8,   s2: 88, l2: 50 },
        { h: 12,  s: 88, l: 54, h2: 22,  s2: 90, l2: 52 },
        { h: 25,  s: 90, l: 56, h2: 35,  s2: 88, l2: 54 },
        { h: 38,  s: 88, l: 55, h2: 48,  s2: 85, l2: 52 },
        { h: 52,  s: 90, l: 54, h2: 56,  s2: 88, l2: 52 },
        { h: 68,  s: 78, l: 50, h2: 85,  s2: 72, l2: 48 },
        { h: 140, s: 65, l: 48, h2: 165, s2: 70, l2: 46 },
        { h: 178, s: 75, l: 48, h2: 190, s2: 78, l2: 46 },
        { h: 198, s: 80, l: 50, h2: 210, s2: 82, l2: 48 },
        { h: 215, s: 82, l: 52, h2: 225, s2: 85, l2: 50 },
    ];

    const N = panels.length;
    const sceneInner = document.getElementById('sceneInner');
    const bleedLayer = document.getElementById('bleedLayer');

    const panelWidth = '75px';
    const panelHeight = '280px';

    panels.forEach((c, i) => {
        const bleed = document.createElement('div');
        bleed.className = 'color-bleed';
        bleed.id = 'bleed-' + i;
        const bx = 20 + (i / (N - 1)) * 60;
        bleed.style.cssText = `
            width: 20vw;
            height: 45vh;
            left: ${bx}%;
            top: 28%;
            transform: translate(-50%, 0);
            opacity: 0.4;
            background: radial-gradient(
                ellipse at center,
                hsla(${c.h}, ${c.s}%, ${c.l}%, 0.5) 0%,
                hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.2) 40%,
                transparent 70%
            );
        `;
        bleedLayer.appendChild(bleed);
    });

    const totalSpread = 85;
    const stepX = totalSpread / (N - 1);
    const depthStep = 35;

    panels.forEach((c, i) => {
        const num = String(i + 1).padStart(2, '0');
        const midH = (c.h + c.h2) / 2;
        const midS = (c.s + c.s2) / 2;
        const midL = (c.l + c.l2) / 2;

        const xPercent = (100 - totalSpread) / 2 + i * stepX;
        const zDepth = (N - 1 - i) * depthStep;

        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.dataset.index = i;
        panel.dataset.baseZ = zDepth;
        panel.dataset.baseX = xPercent;

        panel.style.cssText = `
            left: ${xPercent}%;
            width: ${panelWidth};
            height: ${panelHeight};
            transform: translateY(-50%) translateZ(${zDepth}px) translateX(-50%);
            z-index: ${i + 1};
        `;

        const faceFront = document.createElement('div');
        faceFront.className = 'panel-face-front';
        faceFront.style.background = `linear-gradient(
            160deg,
            hsla(${c.h}, ${c.s}%, ${c.l}%, 0.6) 0%,
            hsla(${c.h}, ${c.s - 5}%, ${c.l + 12}%, 0.45) 20%,
            hsla(${midH}, ${midS}%, ${midL + 8}%, 0.38) 45%,
            hsla(${c.h2}, ${c.s2}%, ${c.l2 + 5}%, 0.48) 70%,
            hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.6) 100%
        )`;

        const innerGlow = document.createElement('div');
        innerGlow.className = 'panel-inner-glow';
        innerGlow.style.background = `radial-gradient(
            ellipse at 45% 40%,
            hsla(${c.h}, ${c.s}%, ${c.l + 18}%, 0.6) 0%,
            hsla(${c.h2}, ${c.s2}%, ${c.l2 + 12}%, 0.25) 55%,
            transparent 85%
        )`;
        innerGlow.style.opacity = '0.4';

        const edgeRight = document.createElement('div');
        edgeRight.className = 'panel-edge-right';
        edgeRight.style.background = `linear-gradient(
            180deg,
            hsla(${c.h}, ${c.s}%, ${c.l - 3}%, 0.75) 0%,
            hsla(${midH}, ${midS}%, ${midL}%, 0.65) 50%,
            hsla(${c.h2}, ${c.s2}%, ${c.l2 - 5}%, 0.7) 100%
        )`;

        const edgeBottom = document.createElement('div');
        edgeBottom.className = 'panel-edge-bottom';
        edgeBottom.style.background = `linear-gradient(
            90deg,
            hsla(${c.h}, ${c.s}%, ${c.l - 6}%, 0.55) 0%,
            hsla(${c.h2}, ${c.s2}%, ${c.l2 - 6}%, 0.55) 100%
        )`;

        const topLight = document.createElement('div');
        topLight.className = 'panel-top-light';
        topLight.style.background = `linear-gradient(90deg,
            hsla(${c.h}, ${c.s}%, ${c.l + 20}%, 0.6),
            hsla(${c.h2}, ${c.s2}%, ${c.l2 + 20}%, 0.5)
        )`;
        topLight.style.boxShadow = `
            0 -5px 15px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.35),
            0 0 8px hsla(${c.h}, ${c.s}%, ${c.l + 15}%, 0.25)
        `;

        const rightLight = document.createElement('div');
        rightLight.className = 'panel-right-light';
        rightLight.style.background = `linear-gradient(180deg,
            hsla(${c.h}, ${c.s}%, ${c.l + 18}%, 0.5),
            hsla(${c.h2}, ${c.s2}%, ${c.l2 + 18}%, 0.4)
        )`;
        rightLight.style.boxShadow = `
            5px 0 15px hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.3),
            0 0 8px hsla(${c.h2}, ${c.s2}%, ${c.l2 + 12}%, 0.2)
        `;

        const leftLight = document.createElement('div');
        leftLight.className = 'panel-left-light';
        leftLight.style.background = `linear-gradient(180deg,
            hsla(${c.h}, ${c.s}%, ${c.l + 18}%, 0.4),
            hsla(${c.h2}, ${c.s2}%, ${c.l2 + 18}%, 0.3)
        )`;
        leftLight.style.boxShadow = `
            -5px 0 15px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.25),
            0 0 8px hsla(${c.h}, ${c.s}%, ${c.l + 12}%, 0.15)
        `;

        const halo = document.createElement('div');
        halo.className = 'panel-halo';
        halo.style.background = `radial-gradient(
            ellipse at center,
            hsla(${c.h}, ${c.s}%, ${c.l}%, 0.5) 0%,
            hsla(${midH}, ${midS}%, ${midL}%, 0.25) 40%,
            hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.12) 65%,
            transparent 85%
        )`;
        halo.style.opacity = '0.5';

        const lightCast = document.createElement('div');
        lightCast.className = 'panel-light-cast';
        lightCast.style.background = `radial-gradient(
            ellipse at 50% 20%,
            hsla(${c.h}, ${c.s}%, ${c.l}%, 0.45) 0%,
            hsla(${midH}, ${midS}%, ${midL}%, 0.25) 30%,
            hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.15) 50%,
            transparent 75%
        )`;
        lightCast.style.opacity = '0.5';

        const numberEl = document.createElement('div');
        numberEl.className = 'panel-number';
        numberEl.textContent = num;

        panel.style.boxShadow = `
            0 10px 50px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.25),
            0 3px 15px hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.15),
            inset 0 1px 0 rgba(255,255,255,0.3),
            inset 0 -1px 0 hsla(${c.h2}, ${c.s2}%, ${c.l2 - 10}%, 0.1)
        `;

        panel.appendChild(faceFront);
        panel.appendChild(innerGlow);
        panel.appendChild(edgeRight);
        panel.appendChild(edgeBottom);
        panel.appendChild(topLight);
        panel.appendChild(rightLight);
        panel.appendChild(leftLight);
        panel.appendChild(halo);
        panel.appendChild(lightCast);
        panel.appendChild(numberEl);
        sceneInner.appendChild(panel);

        panel.addEventListener('mouseenter', () => onHover(i, true));
        panel.addEventListener('mouseleave', () => onHover(i, false));
        panel.addEventListener('click', () => {
            window.location.hash = '#capitulo-' + num;
        });
    });

    function onHover(index, entering) {
        const allPanels = document.querySelectorAll('.panel');
        const color = panels[index];

        allPanels.forEach((p, i) => {
            const c = panels[i];
            const baseZ = parseFloat(p.dataset.baseZ);
            const halo = p.querySelector('.panel-halo');
            const lightCast = p.querySelector('.panel-light-cast');
            const innerGlow = p.querySelector('.panel-inner-glow');
            const numberEl = p.querySelector('.panel-number');
            const topLight = p.querySelector('.panel-top-light');
            const dist = Math.abs(i - index);

            if (entering) {
                if (i === index) {
                    p.style.transform = `translateY(-50%) translateZ(${baseZ + 25}px) translateX(-50%) translateY(-14px)`;
                    p.style.boxShadow = `
                        0 30px 80px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.45),
                        0 10px 30px hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.3),
                        inset 0 1px 0 rgba(255,255,255,0.4),
                        inset 0 -1px 0 hsla(${c.h2}, ${c.s2}%, ${c.l2 - 10}%, 0.15)
                    `;
                    halo.style.opacity = '0.85';
                    halo.style.inset = '-40px';
                    halo.style.filter = 'blur(42px)';
                    lightCast.style.opacity = '0.8';
                    innerGlow.style.opacity = '0.65';
                    numberEl.style.color = `hsla(${c.h}, ${c.s}%, ${c.l - 5}%, 0.92)`;
                    numberEl.style.textShadow = `
                        0 0 25px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.8),
                        0 0 60px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.4)
                    `;
                    topLight.style.boxShadow = `
                        0 -10px 25px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.5),
                        0 0 12px hsla(${c.h}, ${c.s}%, ${c.l + 15}%, 0.4)
                    `;
                } else if (dist <= 3) {
                    const inf = 1 - dist * 0.3;
                    const dir = i < index ? -1 : 1;
                    const nudge = (dist === 1 ? 6 : dist === 2 ? 3 : 1.5) * dir;

                    p.style.transform = `translateY(-50%) translateZ(${baseZ}px) translateX(calc(-50% + ${nudge}px)) translateY(${-4 * inf}px)`;
                    halo.style.opacity = String(0.5 + inf * 0.2);
                    lightCast.style.opacity = String(0.5 + inf * 0.15);
                    innerGlow.style.opacity = String(0.4 + inf * 0.1);

                    if (dist === 1) {
                        numberEl.style.color = `hsla(${c.h}, ${c.s}%, ${c.l - 5}%, ${inf * 0.4})`;
                        numberEl.style.textShadow = `0 0 15px hsla(${c.h}, ${c.s}%, ${c.l}%, ${inf * 0.3})`;
                    }
                }
            } else {
                p.style.transform = `translateY(-50%) translateZ(${baseZ}px) translateX(-50%)`;
                p.style.boxShadow = `
                    0 10px 50px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.25),
                    0 3px 15px hsla(${c.h2}, ${c.s2}%, ${c.l2}%, 0.15),
                    inset 0 1px 0 rgba(255,255,255,0.3),
                    inset 0 -1px 0 hsla(${c.h2}, ${c.s2}%, ${c.l2 - 10}%, 0.1)
                `;
                halo.style.opacity = '0.5';
                halo.style.inset = '-25px';
                halo.style.filter = 'blur(30px)';
                lightCast.style.opacity = '0.5';
                innerGlow.style.opacity = '0.4';
                numberEl.style.color = 'rgba(0,0,0,0)';
                numberEl.style.textShadow = 'none';
                topLight.style.boxShadow = `
                    0 -5px 15px hsla(${c.h}, ${c.s}%, ${c.l}%, 0.35),
                    0 0 8px hsla(${c.h}, ${c.s}%, ${c.l + 15}%, 0.25)
                `;
            }
        });

        const bleeds = bleedLayer.querySelectorAll('.color-bleed');
        bleeds.forEach((b, i) => {
            const c = panels[i];
            if (entering) {
                const dist = Math.abs(i - index);
                const inf = Math.max(0, 1 - dist * 0.15);
                const blendH = c.h + (color.h - c.h) * inf * 0.25;
                b.style.opacity = String(0.45 + inf * 0.35);
                b.style.transform = `translate(-50%, 0) scale(${1 + inf * 0.2})`;
            } else {
                b.style.opacity = '0.45';
                b.style.transform = 'translate(-50%, 0) scale(1)';
            }
        });
    }

    let mouseX = 0.5, mouseY = 0.5;
    let curX = 0.5, curY = 0.5;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX / window.innerWidth;
        mouseY = e.clientY / window.innerHeight;
    });

    function animate() {
        curX += (mouseX - curX) * 0.03;
        curY += (mouseY - curY) * 0.03;

        const inner = document.getElementById('sceneInner');
        if (inner) {
            const rotY = (curX - 0.5) * 4;
            const rotX = (curY - 0.5) * -2;
            inner.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
        }

        requestAnimationFrame(animate);
    }
    animate();

    function handleRoute() {
        const hash = window.location.hash;
        const homepage = document.getElementById('homepage');
        const container = document.getElementById('chapter-container');

        if (!hash || hash === '#' || hash === '#home') {
            homepage.style.display = 'block';
            container.style.display = 'none';
            container.innerHTML = '';
        } else if (hash.startsWith('#capitulo-')) {
            homepage.style.display = 'none';
            container.style.display = 'block';
            const num = hash.replace('#capitulo-', '');
            const chapterMap = {
                '01': 'cap-01-focus.html',
                '02': 'cap-02-path.html',
                '03': 'cap-03-adaptability.html',
                '04': 'cap-04.html',
                '05': 'cap-05.html',
                '06': 'cap-06.html',
                '07': 'cap-07.html',
                '08': 'cap-08.html',
                '09': 'cap-09.html',
                '10': 'cap-10.html',
            };
            const file = chapterMap[num];
            if (file) {
                fetch(file)
                    .then(r => {
                        if (!r.ok) throw new Error('Not found');
                        return r.text();
                    })
                    .then(html => { container.innerHTML = html; })
                    .catch(() => {
                        container.innerHTML = `
                            <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;">
                                <div style="text-align:center;">
                                    <p style="font-size:14px;font-weight:200;letter-spacing:0.2em;color:rgba(0,0,0,0.3);margin-bottom:20px;">CHAPTER ${num}</p>
                                    <p style="font-size:12px;font-weight:300;color:rgba(0,0,0,0.2);">Coming soon</p>
                                    <a href="#home" style="display:inline-block;margin-top:30px;font-size:11px;font-weight:300;letter-spacing:0.15em;color:rgba(0,0,0,0.25);text-decoration:none;border-bottom:1px solid rgba(0,0,0,0.1);padding-bottom:2px;">BACK</a>
                                </div>
                            </div>
                        `;
                    });
            }
        }
    }

    window.addEventListener('hashchange', handleRoute);
    handleRoute();

})();
</script>

</body>
</html>
