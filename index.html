<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLOR IN MOTION</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  /* Theme variables — --bg / --fg / --fg-dim are read by router.js fallbacks
     and by chapters; keep the names stable. CONFIG-driven values are injected
     after this block and override the light defaults. */
  :root {
    --bg: #FFFFFF;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.45);
    --line: #5e5e5e;
    --line-w: 0.9px;
    --node-fill: #A0A0A0;
    --node-text: #ffffff;
    --veiled-opacity: 0.35;
  }
  :root.dark {
    --bg: #000000;
    --fg: #ffffff;
    --fg-dim: rgba(245, 245, 240, 0.5);
    --line: #2E2E2E;
    --node-fill: #7A7A7A;
    --node-text: #0D0D0D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100vh;   /* fallback for older browsers */
    height: 100dvh;  /* modern: excludes mobile browser chrome */
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    /* Nothing here scrolls; stop iOS/Android pull-to-refresh and the
       overscroll bounce from tugging the fixed artboard around. */
    overscroll-behavior: none;
    transition: background 0.45s ease, color 0.45s ease;
  }

  #homepage {
    position: relative;
    width: 100vw;
    height: 100vh;   /* fallback for older browsers */
    height: 100dvh;  /* modern: excludes mobile browser chrome */
  }
  #chapter-container {
    display: none;
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;   /* fallback for older browsers */
    height: 100dvh;  /* modern: excludes mobile browser chrome */
  }

  /* === The whole composition lives in ONE SVG ============================ */
  /* Fixed viewBox 0 0 1920 1080 + preserveAspectRatio="xMidYMid meet":
     the entire artboard scales proportionally to any viewport, centred,
     letterboxed/pillarboxed as needed. Frame, circles, guides, nodes and
     titles share one coordinate system and can NEVER drift apart. */
  #board {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;   /* fallback for older browsers */
    height: 100dvh;  /* modern: excludes mobile browser chrome */
    display: block;
    /* Frame + horizontal guides overshoot the artboard to reach the real
       viewport edges on any aspect ratio — let them render past the viewBox. */
    overflow: visible;
  }

  /* Hairlines: geometry scales with the viewBox, but non-scaling-stroke
     keeps every line crisp at 1px on screen at any zoom or monitor size. */
  #board .frame {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    vector-effect: non-scaling-stroke;
    pointer-events: none;
    transition: stroke 0.45s ease;
  }

  /* === Nodes — SVG groups with direct click handlers ====================== */
  .node { cursor: pointer; pointer-events: all; }
  .node circle {
    fill: var(--node-fill);
    stroke: none;
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.25s ease, fill 0.45s ease;
  }
  .node:focus-visible circle { transform: scale(1.1); }
  /* Hover-grow only on devices with a real pointer — on touch, :hover
     latches after a tap and would leave the node stuck enlarged. */
  @media (hover: hover) {
    .node:hover circle { transform: scale(1.1); }
  }
  .node:focus { outline: none; }
  .node text {
    fill: #ffffff;
    font-family: 'Space Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
    transition: fill 0.45s ease;
  }

  /* Node 11 — Da'ath: veiled, inert. */
  .node.veiled { opacity: var(--veiled-opacity); cursor: default; }
  .node.veiled:hover circle { transform: none; }

  /* On touch devices (no hover) Da'ath awakens: the hidden sefirah reveals
     itself only through the body. Slightly more visible, gently breathing,
     and tappable. Scoped to (hover: none) so desktop is completely unaffected. */
  @media (hover: none) {
    .node.veiled {
      cursor: pointer;
      animation: veiled-breathe 4s ease-in-out infinite;
    }
  }
  @keyframes veiled-breathe {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.6; }
  }

  /* === Conic-gradient nodes ============================================= */
  /* SVG has no conic gradient, so these nodes paint theirs in a plain <div>
     inside a foreignObject (artboard coordinates, so it scales with the
     viewBox like everything else). The foreignObject is visual only —
     hit-testing inside a viewBox-scaled foreignObject is unreliable
     (Chromium/Safari), so an invisible SVG circle on top is the real
     click/hover target, and the number label is a separate SVG <text>. */
  .conic-node foreignObject { pointer-events: none; overflow: visible; }
  .conic-node .conic-hit { fill: transparent; stroke: none; }
  .conic-fill {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    transform-origin: center;
    transition: transform 0.25s ease;
  }
  .node:focus-visible .conic-fill { transform: scale(1.1); }
  @media (hover: hover) {
    .node:hover .conic-fill { transform: scale(1.1); }
  }

  /* === Titles — inside the SVG, in artboard coordinates =================== */
  .title {
    fill: var(--fg-dim);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none;
    transition: fill 0.45s ease;
  }

  /* === Theme toggle — SVG group, top-right margin, scales with the board = */
  /* Same type treatment as .title, but interactive. Lives inside #homepage's
     SVG, so the router hides it automatically when a chapter is active.
     The group pairs the text with an invisible hit rect — spaced-out SVG
     glyphs alone leave click-dead gaps between letters. */
  #themeToggle {
    fill: var(--fg-dim);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: all;
    -webkit-user-select: none;
    user-select: none;
    transition: fill 0.3s ease;
  }
  #themeToggle .toggle-hit { fill: transparent; stroke: none; }
  @media (hover: hover) {
    #themeToggle:hover { fill: var(--fg); }
  }
  #themeToggle:focus { outline: none; }

  /* === Portrait overlay — the experience is landscape-only on mobile ===== */
  /* Hidden by default; the orientation media query below shows it whenever
     the viewport is taller than wide, covering homepage AND chapters —
     except chapters the router marks orientation-free on <body> (sensor
     chapters like 11, which live in the hand at any angle). */
  #rotateOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 34px;
    text-align: center;
    transition: background 0.45s ease;
  }
  #rotateOverlay p {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    line-height: 2.4;
    color: var(--fg-dim);
    max-width: 24em;
    padding: 0 24px;
    transition: color 0.45s ease;
  }
  /* CSS-only rotation hint: a phone outline that tips to landscape. */
  .rotate-icon {
    width: 26px;
    height: 44px;
    border: 1px solid var(--fg-dim);
    border-radius: 5px;
    animation: rotateHint 2.8s ease-in-out infinite;
    transition: border-color 0.45s ease;
  }
  @keyframes rotateHint {
    0%, 18%   { transform: rotate(0deg); }
    45%, 70%  { transform: rotate(90deg); }
    95%, 100% { transform: rotate(0deg); }
  }
  @media (orientation: portrait) {
    #rotateOverlay { display: flex; }
    body.orientation-free #rotateOverlay { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .rotate-icon { animation: none; transform: rotate(90deg); }
  }
</style>
</head>
<body>

<div id="homepage">
  <svg id="board" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet"
       aria-label="Mapa de capítulos"></svg>
</div>

<div id="chapter-container"></div>

<div id="rotateOverlay" role="status">
  <div class="rotate-icon" aria-hidden="true"></div>
  <p>Rotá tu dispositivo para ver la experiencia</p>
</div>

<script>
  // =====================================================================
  // CONFIG — single source of truth for the homepage composition.
  // ALL coordinates are raw pixels on the 1920×1080 Figma artboard; the
  // SVG viewBox scales the whole composition proportionally to any
  // viewport, so nothing here ever needs converting or recomputing.
  // =====================================================================
  const CONFIG = {
    artboard: { w: 1920, h: 1080 },

    // Frame — 4 independent lines spanning the full artboard, crossing at
    // the corners.
    frame: { top: 80, bottom: 1000, left: 80, right: 1840 },

    // All geometric lines + circle outlines (light theme; dark in CSS).
    // Width is in SCREEN px (non-scaling-stroke keeps hairlines crisp).
    // overshoot: how far (artboard units) the frame lines and horizontal
    // guides extend past the artboard on each side, so they always reach
    // the real viewport edges. 5000 covers even extreme aspect ratios
    // (a portrait phone letterboxes ~1540 units; ultrawides ~2300).
    line: { color: '#5E5E5E', width: 0.9, overshoot: 5000 },

    // 11 nodes, positioned by centre. Node 11 (Da'ath) is veiled: lighter,
    // translucent, non-routing.
    nodes: {
      r: 40,               // default radius; items may override with their own r
      fill: '#A0A0A0',     // fallback for nodes without a fillType (light; dark in CSS)
      veiledOpacity: 0.35,
      fontSize: 11,
      // Each item carries its own geometry + fill. fillType ∈
      // 'solid' | 'linear' | 'radial' | 'conic'; colours space evenly across
      // the gradient. Numbers are assigned left→right and get re-mapped to
      // chapter files later. Linear gradients render top→bottom.
      items: [
        { num: '01', x: 417.68,  y: 441.60, r: 75.19, fillType: 'linear', colors: ['#C8D4D3', '#F89626'] },
        { num: '02', x: 499.49,  y: 348.28, r: 21.77, fillType: 'radial', colors: ['#C8D4D3', '#8EABBF'] },
        { num: '03', x: 734.29,  y: 790.29, r: 27.29, fillType: 'linear', colors: ['#F85794', '#F89626'] },
        { num: '04', x: 837.29,  y: 300.29, r: 27.29, fillType: 'solid',  colors: ['#F85794'] },
        { num: '05', x: 1224.92, y: 508.92, r: 56.92, fillType: 'conic',  colors: ['#B7364C', '#C8D4D3'] },
        { num: '06', x: 1345.47, y: 746.47, r: 37.47, fillType: 'linear', colors: ['#8EABBF', '#F89626', '#8EABBF', '#F89626'] },
        { num: '07', x: 1425.10, y: 533.91, r: 56.92, fillType: 'conic',  colors: ['#8EABBF', '#C8D4D3', '#B7364C', '#F85794', '#F89626'] },
      ],
    },

    // Titles — opposite corners of the margin band, in artboard coords.
    titles: {
      text: 'COLOR IN MOTION',
      fontSize: 11,
      top:    { x: 120,  y: 45 },    // reads normally, anchored start
      bottom: { x: 1799, y: 1038 },  // rotated 180° around its anchor
    },

    // Theme toggle — SVG text, top-right margin, anchored end.
    // Keep y equal to titles.top.y so it stays aligned with the title.
    toggle: { x: 1800, y: 46 },
  };

  // =====================================================================
  // Push CONFIG values into CSS custom properties. Injected as a :root
  // rule (not inline styles) so :root.dark overrides still win.
  // =====================================================================
  const cfgStyle = document.createElement('style');
  cfgStyle.textContent = ':root{'
    + '--line:' + CONFIG.line.color + ';'
    + '--line-w:' + CONFIG.line.width + 'px;'
    + '--node-fill:' + CONFIG.nodes.fill + ';'
    + '--veiled-opacity:' + CONFIG.nodes.veiledOpacity + ';'
    + '}';
  document.head.appendChild(cfgStyle);

  // =====================================================================
  // Build the SVG once from CONFIG. One fixed coordinate system — the
  // viewBox does ALL the scaling; no resize listeners, no unit conversion.
  // =====================================================================
  const svgNS = 'http://www.w3.org/2000/svg';
  const board = document.getElementById('board');
  board.setAttribute('viewBox', '0 0 ' + CONFIG.artboard.w + ' ' + CONFIG.artboard.h);

  function svgEl(name, attrs, text) {
    const el = document.createElementNS(svgNS, name);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    if (text != null) el.textContent = text;
    return el;
  }

  const OS = CONFIG.line.overshoot;

  // --- Frame: 4 "infinite" lines, cross corners — overshoot past the
  //     artboard so they run edge-to-edge on any screen -------------------
  board.appendChild(svgEl('line', { class: 'frame', x1: -OS, y1: CONFIG.frame.top, x2: CONFIG.artboard.w + OS, y2: CONFIG.frame.top }));
  board.appendChild(svgEl('line', { class: 'frame', x1: -OS, y1: CONFIG.frame.bottom, x2: CONFIG.artboard.w + OS, y2: CONFIG.frame.bottom }));
  board.appendChild(svgEl('line', { class: 'frame', x1: CONFIG.frame.left, y1: -OS, x2: CONFIG.frame.left, y2: CONFIG.artboard.h + OS }));
  board.appendChild(svgEl('line', { class: 'frame', x1: CONFIG.frame.right, y1: -OS, x2: CONFIG.frame.right, y2: CONFIG.artboard.h + OS }));

  // --- <defs>: one gradient per linear/radial node. solid nodes use a flat
  //     fill and conic nodes paint a CSS conic-gradient in a foreignObject,
  //     so neither needs an SVG gradient. Stops space evenly across the
  //     node's colours regardless of count. ---------------------------------
  const defs = svgEl('defs', {});
  for (const n of CONFIG.nodes.items) {
    if (n.fillType !== 'linear' && n.fillType !== 'radial') continue;
    const grad = n.fillType === 'linear'
      ? svgEl('linearGradient', { id: 'grad-node-' + n.num, x1: 0, y1: 0, x2: 0, y2: 1 })
      : svgEl('radialGradient', { id: 'grad-node-' + n.num, cx: '50%', cy: '50%', r: '50%' });
    const last = n.colors.length - 1;
    n.colors.forEach((c, i) => {
      const offset = last === 0 ? 0 : (i / last) * 100;
      grad.appendChild(svgEl('stop', { offset: offset + '%', 'stop-color': c }));
    });
    defs.appendChild(grad);
  }
  board.appendChild(defs);

  // --- Nodes: SVG groups, click handlers attached directly ----------------
  const nodeGroup = svgEl('g', { class: 'nodes' });
  for (const n of CONFIG.nodes.items) {
    const r = n.r != null ? n.r : CONFIG.nodes.r;
    const isConic = n.fillType === 'conic';
    const g = svgEl('g', {
      class: 'node' + (n.veiled ? ' veiled' : '') + (isConic ? ' conic-node' : ''),
    });
    if (isConic) {
      // No SVG conic gradient — paint it in a foreignObject <div>. A
      // transparent circle on top is the real hit target (foreignObject
      // hit-testing is unreliable); the label is layered as a separate <text>.
      const fo = svgEl('foreignObject', {
        x: n.x - r, y: n.y - r, width: r * 2, height: r * 2,
      });
      const fill = document.createElement('div');
      fill.className = 'conic-fill';
      fill.style.background = 'conic-gradient(' + n.colors.join(', ') + ')';
      fo.appendChild(fill);
      g.appendChild(fo);
      // Reliable hit target on top of the visual-only foreignObject.
      g.appendChild(svgEl('circle', {
        class: 'conic-hit', cx: n.x, cy: n.y, r: r,
      }));
    } else {
      // Inline fill so the per-node gradient/colour beats the stylesheet's
      // --node-fill default; nodes without a fillType keep that grey default.
      const circle = svgEl('circle', { cx: n.x, cy: n.y, r: r });
      if (n.fillType === 'solid') circle.style.fill = n.colors[0];
      else if (n.fillType === 'linear' || n.fillType === 'radial') {
        circle.style.fill = 'url(#grad-node-' + n.num + ')';
      }
      g.appendChild(circle);
    }
    g.appendChild(svgEl('text', {
      x: n.x, y: n.y, 'font-size': CONFIG.nodes.fontSize,
    }, n.num));
    if (n.veiled) {
      g.setAttribute('aria-hidden', 'true');
      // Da'ath is veiled and inert on desktop, but on touch devices (no hover)
      // it becomes accessible — a tap routes to the hidden chapter 11.
      if (window.matchMedia('(hover: none)').matches) {
        g.removeAttribute('aria-hidden');
        g.setAttribute('role', 'link');
        g.setAttribute('tabindex', '0');
        g.setAttribute('aria-label', 'Capítulo ' + n.num);
        g.addEventListener('click', () => {
          window.location.hash = '#capitulo-' + n.num;
        });
      }
    } else {
      g.setAttribute('role', 'link');
      g.setAttribute('tabindex', '0');
      g.setAttribute('aria-label', 'Capítulo ' + n.num);
      const go = () => { window.location.hash = '#capitulo-' + n.num; };
      g.addEventListener('click', go);
      g.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
      });
    }
    nodeGroup.appendChild(g);
  }
  board.appendChild(nodeGroup);

  // --- Titles: opposite corners, bottom one mirrored -----------------------
  board.appendChild(svgEl('text', {
    class: 'title',
    x: CONFIG.titles.top.x, y: CONFIG.titles.top.y,
    'font-size': CONFIG.titles.fontSize,
  }, CONFIG.titles.text));
  board.appendChild(svgEl('text', {
    class: 'title',
    x: CONFIG.titles.bottom.x, y: CONFIG.titles.bottom.y,
    'font-size': CONFIG.titles.fontSize,
    transform: 'rotate(180 ' + CONFIG.titles.bottom.x + ' ' + CONFIG.titles.bottom.y + ')',
    'aria-hidden': 'true',
  }, CONFIG.titles.text));

  // --- Theme toggle: SVG group in the top-right margin, aligned with the
  //     top title and scaling with the composition. The invisible rect is
  //     the real click target (text glyphs alone have hit-test gaps). ------
  const toggle = svgEl('g', {
    id: 'themeToggle',
    role: 'button', tabindex: '0', 'aria-label': 'Cambiar tema',
  });
  toggle.appendChild(svgEl('rect', {
    class: 'toggle-hit',
    x: CONFIG.toggle.x - 130, y: CONFIG.toggle.y - 16,
    width: 140, height: 24,
  }));
  const toggleText = svgEl('text', {
    x: CONFIG.toggle.x, y: CONFIG.toggle.y,
    'font-size': CONFIG.titles.fontSize,
    'text-anchor': 'end',
  });
  toggle.appendChild(toggleText);
  board.appendChild(toggle);

  // =====================================================================
  // Theme — light / dark, persisted in localStorage (shared with chapters).
  // =====================================================================
  const rootEl = document.documentElement;
  if (localStorage.getItem('beLight.theme') === 'dark') rootEl.classList.add('dark');

  function syncToggle() {
    toggleText.textContent = rootEl.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  function flipTheme() {
    rootEl.classList.toggle('dark');
    localStorage.setItem('beLight.theme', rootEl.classList.contains('dark') ? 'dark' : 'light');
    syncToggle();
  }
  toggle.addEventListener('click', flipTheme);
  toggle.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipTheme(); }
  });
  syncToggle();
</script>

<script src="router.js"></script>

</body>
</html>
