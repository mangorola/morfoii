<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05 — GEVURAH</title>

<!-- Theme before first paint: same key + class contract as index.html. -->
<script>
  try {
    if (localStorage.getItem('beLight.theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  } catch (e) { /* storage unavailable (sandboxed) — stay light */ }
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  /* Theme tokens — same names as index.html so both documents flip together.
     One extra token here: --stage-bg, the panorama field behind the forms.
     The margins sit a step off the field (off-white / near-black) so the
     frame reads as a window onto the panorama. */
  :root {
    --bg: #FAFAF8;
    --stage-bg: #FFFFFF;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.45);
    --fg-faint: rgba(26, 26, 26, 0.22);
    --line: #5E5E5E;
    --line-w: 0.9px;
  }
  :root.dark {
    --bg: #000000;
    --stage-bg: #0C0C0C;
    --fg: #ffffff;
    --fg-dim: rgba(245, 245, 240, 0.5);
    --fg-faint: rgba(245, 245, 240, 0.25);
    --line: #2E2E2E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.45s ease, color 0.45s ease;
    overflow-x: hidden;
    overscroll-behavior: none;
  }
  /* Vertical scroll is the chapter's input, but the scrollbar itself would
     read as UI — hide it; the progress line at the foot of the stage is the
     only trace of position. */
  html { scrollbar-width: none; }
  ::-webkit-scrollbar { display: none; }

  /* The only element in document flow: its height creates the vertical
     scroll space that maps 1:1 onto the horizontal journey (set by JS). */
  #scrollSpace { width: 1px; }

  /* === SVG board — frame lines + margin type ============================= */
  /* Same coordinate contract as index.html: viewBox 0 0 1920 1080 with
     "meet" scaling. Only the 4 frame lines (no circles, no guides, no
     nodes). Fixed on top of the panorama; pointer events pass through
     except on the interactive .ctrl groups. */
  #board {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: block;
    overflow: visible;   /* frame lines overshoot the artboard to the viewport edges */
    z-index: 10;
    pointer-events: none;
  }
  #board .frame {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    vector-effect: non-scaling-stroke;
    transition: stroke 0.45s ease;
  }
  #board text {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    user-select: none;
  }
  .label-num  { fill: var(--fg-dim); transition: fill 0.45s ease; }
  .label-name { fill: var(--fg);     transition: fill 0.45s ease; }
  .ctrl {
    cursor: pointer;
    pointer-events: all;
    fill: var(--fg-dim);
    transition: fill 0.3s ease;
  }
  .ctrl:hover, .ctrl:focus-visible { fill: var(--fg); }
  .ctrl:focus { outline: none; }
  .ctrl .hit { fill: transparent; stroke: none; }

  /* Scroll progress — a hairline just above the bottom frame line, filling
     left → right across the inner stage as the journey advances. */
  #progress {
    stroke: var(--fg-faint);
    stroke-width: 2;
    transition: stroke 0.45s ease;
  }

  /* === Artboard — HTML twin of the SVG coordinate system ================= */
  /* A fixed 1920×1080 div, centred and scaled by JS with the same
     min(vw/1920, vh/1080) math as the SVG's "xMidYMid meet", so the canvas
     can never drift from the frame drawn in the SVG. */
  #artboard {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(1);
    z-index: 1;
  }

  /* Inner stage: the frame rectangle. Clips the panorama. */
  #stage {
    position: absolute;
    left: 80px;
    top: 80px;
    width: 1760px;
    height: 920px;
    overflow: hidden;
    background: var(--stage-bg);
    transition: background 0.45s ease;
  }
  #view {
    display: block;
    width: 1760px;
    height: 920px;
  }
</style>
</head>
<body>

<div id="scrollSpace" aria-hidden="true"></div>

<div id="artboard">
  <div id="stage" role="img"
       aria-label="Panorama geométrico: el mismo gris cambia de color según sus vecinos">
    <canvas id="view"></canvas>
  </div>
</div>

<svg id="board" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet"
     xmlns="http://www.w3.org/2000/svg" aria-hidden="false">

  <!-- Frame lines: overshoot the 1920×1080 artboard so they always reach
       the physical viewport edges, exactly like the homepage. -->
  <line class="frame" x1="-1000" y1="80"    x2="3000" y2="80"/>
  <line class="frame" x1="-1000" y1="1000"  x2="3000" y2="1000"/>
  <line class="frame" x1="80"    y1="-1000" x2="80"   y2="2080"/>
  <line class="frame" x1="1840"  y1="-1000" x2="1840" y2="2080"/>

  <!-- Chapter label, top-left margin (same spot/type as the homepage title) -->
  <text class="label-num"  x="120" y="45" font-size="11">05</text>
  <text class="label-name" x="162" y="45" font-size="11">ABSTRACCIÓN</text>

  <!-- Theme toggle, top-right margin (left of the back control). Same
       typographic treatment + localStorage contract as the homepage. -->
  <g class="ctrl" id="themeToggle" role="button" tabindex="0" aria-label="Cambiar tema">
    <rect class="hit" x="1586" y="30" width="76" height="24"/>
    <text id="themeToggleText" x="1655" y="46" font-size="11" text-anchor="end">○ LUZ</text>
  </g>

  <!-- Back to index, top-right margin -->
  <g class="ctrl" id="backIndex" role="link" tabindex="0" aria-label="Volver al índice">
    <rect class="hit" x="1670" y="30" width="140" height="24"/>
    <text x="1800" y="46" font-size="11" text-anchor="end">← Índice</text>
  </g>

  <!-- Scroll progress, foot of the inner stage -->
  <line id="progress" x1="80" y1="994" x2="80" y2="994"/>
</svg>

<script>
(function () {
  'use strict';

  // =====================================================================
  // CONFIG — every tunable in one place.
  // =====================================================================
  const CONFIG = {
    panoramaWidth: 20000,      // total horizontal journey, in artboard px
    tileWidth: 2000,           // off-screen buffer margin each side of the
                               // viewport (buffer = 1760 + 2 × tileWidth)
    scrollSpeed: 1,            // multiplier: vertical scroll → horizontal travel
    greyValue: '#808080',      // THE grey — identical across the whole panorama
    zoneColors: ['#9ACD32', '#7B2D8E', '#DC143C'],  // yellow-green, violet, red
    formDensity: 0.6,          // how packed the forms are (0..1-ish)
    formSizeRange: [40, 400],  // min/max mid-layer form size, artboard px

    seed: 20050,               // PRNG seed — same seed, same panorama, always
    stageW: 1760,              // inner stage, must match the frame
    stageH: 920,
    maxQuality: 1.5,           // pixel-ratio cap (performance)
    smoothing: 0.14,           // scroll lerp factor (1 = raw, lower = softer)
  };

  const W = CONFIG.panoramaWidth;
  const H = CONFIG.stageH;
  const TRAVEL = W - CONFIG.stageW;      // how far the window can move
  const BUF_W = CONFIG.stageW + 2 * CONFIG.tileWidth;

  // =====================================================================
  // Deterministic helpers — the whole composition derives from one seeded
  // PRNG, so every visit (and every buffer re-render) sees the same world.
  // =====================================================================
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  function smoothstep(a, b, v) {
    const t = clamp((v - a) / (b - a), 0, 1);
    return t * t * (3 - 2 * t);
  }
  function hexToHsl(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = ((n >> 16) & 255) / 255, g = ((n >> 8) & 255) / 255, b = (n & 255) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b), l = (max + min) / 2;
    let h = 0, s = 0;
    if (max !== min) {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) * 60;
      else if (max === g) h = ((b - r) / d + 2) * 60;
      else h = ((r - g) / d + 4) * 60;
    }
    return { h: h, s: s * 100, l: l * 100 };
  }
  const ZONES = CONFIG.zoneColors.map(hexToHsl); // [yellow-green, violet, red]

  // =====================================================================
  // The colour journey. Rather than blending hues (which would mud the
  // saturation the contrast effect depends on), transition zones MIX
  // POPULATIONS: each form rolls which palette it belongs to, weighted by
  // its x. Old colour lingers among the new — a wake, not a crossfade.
  //   0.00–0.25  yellow-green          (zone 1: 0–5000)
  //   0.25–0.50  yellow-green → violet (zone 2: 5000–10000)
  //   0.50–0.75  violet                (zone 3: 10000–15000)
  //   0.75–1.00  violet → red          (zone 4: 15000–20000)
  // =====================================================================
  function pickZoneColor(x, rng, lightJitter) {
    const t = clamp(x / W, 0, 1);
    const toV = smoothstep(0.25, 0.5, t);
    const toR = smoothstep(0.75, 0.98, t);
    const wYG = 1 - toV;
    const wV = toV * (1 - toR);
    const wR = toR;
    let roll = rng() * (wYG + wV + wR);
    let z;
    if (roll < wYG) z = ZONES[0];
    else if (roll < wYG + wV) z = ZONES[1];
    else z = ZONES[2];
    const j = lightJitter === undefined ? 8 : lightJitter;
    const h = z.h + (rng() - 0.5) * 24;
    const s = clamp(z.s + (rng() - 0.3) * 16, 45, 96);
    const l = clamp(z.l + (rng() - 0.5) * 2 * j, 22, 72);
    return 'hsl(' + h.toFixed(1) + ',' + s.toFixed(1) + '%,' + l.toFixed(1) + '%)';
  }

  // =====================================================================
  // Form generation — the whole 20000px world is generated ONCE at load
  // into four draw layers (a few hundred lightweight records, instant).
  // Layers, painted bottom → top:
  //   0  background fields — large saturated blocks, some full-height walls
  //   1  mid forms — rects / circles / rings / strips, evolving with x
  //   2  accents — hairlines and dots
  //   3  grey protagonists — the constant #808080, each staged on its own
  //      saturated ground plate so the surround is guaranteed (Albers)
  // Proportions evolve with t = x / panoramaWidth: blocks and horizontals
  // early, circles and rings through the violet middle, dense vertical
  // strips toward the red end — two territories of one world.
  // =====================================================================
  function generateForms() {
    const rng = mulberry32(CONFIG.seed);
    const layers = [[], [], [], []];
    const q40 = v => Math.round(v / 40) * 40;
    const q20 = v => Math.round(v / 20) * 20;
    const [minS, maxS] = CONFIG.formSizeRange;

    const circleProb = t => 0.12 + 0.42 * Math.exp(-Math.pow((t - 0.60) / 0.22, 2));
    const ringProb   = t => 0.22 * Math.exp(-Math.pow((t - 0.62) / 0.18, 2));
    const stripProb  = t => 0.50 * smoothstep(0.68, 1, t);
    const densityAt  = t => CONFIG.formDensity * (0.85 + 0.5 * smoothstep(0.55, 1, t));
    const sizeScale  = t => 1.15 - 0.3 * smoothstep(0.5, 1, t);

    // Layer 0 — background fields
    let x = -160;
    while (x < W) {
      const t = clamp(x / W, 0, 1);
      const full = rng() < 0.28;
      const w = q40(260 + rng() * 640);
      const h = full ? H : q40(240 + rng() * 560);
      const y = full ? 0 : q40(rng() * (H - h));
      layers[0].push({
        kind: 'rect', x: q40(x), y: y, w: w, h: h,
        color: pickZoneColor(x + w / 2, rng, 10)
      });
      x += (420 + rng() * 760) / CONFIG.formDensity;
    }

    // Layer 1 — mid forms, in small clusters
    x = 60;
    while (x < W) {
      const t = clamp(x / W, 0, 1);
      const count = 1 + Math.floor(rng() * 3);
      for (let i = 0; i < count; i++) {
        const fx = x + (rng() - 0.5) * 300;
        if (fx < -maxS || fx > W) continue;
        const size = (minS + (maxS - minS) * rng() * rng()) * sizeScale(t);
        const grey = rng() < 0.16;
        const color = grey ? CONFIG.greyValue : pickZoneColor(fx, rng);
        const roll = rng();
        if (roll < stripProb(t)) {
          const sw = 18 + rng() * 44;
          const sh = 280 + rng() * 520;
          layers[1].push({ kind: 'rect', x: fx, y: q20(rng() * (H - sh)), w: sw, h: sh, color: color });
        } else if (roll < stripProb(t) + ringProb(t)) {
          const r = Math.max(24, size / 2);
          layers[1].push({ kind: 'ring', x: fx, y: 40 + rng() * (H - 80 - 2 * r), w: 2 * r, h: 2 * r, lw: 2 + rng() * 2.5, color: color });
        } else if (roll < stripProb(t) + ringProb(t) + circleProb(t)) {
          const r = Math.max(14, size / 2);
          layers[1].push({ kind: 'circle', x: fx, y: 20 + rng() * (H - 40 - 2 * r), w: 2 * r, h: 2 * r, color: color });
        } else {
          const h2 = size * (0.5 + rng() * 1.1);
          layers[1].push({ kind: 'rect', x: fx, y: q20(rng() * (H - h2)), w: size, h: h2, color: color });
        }
      }
      x += (80 + rng() * 160) / densityAt(t);
    }

    // Layer 2 — accents: hairlines and dots in darkened zone colour
    x = 40;
    while (x < W) {
      const t = clamp(x / W, 0, 1);
      const roll = rng();
      const color = rng() < 0.2 ? CONFIG.greyValue : pickZoneColor(x, rng, 4);
      if (roll < 0.42) {          // horizontal hairline
        const lw2 = 120 + rng() * 440;
        layers[2].push({ kind: 'rect', x: x, y: q20(rng() * (H - 2)), w: lw2, h: 2, color: color });
      } else if (roll < 0.78) {   // vertical hairline
        const lh = 80 + rng() * 300;
        layers[2].push({ kind: 'rect', x: x, y: rng() * (H - lh), w: 2, h: lh, color: color });
      } else {                    // dot
        const r = 4 + rng() * 10;
        layers[2].push({ kind: 'circle', x: x, y: 30 + rng() * (H - 60 - 2 * r), w: 2 * r, h: 2 * r, color: color });
      }
      x += (100 + rng() * 180) / CONFIG.formDensity;
    }

    // Layer 3 — grey protagonists on saturated ground plates. The plate
    // guarantees each grey is SURROUNDED by the zone's colour, so the eye
    // has no escape from the induced complementary.
    x = 200;
    let sinceBig = 0;
    while (x < W - 200) {
      sinceBig += 1;
      const big = sinceBig > 4 && rng() < 0.4;
      if (big) sinceBig = 0;
      const size = big ? 300 + rng() * 140 : 90 + rng() * 190;
      const plate = size * (1.5 + rng() * 0.8);
      const py = clamp(120 + rng() * (H - 240 - plate), 0, H - plate);
      const px = x - (plate - size) / 2;
      layers[3].push({
        kind: 'rect', x: px, y: py, w: plate, h: plate,
        color: pickZoneColor(x + size / 2, rng, 6)
      });
      const gy = py + (plate - size) / 2;
      const asCircle = rng() < 0.3;
      layers[3].push({
        kind: asCircle ? 'circle' : 'rect',
        x: x, y: gy, w: size, h: size,
        color: CONFIG.greyValue
      });
      x += (380 + rng() * 320) / CONFIG.formDensity * 0.9;
    }

    return layers;
  }

  function drawForm(c, f, ox) {
    if (f.kind === 'rect') {
      c.fillStyle = f.color;
      c.fillRect(f.x - ox, f.y, f.w, f.h);
    } else if (f.kind === 'circle') {
      c.fillStyle = f.color;
      c.beginPath();
      c.arc(f.x - ox + f.w / 2, f.y + f.h / 2, f.w / 2, 0, Math.PI * 2);
      c.fill();
    } else { // ring
      c.strokeStyle = f.color;
      c.lineWidth = f.lw;
      c.beginPath();
      c.arc(f.x - ox + f.w / 2, f.y + f.h / 2, f.w / 2 - f.lw / 2, 0, Math.PI * 2);
      c.stroke();
    }
  }

  // =====================================================================
  // Virtual rendering. The panorama is never held whole: one off-screen
  // buffer of viewport + 2 × tileWidth is rendered from the form list,
  // and each frame is a single drawImage blit from it. When the window
  // nears a buffer edge, the buffer re-centres and re-renders (a few
  // hundred fills — a couple of ms, invisible amid the scroll).
  // =====================================================================
  const root = document.documentElement;
  const view = document.getElementById('view');
  const ctx = view.getContext('2d');
  const buf = document.createElement('canvas');
  const bctx = buf.getContext('2d');
  const artboard = document.getElementById('artboard');
  const spacer = document.getElementById('scrollSpace');
  const progress = document.getElementById('progress');

  const layers = generateForms();

  let scale = 1;          // artboard px → screen px
  let q = 1;              // artboard px → canvas backing px (quality)
  let bufStart = 0;       // panorama x of the buffer's left edge
  let target = 0;         // where the scroll says we should be (artboard px)
  let current = 0;        // where we are (lerped)

  function stageBg() {
    return getComputedStyle(root).getPropertyValue('--stage-bg').trim() || '#FFFFFF';
  }

  function renderBuffer(startX) {
    bufStart = clamp(startX, 0, W - BUF_W);
    bctx.setTransform(q, 0, 0, q, 0, 0);
    bctx.fillStyle = stageBg();
    bctx.fillRect(0, 0, BUF_W, H);
    const x0 = bufStart - 900, x1 = bufStart + BUF_W + 900;
    for (const layer of layers) {
      for (const f of layer) {
        if (f.x + f.w < x0 || f.x > x1) continue;
        drawForm(bctx, f, bufStart);
      }
    }
  }

  function ensureBuffer() {
    const nearLeft = current < bufStart + 240 && bufStart > 0;
    const nearRight = current + CONFIG.stageW > bufStart + BUF_W - 240 && bufStart + BUF_W < W;
    if (nearLeft || nearRight) renderBuffer(current - CONFIG.tileWidth);
  }

  function blit() {
    const sx = clamp((current - bufStart) * q, 0, buf.width - view.width);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(buf, sx, 0, view.width, view.height, 0, 0, view.width, view.height);
  }

  function updateOverlay() {
    const p = TRAVEL > 0 ? current / TRAVEL : 0;
    progress.setAttribute('x2', (80 + CONFIG.stageW * p).toFixed(1));
  }

  // =====================================================================
  // Scroll mechanism — vertical input, horizontal movement. The spacer's
  // height makes maxScroll map exactly onto the panorama's travel at the
  // current artboard scale; the frame never moves, the world slides.
  // =====================================================================
  function maxScroll() {
    return TRAVEL * scale / CONFIG.scrollSpeed;
  }

  function onScroll() {
    target = clamp(TRAVEL - window.scrollY * CONFIG.scrollSpeed / scale, 0, TRAVEL);
  }

  function layout() {
    scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    artboard.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';

    q = clamp(scale * (window.devicePixelRatio || 1), 0.4, CONFIG.maxQuality);
    view.width = Math.round(CONFIG.stageW * q);
    view.height = Math.round(H * q);
    buf.width = Math.round(BUF_W * q);
    buf.height = Math.round(H * q);

    // Preserve journey position across resizes: same progress, new mapping.
    const p = TRAVEL > 0 ? current / TRAVEL : 0;
    spacer.style.height = (window.innerHeight + maxScroll()) + 'px';
    window.scrollTo(0, (1 - p) * maxScroll());
    target = current;

    renderBuffer(current - CONFIG.tileWidth);
    blit();
    updateOverlay();
  }

  function frame() {
    if (Math.abs(target - current) > 0.05) {
      current += (target - current) * CONFIG.smoothing;
      if (Math.abs(target - current) < 0.05) current = target;
      ensureBuffer();
      blit();
      updateOverlay();
    }
    requestAnimationFrame(frame);
  }

  // =====================================================================
  // Theme toggle — same contract as the homepage: '.dark' on <html> +
  // 'beLight.theme' in localStorage. The canvas holds concrete colours,
  // so a flip re-renders the buffer against the new field.
  // =====================================================================
  const themeToggle = document.getElementById('themeToggle');
  const themeToggleText = document.getElementById('themeToggleText');
  function syncTheme() {
    themeToggleText.textContent = root.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  function repaintTheme() {
    syncTheme();
    renderBuffer(bufStart);
    blit();
  }
  function flipTheme() {
    root.classList.toggle('dark');
    try {
      localStorage.setItem('beLight.theme',
        root.classList.contains('dark') ? 'dark' : 'light');
    } catch (e) { /* storage unavailable — theme still flips for this view */ }
    repaintTheme();
  }
  themeToggle.addEventListener('click', flipTheme);
  themeToggle.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipTheme(); }
  });

  // Theme can change from the homepage or another tab — mirror it live.
  window.addEventListener('storage', function (e) {
    if (e.key !== 'beLight.theme') return;
    root.classList.toggle('dark', e.newValue === 'dark');
    repaintTheme();
  });

  // =====================================================================
  // Back to index — hash change on the parent document, never a reload.
  // =====================================================================
  const backIndex = document.getElementById('backIndex');
  function goHome() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.location.hash = '#home';
        return;
      }
    } catch (err) { /* cross-origin parent — fall through */ }
    window.location.href = 'index.html#home';
  }
  backIndex.addEventListener('click', goHome);
  backIndex.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goHome(); }
  });

  // =====================================================================
  // Boot
  // =====================================================================
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', layout);
  syncTheme();
  layout();
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
