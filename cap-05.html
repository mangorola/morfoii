<!-- Chapter 05 — static photo gallery -->
<!-- Wrapper loaded into index.html via hash routing (#capitulo-05). -->
<!-- No <script>: safe for innerHTML injection. The experience lives in
     cap-05-gallery.html — an iframe document, so its own JS (artboard
     scaling, theme sync) runs normally. -->

<style>
  #cap-05-gallery-wrap {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  #cap-05-gallery-wrap iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    margin: 0;
    padding: 0;
    display: block;
  }
</style>

<section id="cap-05-gallery-wrap">
  <iframe
    src="cap-05-gallery.html"
    title="05 — galería"
    scrolling="no"
  ></iframe>
</section>
