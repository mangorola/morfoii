<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04</title>

<!-- Theme before first paint: same key + class contract as index.html. -->
<script>
  try {
    if (localStorage.getItem('beLight.theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  } catch (e) { /* storage unavailable (sandboxed) — stay light */ }
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  /* Theme tokens — same names/values as index.html so both documents flip
     together. --frame-fade is injected from CONFIG at boot; the value here is
     a matching fallback. */
  :root {
    --bg: #FFFFFF;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.45);
    --fg-faint: rgba(26, 26, 26, 0.22);
    --line: #5E5E5E;
    --line-w: 0.9px;
    --frame-fade: 1500ms;
  }
  :root.dark {
    --bg: #000000;
    --fg: #ffffff;
    --fg-dim: rgba(245, 245, 240, 0.5);
    --fg-faint: rgba(245, 245, 240, 0.25);
    --line: #2E2E2E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Unlike every other chapter this one SCROLLS: a 20000px surface whose
     scroll position drives the paint. overflow-x is clipped so the full-bleed
     field can never spawn a horizontal scrollbar. */
  html, body {
    width: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.45s ease, color 0.45s ease;
  }

  /* === SVG board — frame lines + margin type ============================= */
  /* Same coordinate contract as index.html: viewBox 0 0 1920 1080 with
     "meet" scaling, the 4 frame lines only. UNIQUE to this chapter: the whole
     board FADES OUT on entry to hand the screen to the kinetic field, and
     fades back in only when the user returns to the very top (see JS). */
  #board {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: block;
    overflow: visible;   /* frame lines overshoot to the viewport edges */
    z-index: 10;
    pointer-events: none;
    opacity: 1;
    transition: opacity var(--frame-fade) ease-in-out;
  }
  #board.faded { opacity: 0; pointer-events: none; }
  /* When faded the (invisible) controls must not swallow clicks or scroll. */
  #board.faded .ctrl { pointer-events: none; }

  #board .frame {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    vector-effect: non-scaling-stroke;
    transition: stroke 0.45s ease;
  }
  #board text {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    user-select: none;
  }
  .label-num { fill: var(--fg-dim); transition: fill 0.45s ease; }
  .ctrl {
    cursor: pointer;
    pointer-events: all;
    fill: var(--fg-dim);
    transition: fill 0.3s ease;
  }
  .ctrl:hover, .ctrl:focus-visible { fill: var(--fg); }
  .ctrl:focus { outline: none; }
  .ctrl .hit { fill: transparent; stroke: none; }

  /* === Kinetic field — full-bleed canvas ================================= */
  /* Fixed to the viewport, repainted from scrollY. It IGNORES the inner frame
     (fills 100vw × 100dvh). Sits above the vestigial artboard, below the board
     so the hairlines stay crisp whenever the frame is shown. pointer-events
     none so wheel/touch pass straight through to the scrolling document. */
  #field {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: block;
    z-index: 2;
    pointer-events: none;
  }

  /* === Artboard / stage — scaffolding parity ============================= */
  /* Present so this chapter shares the structure of every other chapter, but
     VESTIGIAL here: the visible layer is the full-viewport #field above. They
     hold the inner-stage rectangle behind the field (never seen while the
     opaque field covers the viewport). Kept for consistency + so the frame's
     coordinate system stays intact. */
  #artboard {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(1);
    z-index: 1;
    pointer-events: none;
  }
  #stage {
    position: absolute;
    left: 80px;
    top: 80px;
    width: 1760px;
    height: 920px;
    overflow: hidden;
    background: var(--bg);
    transition: background 0.45s ease;
  }

  /* The scroll surface: a single full-width spacer that gives the document its
     20000px height. Purely structural — it carries no pixels; every visible
     mark is painted on #field. */
  #scroll {
    width: 100%;
    height: 20000px;
  }
</style>
</head>
<body>

<!-- Frame + margin type: homepage coordinate system, frame lines only.
     This chapter carries NO sefirah name — only the number "04" is shown
     (no adjacent .label-name text element). -->
<svg id="board" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
  <!-- 4 "infinite" frame lines, overshooting the artboard on every side -->
  <line class="frame" x1="-1000" y1="80"    x2="3000" y2="80"/>
  <line class="frame" x1="-1000" y1="1000"  x2="3000" y2="1000"/>
  <line class="frame" x1="80"    y1="-1000" x2="80"   y2="2080"/>
  <line class="frame" x1="1840"  y1="-1000" x2="1840" y2="2080"/>

  <!-- Chapter label, top-left margin — number only, this chapter has no name. -->
  <text class="label-num" x="120" y="45" font-size="11">04</text>

  <!-- Theme toggle, top-right margin. Same localStorage contract as the homepage. -->
  <g class="ctrl" id="themeToggle" role="button" tabindex="0" aria-label="Cambiar tema">
    <rect class="hit" x="1586" y="30" width="76" height="24"/>
    <text id="themeToggleText" x="1655" y="46" font-size="11" text-anchor="end">○ LUZ</text>
  </g>

  <!-- Back to index, top-right margin -->
  <g class="ctrl" id="backIndex" role="link" tabindex="0" aria-label="Volver al índice">
    <rect class="hit" x="1670" y="30" width="140" height="24"/>
    <text x="1800" y="46" font-size="11" text-anchor="end">← Índice</text>
  </g>
</svg>

<!-- Full-bleed kinetic line field. -->
<canvas id="field"></canvas>

<!-- Vestigial scaffolding (see CSS): the inner frame rectangle behind the field. -->
<div id="artboard"><div id="stage"></div></div>

<!-- Scroll surface — gives the document its 20000px height. -->
<div id="scroll"></div>

<script>
(function () {
  'use strict';

  // =====================================================================
  // CONFIG — all tunables.
  // =====================================================================
  const CONFIG = {
    scrollHeight: 20000,
    palette: ['#8EABBF', '#C8D4D3', '#B7364C', '#F85794', '#F89626'],
    hLine: { height: 6, spacing: 6 },       // horizontal MEDIUM lines (6px)
    vThin: { width: 4, spacing: 13, opacity: 0.85 },
    vThick: { width: 24, spacing: 30, gapFromThin: 4 },  // vertical THICK bars (24px)
    frameDelay: 800,
    frameFade: 1500,
    frameShowThreshold: 100,
  };

  // Fixed layout constants (not tunables).
  const ARTBOARD = { w: 1920, h: 1080 };
  const DPR_CAP = 1.5;   // cap devicePixelRatio (performance)

  const root = document.documentElement;
  // Drive the board's fade duration from CONFIG (CSS reads --frame-fade).
  root.style.setProperty('--frame-fade', CONFIG.frameFade + 'ms');

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  // =====================================================================
  // Palette — parse the 5 hex stops to [r,g,b] once; interpolate in RGB.
  // =====================================================================
  function hexToRgb(hex) {
    const h = hex.replace('#', '');
    return [
      parseInt(h.slice(0, 2), 16),
      parseInt(h.slice(2, 4), 16),
      parseInt(h.slice(4, 6), 16),
    ];
  }
  const PAL = CONFIG.palette.map(hexToRgb);
  const STEEL = PAL[0], SAGE = PAL[1], CRIMSON = PAL[2], PINK = PAL[3], ORANGE = PAL[4];
  // Thin verticals use their own 3-stop track (not from the main palette):
  // grey → orange → crimson, sampled by x-position.
  const GREY = hexToRgb('#D9D9D9');
  const VT_SOLO = [GREY, ORANGE, CRIMSON];

  // Gradient-endpoint tracks. Each track is a row of evenly spaced colour
  // stops; sampling it at t ∈ [0,1] interpolates smoothly between adjacent
  // stops (no hard banding). A line's two gradient endpoints come from
  // sampling a START track and an END track at the same t.
  //
  // Horizontals (t = absolute y / scrollHeight), gradient left→right cold→warm:
  //   top: steel→sage · 25%: sage→crimson · 50%: crimson→pink ·
  //   75%: pink→orange · bottom: orange→pink
  const H_START = [STEEL, SAGE, CRIMSON, PINK, ORANGE];
  const H_END   = [SAGE, CRIMSON, PINK, ORANGE, PINK];
  // Thin verticals (t = x / viewport width), warm→cold — reversed direction:
  //   left: orange→pink · 25%: pink→crimson · 50%: crimson→sage ·
  //   75%: sage→steel · right: steel→sage
  const VT_START = [ORANGE, PINK, CRIMSON, SAGE, STEEL];
  const VT_END   = [PINK, CRIMSON, SAGE, STEEL, SAGE];
  // Thick verticals (t = scroll progress), gradient top→bottom warm→warm:
  //   top of scroll: orange→pink · 33%: pink→crimson ·
  //   66%: crimson→pink · bottom: pink→orange
  const VK_TOP    = [ORANGE, PINK, CRIMSON, PINK];
  const VK_BOTTOM = [PINK, CRIMSON, PINK, ORANGE];

  function sampleTrack(track, t, out) {
    t = clamp(t, 0, 1);
    const seg = t * (track.length - 1);
    let i = Math.floor(seg);
    if (i > track.length - 2) i = track.length - 2;
    const f = seg - i;
    const a = track[i], b = track[i + 1];
    out[0] = a[0] + (b[0] - a[0]) * f;
    out[1] = a[1] + (b[1] - a[1]) * f;
    out[2] = a[2] + (b[2] - a[2]) * f;
    return out;
  }

  const cA = [0, 0, 0], cB = [0, 0, 0], cMid = [0, 0, 0];

  function rgbStr(c) {
    return 'rgb(' + (c[0] | 0) + ',' + (c[1] | 0) + ',' + (c[2] | 0) + ')';
  }

  // =====================================================================
  // Canvas.
  // =====================================================================
  const canvas = document.getElementById('field');
  const ctx = canvas.getContext('2d');
  let bgColor = '#ffffff';

  function refreshBg() {
    bgColor = getComputedStyle(root).getPropertyValue('--bg').trim() || '#ffffff';
  }

  function resizeCanvas() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
    canvas.width = Math.round(vw * dpr);
    canvas.height = Math.round(vh * dpr);
    canvas.style.width = vw + 'px';
    canvas.style.height = vh + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);   // draw in CSS pixels
    hGradCache.clear();                       // gradients are vw-dependent
    draw();
  }

  // Repeating units.
  //  - Horizontal: one 6px MEDIUM line + 9px gap = 15px, tiled down the full
  //    20000px scroll field (lines live at ABSOLUTE y; the fixed canvas is a
  //    window sliding over them).
  //  - Vertical: [thin 2px][4px gap][thick 24px][13px gap] = 43px, tiled
  //    across the viewport width. (Unit derived from widths + gaps;
  //    vThick.spacing is the design-spec figure, not used in the tiling.)
  const H_UNIT = CONFIG.hLine.height + CONFIG.hLine.spacing;
  const V_UNIT = CONFIG.vThin.width + CONFIG.vThick.gapFromThin +
                 CONFIG.vThick.width + CONFIG.vThin.spacing;
  const V_THICK_OFFSET = CONFIG.vThin.width + CONFIG.vThick.gapFromThin;

  // Horizontal-line gradients cached by absolute line index. A line's two
  // endpoints depend only on its fixed y in the scroll field, so its gradient
  // never changes — cleared only on resize (gradient width = vw). Full-depth
  // worst case is ~1334 entries; trivial to hold.
  const hGradCache = new Map();
  function hGradient(index, vw) {
    let g = hGradCache.get(index);
    if (g) return g;
    const t = (index * H_UNIT) / CONFIG.scrollHeight;
    sampleTrack(H_START, t, cA);
    sampleTrack(H_END, t, cB);
    g = ctx.createLinearGradient(0, 0, vw, 0);
    g.addColorStop(0, rgbStr(cA));
    g.addColorStop(1, rgbStr(cB));
    hGradCache.set(index, g);
    return g;
  }

  // One repaint: clear to --bg, then the three line types back-to-front —
  // horizontals, thin verticals (translucent, so the horizontals bleed
  // through), thick verticals. The scroll-driven colour drift of each layer
  // against the fixed geometry of the others is the moiré movement.
  function draw() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const scrollY = window.scrollY;
    const maxScroll = CONFIG.scrollHeight - vh;
    const progress = maxScroll > 0 ? clamp(scrollY / maxScroll, 0, 1) : 0;

    ctx.globalAlpha = 1;
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, vw, vh);

    // 1) Horizontal lines — only the rows inside the scroll window.
    const first = Math.max(0, Math.floor(scrollY / H_UNIT));
    const count = Math.ceil(vh / H_UNIT) + 1;
    for (let i = first; i < first + count; i++) {
      ctx.fillStyle = hGradient(i, vw);
      ctx.fillRect(0, i * H_UNIT - scrollY, vw, CONFIG.hLine.height);
    }

    // 2) Thin verticals — fixed columns; a 2px-wide gradient is
    //    imperceptible, so each is filled with a SOLID colour sampled from
    //    the 3-stop grey→orange→crimson track at its x-centre. Colour
    //    variation lives BETWEEN lines, not within.
    ctx.globalAlpha = CONFIG.vThin.opacity;
    for (let x = 0; x < vw; x += V_UNIT) {
      const t = (x + CONFIG.vThin.width / 2) / vw;
      sampleTrack(VT_SOLO, t, cA);
      ctx.fillStyle = rgbStr(cA);
      ctx.fillRect(x, 0, CONFIG.vThin.width, vh);
    }

    // 3) Thick verticals — fixed columns sharing ONE top→bottom gradient
    //    whose warm endpoints drift with scroll progress.
    ctx.globalAlpha = 1;
    sampleTrack(VK_TOP, progress, cA);
    sampleTrack(VK_BOTTOM, progress, cB);
    const g = ctx.createLinearGradient(0, 0, 0, vh);
    g.addColorStop(0, rgbStr(cA));
    g.addColorStop(1, rgbStr(cB));
    ctx.fillStyle = g;
    for (let x = 0; x < vw; x += V_UNIT) {
      ctx.fillRect(x + V_THICK_OFFSET, 0, CONFIG.vThick.width, vh);
    }
  }

  // Repaint is gated by a single rAF so a burst of scroll events coalesces
  // into at most one paint per frame.
  let scheduled = false;
  function requestDraw() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(function () { scheduled = false; draw(); });
  }

  // =====================================================================
  // Frame fade choreography.
  //  - On entry the frame shows briefly, then fades out (revealing the field).
  //  - It returns only after the user has gone down the surface and come back
  //    to the very top (scrollY < threshold). `hasLeftTop` guards against the
  //    entry position (also < threshold) snapping it straight back on, so the
  //    reveal is not undone the instant it happens.
  // =====================================================================
  const board = document.getElementById('board');
  let hasLeftTop = false;
  function updateFrameVisibility() {
    const y = window.scrollY;
    if (y >= CONFIG.frameShowThreshold) {
      hasLeftTop = true;
      board.classList.add('faded');
    } else if (hasLeftTop) {
      board.classList.remove('faded');
    }
  }
  // Entry: reveal the field after a beat.
  setTimeout(function () { board.classList.add('faded'); }, CONFIG.frameDelay);

  // =====================================================================
  // Listeners.
  // =====================================================================
  window.addEventListener('scroll', function () {
    updateFrameVisibility();
    requestDraw();
  }, { passive: true });

  window.addEventListener('resize', resizeCanvas);
  if ('ResizeObserver' in window) {
    // The iframe may be sized after attach (no resize event for 0 -> size).
    new ResizeObserver(resizeCanvas).observe(root);
  }

  // =====================================================================
  // Artboard scale — mirrors the SVG "xMidYMid meet" so the (vestigial) stage
  // shares the frame's coordinate system. Kept for scaffolding parity.
  // =====================================================================
  const artboard = document.getElementById('artboard');
  function fit() {
    const s = Math.min(
      window.innerWidth / ARTBOARD.w,
      window.innerHeight / ARTBOARD.h
    );
    if (s <= 0) return;
    artboard.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  fit();

  // =====================================================================
  // Back to index — hash change on the parent document, never a reload.
  // =====================================================================
  const backIndex = document.getElementById('backIndex');
  function goHome() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.location.hash = '#home';
        return;
      }
    } catch (err) { /* cross-origin parent — fall through */ }
    window.location.href = 'index.html#home';
  }
  backIndex.addEventListener('click', goHome);
  backIndex.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goHome(); }
  });

  // =====================================================================
  // Theme toggle — discreet typographic control sharing index.html's contract:
  // '.dark' on <html> + 'beLight.theme' in localStorage. On flip the canvas
  // clear colour changes, so refresh --bg and repaint.
  // =====================================================================
  const themeToggle = document.getElementById('themeToggle');
  const themeToggleText = document.getElementById('themeToggleText');
  function syncTheme() {
    themeToggleText.textContent = root.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  function flipTheme() {
    root.classList.toggle('dark');
    try {
      localStorage.setItem('beLight.theme',
        root.classList.contains('dark') ? 'dark' : 'light');
    } catch (e) { /* storage unavailable — theme still flips for this view */ }
    syncTheme();
    refreshBg();
    draw();
  }
  themeToggle.addEventListener('click', flipTheme);
  themeToggle.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipTheme(); }
  });
  syncTheme();

  // Theme can change in another tab / the homepage — mirror it live.
  window.addEventListener('storage', function (e) {
    if (e.key === 'beLight.theme') {
      root.classList.toggle('dark', e.newValue === 'dark');
      syncTheme();
      refreshBg();
      draw();
    }
  });

  // =====================================================================
  // Boot.
  // =====================================================================
  refreshBg();
  resizeCanvas();   // sizes the buffer and paints the first frame
})();
</script>

</body>
</html>
