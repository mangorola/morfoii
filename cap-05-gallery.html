<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05</title>

<!-- Theme before first paint: same key + class contract as index.html.
     This chapter always boots in Light mode ("Luz") — the gallery + glass
     lenses are composed on the white field. The toggle and cross-document
     sync still work as usual after load. -->
<script>
  try {
    localStorage.setItem('beLight.theme', 'light');
  } catch (e) { /* storage unavailable (sandboxed) — light for this view only */ }
  document.documentElement.classList.remove('dark');
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  /* Theme tokens — same names/values as index.html so both documents flip
     together. */
  :root {
    --bg: #FFFFFF;
    --fg: #1a1a1a;
    --fg-dim: rgba(26, 26, 26, 0.45);
    --fg-faint: rgba(26, 26, 26, 0.22);
    --line: #5E5E5E;
    --line-w: 0.9px;
  }
  :root.dark {
    --bg: #000000;
    --fg: #ffffff;
    --fg-dim: rgba(245, 245, 240, 0.5);
    --fg-faint: rgba(245, 245, 240, 0.25);
    --line: #2E2E2E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100vh;   /* fallback for older browsers */
    height: 100dvh;  /* modern: excludes mobile browser chrome */
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.45s ease, color 0.45s ease;
  }

  /* === SVG board — frame lines + margin type ============================= */
  /* Same coordinate contract as index.html: viewBox 0 0 1920 1080 with
     "meet" scaling. Only the 4 frame lines here (no circles, no guides,
     no nodes). The board sits ON TOP of the gallery so the hairlines stay
     crisp over the photos; pointer events pass through except on .ctrl. */
  #board {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: block;
    overflow: visible;   /* frame lines overshoot the artboard to the viewport edges */
    z-index: 10;
    pointer-events: none;
  }
  #board .frame {
    fill: none;
    stroke: var(--line);
    stroke-width: var(--line-w);
    vector-effect: non-scaling-stroke;
    transition: stroke 0.45s ease;
  }
  #board text {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    user-select: none;
  }
  .label-num  { fill: var(--fg-dim); transition: fill 0.45s ease; }
  .ctrl {
    cursor: pointer;
    pointer-events: all;
    fill: var(--fg-dim);
    transition: fill 0.3s ease;
  }
  .ctrl:hover, .ctrl:focus-visible { fill: var(--fg); }
  .ctrl:focus { outline: none; }
  .ctrl .hit { fill: transparent; stroke: none; }

  /* === Artboard — HTML twin of the SVG coordinate system ================= */
  /* A fixed 1920×1080 div, centred and scaled by JS with the same
     min(vw/1920, vh/1080) math as the SVG's "xMidYMid meet". Everything
     inside uses raw artboard pixels, so the gallery can never drift from
     the frame drawn in the SVG. */
  #artboard {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(1);
    z-index: 1;
  }

  /* Inner stage: the frame rectangle. overflow:hidden crops anything that
     overshoots exactly at the frame line — same clip every other chapter uses. */
  #stage {
    position: absolute;
    left: 80px;
    top: 80px;
    width: 1760px;
    height: 920px;
    overflow: hidden;
    background: var(--bg);
    transition: background 0.45s ease;
  }

  /* === Gallery photos ==================================================== */
  /* One <img> per cell, absolutely positioned in raw stage pixels. Static:
     no hover, no click, no lightbox. Photos keep full color in both themes;
     only the gaps and margins show --bg. */
  .gallery-photo {
    position: absolute;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  /* === Glass filters ===================================================== */
  /* Two draggable frosted lenses, absolutely positioned in raw stage pixels
     above the photos. Each is a <canvas> that re-samples the shared offscreen
     source through a faceted refraction/dispersion/frost pipeline; the drop
     shadow ("depth") and the faint inset edge are plain CSS, set per lens
     from CONFIG. */
  .glass-filter {
    position: absolute;
    display: block;
    cursor: grab;
    touch-action: none;   /* the drag IS the gesture — never scroll */
    user-select: none;
  }
  .glass-filter.dragging { cursor: grabbing; }
</style>
</head>
<body>

<!-- Frame + margin type: homepage coordinate system, frame lines only. -->
<svg id="board" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
  <!-- 4 "infinite" frame lines, overshooting the artboard on every side -->
  <line class="frame" x1="-1000" y1="80"    x2="3000" y2="80"/>
  <line class="frame" x1="-1000" y1="1000"  x2="3000" y2="1000"/>
  <line class="frame" x1="80"    y1="-1000" x2="80"   y2="2080"/>
  <line class="frame" x1="1840"  y1="-1000" x2="1840" y2="2080"/>

  <!-- Chapter label, top-left margin. This chapter carries NO sefirah name —
       only the number is shown (no adjacent .label-name text element). -->
  <text class="label-num" x="120" y="45" font-size="11">05</text>

  <!-- Theme toggle, top-right margin (left of the back control). Same
       typographic treatment + localStorage contract as the homepage. -->
  <g class="ctrl" id="themeToggle" role="button" tabindex="0" aria-label="Cambiar tema">
    <rect class="hit" x="1586" y="30" width="76" height="24"/>
    <text id="themeToggleText" x="1655" y="46" font-size="11" text-anchor="end">○ LUZ</text>
  </g>

  <!-- Back to index, top-right margin -->
  <g class="ctrl" id="backIndex" role="link" tabindex="0" aria-label="Volver al índice">
    <rect class="hit" x="1670" y="30" width="140" height="24"/>
    <text x="1800" y="46" font-size="11" text-anchor="end">← Índice</text>
  </g>
</svg>

<!-- Scaled HTML artboard: the gallery lives inside the frame rectangle. -->
<div id="artboard">
  <div id="stage"></div>
</div>

<script>
(function () {
  'use strict';

  // =====================================================================
  // CONFIG — all tunables. Coordinates are raw pixels on the 1920×1080
  // artboard (same system as index.html); photo positions are computed
  // in STAGE-relative pixels (stage sits at artboard 80,80).
  //
  // Layout contract:
  //   inner frame 80,80 → 1840,1000 · content inset 40 on every side
  //   → content area (stage-relative) 40,40 → 1720,880 = 1680×840
  //   left grid  : 4 cols × 5 rows, 40px gaps, cells 190×136 → 880 wide
  //   panel gap  : 40px
  //   right panel: fills the rest → 760×840, one image, object-fit cover
  //
  // NOTE: extensions are per-source — A and TODOJUNTO are .jpg, the other
  // 19 grid photos are .png. A mismatched extension 404s and leaves that
  // cell blank.
  // =====================================================================
  const CONFIG = {
    artboard: { w: 1920, h: 1080 },
    stage: { x: 80, y: 80, w: 1760, h: 920 },
    inset: 40,                     // content margin from the inner frame
    gap: 40,                       // spacing between all elements
    grid: {
      cols: 4,
      rows: 5,
      photoW: 190,
      photoH: 136,                 // (840 − 4×40) / 5
      // Row-major order: row 1 A–D, row 2 E–H, row 3 I–L, row 4 M–P,
      // row 5 R S T V.
      images: [
        'A.jpg', 'B.png', 'C.png', 'D.png',
        'E.png', 'F.png', 'G.png', 'H.png',
        'I.png', 'J.png', 'K.png', 'L.png',
        'M.png', 'N.png', 'O.png', 'P.png',
        'R.png', 'S.png', 'T.png', 'V.png',
      ],
    },
    panelImage: 'TODOJUNTO.jpg',   // right panel, fills remaining width
    glass: {
      // Two draggable frosted lenses floating over the stage. Positions are
      // stage-relative px (top-left corner) and freely tunable. The optical
      // values are the mapped 0–100 knob settings from the spec — the knob
      // value is noted next to each mapping.
      filters: [
        {
          name: 'Lente cuadrada',
          cols: 4, rows: 4, cellW: 75, cellH: 75,   // 4×4 squares → 300×300
          x: 890, y: 140,          // default: overlapped by the other lens
          refraction: 0.28,        // visible per-cell mosaic distortion
          dispersion: 5,           // rainbow fringing at the cell boundaries
          frostSigma: 4,         // gentle fog — empañado, not invisible
          splay: 3,                // ±3px per-cell jitter
          shadow: '0 3px 12px rgba(0, 0, 0, 0.2)',  // Depth 61
        },
        {
          name: 'Lente horizontal',
          cols: 2, rows: 1, cellW: 75, cellH: 300,  // 2 vertical bars → 150×300
          x: 540, y: 520,          // overlaps the square lens from below-right
          refraction: 0.15,        // strong pull toward cell centre
          dispersion: 3,           // R +3px / B −3px radial split
          frostSigma: 24,          // heavy milky frost — bathroom-window opaque
          splay: 6,                // ±6px per-cell jitter
          shadow: '0 6px 24px rgba(0, 0, 0, 0.35)', // Depth 100
        },
      ],
      gridLine: 'rgba(255, 255, 255, 0.35)',   // hairlines between cells
      innerBorder: 'rgba(255, 255, 255, 0.3)', // faint 1px inset edge (depth)
      seed: 6103,      // per-cell splay jitter — reload-stable
      maxDpr: 2,       // devicePixelRatio cap for the lens canvases
    },
  };

  // =====================================================================
  // Artboard scale — mirrors the SVG's preserveAspectRatio="xMidYMid meet"
  // so the HTML gallery and the SVG frame share one coordinate system.
  // =====================================================================
  const root = document.documentElement;
  const artboard = document.getElementById('artboard');
  function fit() {
    const s = Math.min(
      window.innerWidth / CONFIG.artboard.w,
      window.innerHeight / CONFIG.artboard.h
    );
    if (s <= 0) return;   // viewport not laid out yet — wait for a real size
    artboard.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
  }
  function onResize() {
    fit();
    // Filter positions live in stage units, so the artboard transform
    // already rescales them; only the effective pixel ratio can change
    // (e.g. the window moves to another display).
    syncLensRes(false);
  }
  window.addEventListener('resize', onResize);
  // The iframe can be attached before it has a size (no resize event fires
  // for the zero→sized transition) — observe the root element as well.
  if ('ResizeObserver' in window) {
    new ResizeObserver(onResize).observe(document.documentElement);
  }
  fit();

  // =====================================================================
  // Static layout — every position derives from CONFIG, no randomness.
  // =====================================================================
  const stage = document.getElementById('stage');
  const inset = CONFIG.inset;
  const gap = CONFIG.gap;
  const g = CONFIG.grid;
  const contentH = CONFIG.stage.h - inset * 2;                 // 840
  const gridW = g.cols * g.photoW + (g.cols - 1) * gap;        // 880
  const panelX = inset + gridW + gap;                          // 960
  const panelW = CONFIG.stage.w - inset - panelX;              // 760

  // Every placed photo is also recorded so the glass filters can redraw the
  // same picture onto their shared offscreen source canvas.
  const photoRecords = [];
  function addPhoto(src, x, y, w, h) {
    const el = document.createElement('img');
    el.className = 'gallery-photo';
    el.src = src;
    el.alt = '';
    el.draggable = false;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.width = w + 'px';
    el.style.height = h + 'px';
    stage.appendChild(el);
    photoRecords.push({ el: el, x: x, y: y, w: w, h: h });
  }

  // Left panel: 4×5 grid, row-major.
  for (let i = 0; i < g.images.length; i++) {
    const col = i % g.cols;
    const row = Math.floor(i / g.cols);
    addPhoto(
      g.images[i],
      inset + col * (g.photoW + gap),
      inset + row * (g.photoH + gap),
      g.photoW,
      g.photoH
    );
  }

  // Right panel: one image, same height as the grid.
  addPhoto(CONFIG.panelImage, panelX, inset, panelW, contentH);

  // =====================================================================
  // GLASS FILTERS — two draggable frosted lenses floating over the whole
  // stage. Each lens is a <canvas> that re-samples a shared offscreen
  // picture of the stage (bg + the 20 photos + TODOJUNTO) through a
  // faceted-glass pipeline, per cell of its grid:
  //   refraction — every sample is pulled toward its cell centre
  //   splay      — a seeded per-cell jitter on that displacement
  //   dispersion — R sampled outward / B inward along the radial axis
  //                (G stays put) → chromatic fringing at cell edges
  //   frost      — separable box blur over the finished lens
  // "Depth" is never computed per-pixel: it is the CSS box-shadow plus a
  // faint inset border on the canvas element itself.
  // =====================================================================

  // --- Shared offscreen source: 1 canvas px per stage/viewBox unit -------
  const srcW = CONFIG.stage.w, srcH = CONFIG.stage.h;
  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = srcW;
  srcCanvas.height = srcH;
  const srcCtx = srcCanvas.getContext('2d', { willReadFrequently: true });
  let srcPix = null;   // Uint8ClampedArray of the current source frame

  function drawSource() {
    const bg = getComputedStyle(root).getPropertyValue('--bg').trim() || '#FFFFFF';
    srcCtx.fillStyle = bg;
    srcCtx.fillRect(0, 0, srcW, srcH);
    for (let i = 0; i < photoRecords.length; i++) {
      const rec = photoRecords[i];
      const img = rec.el;
      if (!img.naturalWidth) continue;   // failed load — bg shows, like the DOM
      // Replicate object-fit: cover — centre-crop to the cell's aspect.
      const scale = Math.max(rec.w / img.naturalWidth, rec.h / img.naturalHeight);
      const sw = rec.w / scale, sh = rec.h / scale;
      srcCtx.drawImage(img,
        (img.naturalWidth - sw) / 2, (img.naturalHeight - sh) / 2, sw, sh,
        rec.x, rec.y, rec.w, rec.h);
    }
    srcPix = srcCtx.getImageData(0, 0, srcW, srcH).data;
  }

  // Nearest-neighbour source read, clamped to the stage — the frost pass
  // smooths away any stepping, so no bilinear filtering is needed.
  function samp(x, y, c) {
    let xi = x | 0, yi = y | 0;
    if (xi < 0) xi = 0; else if (xi >= srcW) xi = srcW - 1;
    if (yi < 0) yi = 0; else if (yi >= srcH) yi = srcH - 1;
    return srcPix[(yi * srcW + xi) * 4 + c];
  }

  // Seeded PRNG — same reload-stable approach as the other chapters.
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

  function currentRes() {
    return Math.min(window.devicePixelRatio || 1, CONFIG.glass.maxDpr);
  }

  // Pointer position → stage-relative viewBox units (inverts the artboard
  // scale — same math the SVG's "meet" fitting applies).
  function stagePoint(e) {
    const rect = stage.getBoundingClientRect();
    const s = rect.width / CONFIG.stage.w;
    return { x: (e.clientX - rect.left) / s, y: (e.clientY - rect.top) / s };
  }

  // --- Frost: separable box blur (H then V), edge-clamped, RGB only ------
  function boxBlurH(src, dst, W, H, r) {
    const inv = 1 / (2 * r + 1);
    for (let y = 0; y < H; y++) {
      const row = y * W;
      let sr = 0, sg = 0, sb = 0;
      for (let ix = -r; ix <= r; ix++) {
        const cx = ix < 0 ? 0 : (ix >= W ? W - 1 : ix);
        const o = (row + cx) * 4;
        sr += src[o]; sg += src[o + 1]; sb += src[o + 2];
      }
      for (let x = 0; x < W; x++) {
        const o = (row + x) * 4;
        dst[o] = sr * inv;
        dst[o + 1] = sg * inv;
        dst[o + 2] = sb * inv;
        dst[o + 3] = 255;
        const ax = x + r + 1, sx = x - r;
        const ao = (row + (ax >= W ? W - 1 : ax)) * 4;
        const so = (row + (sx < 0 ? 0 : sx)) * 4;
        sr += src[ao] - src[so];
        sg += src[ao + 1] - src[so + 1];
        sb += src[ao + 2] - src[so + 2];
      }
    }
  }
  function boxBlurV(src, dst, W, H, r) {
    const inv = 1 / (2 * r + 1);
    for (let x = 0; x < W; x++) {
      let sr = 0, sg = 0, sb = 0;
      for (let iy = -r; iy <= r; iy++) {
        const cy = iy < 0 ? 0 : (iy >= H ? H - 1 : iy);
        const o = (cy * W + x) * 4;
        sr += src[o]; sg += src[o + 1]; sb += src[o + 2];
      }
      for (let y = 0; y < H; y++) {
        const o = (y * W + x) * 4;
        dst[o] = sr * inv;
        dst[o + 1] = sg * inv;
        dst[o + 2] = sb * inv;
        dst[o + 3] = 255;
        const ay = y + r + 1, sy = y - r;
        const ao = ((ay >= H ? H - 1 : ay) * W + x) * 4;
        const so = ((sy < 0 ? 0 : sy) * W + x) * 4;
        sr += src[ao] - src[so];
        sg += src[ao + 1] - src[so + 1];
        sb += src[ao + 2] - src[so + 2];
      }
    }
  }

  // --- Per-lens render ----------------------------------------------------
  function paintLens(lens) {
    if (!srcPix) return;   // photos still loading — painted when ready
    const cfg = lens.cfg;
    const res = lens.res, W = lens.W, H = lens.H;
    const data = lens.out.data;
    const k = cfg.refraction, disp = cfg.dispersion, cols = cfg.cols;
    const fxA = lens.fxA, dxA = lens.dxA, colA = lens.colA;
    const jxA = lens.jxA, jyA = lens.jyA;
    const ox = lens.x, oy = lens.y;
    let i = 0;
    for (let py = 0; py < H; py++) {
      const dy = lens.dyA[py];
      const rowBase = lens.rowA[py] * cols;
      // base sample y for this row: lens origin + pixel + refraction pull
      const byRow = oy + lens.fyA[py] + dy * k;
      for (let px = 0; px < W; px++, i += 4) {
        const dx = dxA[px];
        const cell = rowBase + colA[px];
        const bx = ox + fxA[px] + dx * k + jxA[cell];
        const by = byRow + jyA[cell];
        // radial unit vector pointing OUTWARD from the cell centre
        const d = Math.sqrt(dx * dx + dy * dy);
        let ux = 0, uy = 0;
        if (d > 1e-4) { ux = -dx / d; uy = -dy / d; }
        data[i]     = samp(bx + ux * disp, by + uy * disp, 0);   // R outward
        data[i + 1] = samp(bx, by, 1);                           // G in place
        data[i + 2] = samp(bx - ux * disp, by - uy * disp, 2);   // B inward
        data[i + 3] = 255;
      }
    }

    // Frost — radius in device px derived from the lens's sigma.
    const r = Math.round(cfg.frostSigma * res);
    if (r > 0) {
      boxBlurH(data, lens.tmp, W, H, r);
      boxBlurV(lens.tmp, data, W, H, r);
    }
    lens.ctx.putImageData(lens.out, 0, 0);

    // Cell hairlines — drawn after the blur so they stay crisp.
    const lw = Math.max(1, Math.round(res));   // 1 viewBox px, in device px
    lens.ctx.fillStyle = CONFIG.glass.gridLine;
    for (let c = 1; c < cfg.cols; c++) {
      lens.ctx.fillRect(Math.round(c * cfg.cellW * res - lw / 2), 0, lw, H);
    }
    for (let rw = 1; rw < cfg.rows; rw++) {
      lens.ctx.fillRect(0, Math.round(rw * cfg.cellH * res - lw / 2), W, lw);
    }
  }

  let topZ = 19;   // first grab lands at z 20; every later grab goes above

  function createLens(cfg, index, baseZ) {
    const w = cfg.cols * cfg.cellW;
    const h = cfg.rows * cfg.cellH;
    const canvas = document.createElement('canvas');
    canvas.className = 'glass-filter';
    canvas.setAttribute('aria-label', cfg.name);
    canvas.style.left = cfg.x + 'px';
    canvas.style.top = cfg.y + 'px';
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.style.zIndex = String(baseZ);
    // Depth: outer shadow + faint 1px inset edge — CSS only, never sampled.
    canvas.style.boxShadow = cfg.shadow + ', inset 0 0 0 1px ' + CONFIG.glass.innerBorder;
    const ctx = canvas.getContext('2d');

    // Per-cell splay offsets, seeded so the lens looks the same on reload.
    const rng = mulberry32(CONFIG.glass.seed + index * 101);
    const cells = cfg.cols * cfg.rows;
    const jxA = new Float32Array(cells);
    const jyA = new Float32Array(cells);
    for (let i = 0; i < cells; i++) {
      jxA[i] = (rng() * 2 - 1) * cfg.splay;
      jyA[i] = (rng() * 2 - 1) * cfg.splay;
    }

    const lens = {
      cfg: cfg, canvas: canvas, ctx: ctx,
      w: w, h: h, x: cfg.x, y: cfg.y,
      jxA: jxA, jyA: jyA,
      res: 0, W: 0, H: 0,
      out: null, tmp: null,
      fxA: null, dxA: null, colA: null,
      fyA: null, dyA: null, rowA: null,
      dragging: false, dragX: 0, dragY: 0, rafPending: false,
    };

    // Everything that depends on the device pixel ratio lives here so a
    // display change can rebuild it. Buffers and the per-axis lookup
    // tables are reused between paints — no per-frame allocations.
    lens.alloc = function (res) {
      lens.res = res;
      const W = Math.round(w * res), H = Math.round(h * res);
      lens.W = W; lens.H = H;
      canvas.width = W;
      canvas.height = H;
      lens.out = ctx.createImageData(W, H);
      lens.tmp = new Uint8ClampedArray(lens.out.data.length);
      lens.fxA = new Float32Array(W);
      lens.dxA = new Float32Array(W);
      lens.colA = new Int32Array(W);
      lens.fyA = new Float32Array(H);
      lens.dyA = new Float32Array(H);
      lens.rowA = new Int32Array(H);
      for (let px = 0; px < W; px++) {
        const fx = (px + 0.5) / res;
        const col = Math.min(cfg.cols - 1, Math.floor(fx / cfg.cellW));
        lens.fxA[px] = fx;
        lens.colA[px] = col;
        lens.dxA[px] = (col + 0.5) * cfg.cellW - fx;   // vector toward centre, x
      }
      for (let py = 0; py < H; py++) {
        const fy = (py + 0.5) / res;
        const row = Math.min(cfg.rows - 1, Math.floor(fy / cfg.cellH));
        lens.fyA[py] = fy;
        lens.rowA[py] = row;
        lens.dyA[py] = (row + 0.5) * cfg.cellH - fy;   // vector toward centre, y
      }
    };

    lens.paint = function () { paintLens(lens); };

    // rAF-throttled repaint: drags repaint at most once per frame.
    lens.schedule = function () {
      if (lens.rafPending) return;
      lens.rafPending = true;
      requestAnimationFrame(function () {
        lens.rafPending = false;
        lens.paint();
      });
    };

    // Drag: pointer events with capture, constrained to the stage. The
    // grabbed lens jumps above everything and stays there on release.
    canvas.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      try { canvas.setPointerCapture(e.pointerId); } catch (err) { /* stale pointer id */ }
      canvas.classList.add('dragging');
      canvas.style.zIndex = String(++topZ);
      const p = stagePoint(e);
      lens.dragX = p.x - lens.x;
      lens.dragY = p.y - lens.y;
      lens.dragging = true;
    });
    canvas.addEventListener('pointermove', function (e) {
      if (!lens.dragging) return;
      const p = stagePoint(e);
      lens.x = clamp(p.x - lens.dragX, 0, CONFIG.stage.w - w);
      lens.y = clamp(p.y - lens.dragY, 0, CONFIG.stage.h - h);
      canvas.style.left = lens.x + 'px';
      canvas.style.top = lens.y + 'px';
      lens.schedule();
    });
    function endDrag() {
      lens.dragging = false;
      canvas.classList.remove('dragging');
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    lens.alloc(currentRes());
    stage.appendChild(canvas);
    return lens;
  }

  // Base stacking: photos (no z-index) < lens A (10) < lens B (11).
  const lenses = CONFIG.glass.filters.map(function (cfg, i) {
    return createLens(cfg, i, 10 + i);
  });

  function repaintLenses() {
    for (let i = 0; i < lenses.length; i++) lenses[i].paint();
  }

  // Reallocate + repaint only when the effective pixel ratio changed.
  function syncLensRes(force) {
    const res = currentRes();
    for (let i = 0; i < lenses.length; i++) {
      if (force || lenses[i].res !== res) {
        lenses[i].alloc(res);
        lenses[i].paint();
      }
    }
  }

  // First paint once every photo settles (load OR error — a broken file
  // just leaves bg in the source, exactly like the visible grid).
  Promise.all(photoRecords.map(function (rec) {
    return new Promise(function (resolve) {
      if (rec.el.complete) return resolve();
      rec.el.addEventListener('load', resolve, { once: true });
      rec.el.addEventListener('error', resolve, { once: true });
    });
  })).then(function () {
    drawSource();
    syncLensRes(true);
  });

  // =====================================================================
  // Back to index — hash change on the parent document, never a reload.
  // =====================================================================
  const backIndex = document.getElementById('backIndex');
  function goHome() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.location.hash = '#home';
        return;
      }
    } catch (err) { /* cross-origin parent — fall through */ }
    window.location.href = 'index.html#home';
  }
  backIndex.addEventListener('click', goHome);
  backIndex.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goHome(); }
  });

  // =====================================================================
  // Theme toggle — discreet typographic control in the top margin. Shares
  // index.html's contract: '.dark' class on <html> + 'beLight.theme' in
  // localStorage, so the preference carries across the whole site. The
  // label mirrors the homepage ('○ LUZ' / '● OSC').
  // =====================================================================
  const themeToggle = document.getElementById('themeToggle');
  const themeToggleText = document.getElementById('themeToggleText');
  function syncTheme() {
    themeToggleText.textContent = root.classList.contains('dark') ? '● OSC' : '○ LUZ';
  }
  function flipTheme() {
    root.classList.toggle('dark');
    try {
      localStorage.setItem('beLight.theme',
        root.classList.contains('dark') ? 'dark' : 'light');
    } catch (e) { /* storage unavailable — theme still flips for this view */ }
    syncTheme();
    // The glass filters sample the offscreen source, not the live DOM —
    // rebuild it so the gaps show the new --bg through the lenses.
    drawSource();
    repaintLenses();
  }
  themeToggle.addEventListener('click', flipTheme);
  themeToggle.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipTheme(); }
  });
  syncTheme();

  // Theme can change in another tab / the homepage — mirror it live.
  window.addEventListener('storage', function (e) {
    if (e.key === 'beLight.theme') {
      root.classList.toggle('dark', e.newValue === 'dark');
      syncTheme();
      drawSource();
      repaintLenses();
    }
  });
})();
</script>

</body>
</html>
